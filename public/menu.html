        { label: 'Plan de salle',href: '/staff/tables.html' },
        { label: 'Cuisine',      href: '/cuisine/index.html' },
        { label: 'Instagram',    href: '/instagram/index.html' },
        { label: 'Email',        href: '/admin/email.html' },
        { label: 'Devis',        href: '/resa/devis.html' },
        { label: 'Planning',     href: '/staff/planning.html' },
      ],
      manager_midi: [
        { label: 'Dashboard',    href: '/admin/dashboard.html' },
        { label: 'Tâches',       href: '/staff/taches.html' },
        { label: 'Réservations', href: '/staff/reservations.html' },
        { label: 'Plan de salle',href: '/staff/tables.html' },

        { label: 'Tâches',       href: '/staff/taches.html' },

        { label: 'Devis',     href: '/resa/devis.html' },
        { label: 'Planning',  href: '/staff/planning.html' },
      ],
    };

    const SUBTITLES = {
      admin:        'Accès administrateur',
      manager_midi: 'Service du midi',
      manager_soir: 'Service du soir',
      staff_midi:   'Service du midi',
      staff_soir:   'Service du soir',
      cuisine:      'Équipe cuisine',
      marketing:    'Marketing',
      resa:         'Réservations',
    };

    const DEFAULT_ICON = `<svg viewBox="0 0 20 20" fill="currentColor"><circle cx="10" cy="10" r="6"/></svg>`;

    async function init() {
      const user = await api.get('/api/auth/me');
      if (!user || !user.id) { window.location.href = '/'; return; }
      window.__mosUser = user;

      let menuKey;
      if (user.role === 'admin')                                 menuKey = 'admin';
      else if (user.shift === 'resa')                            menuKey = 'resa';
      else if (user.shift === 'marketing')                       menuKey = 'marketing';
      else if (user.shift === 'cuisine')                         menuKey = 'cuisine';
      else if (user.role === 'manager' && user.shift === 'midi') menuKey = 'manager_midi';
      else if (user.role === 'manager' && user.shift === 'soir') menuKey = 'manager_soir';
      else if (user.shift === 'midi')                            menuKey = 'staff_midi';
      else                                                        menuKey = 'staff_soir';

      document.getElementById('menu-name').textContent = user.name;
      document.getElementById('menu-subtitle').textContent = SUBTITLES[menuKey] || '';
      document.title = `Menu — ${user.name}`;

      const items = MENU_ITEMS[menuKey] || [];
      document.getElementById('menu-grid').innerHTML = items.map(item => `
        <li role="listitem">
          <a href="${escapeHtml(item.href)}" class="menu-tile" aria-label="Ouvrir ${escapeHtml(item.label)}">
            <span class="menu-tile-icon" aria-hidden="true">
              ${TILE_ICONS[item.href] || DEFAULT_ICON}
            </span>
            <span class="menu-tile-label">${escapeHtml(item.label)}</span>
          </a>
        </li>
      `).join('');

      // Nav: logo + user + logout, sans liens répétés
      const nav = document.getElementById('nav');
      nav.setAttribute('aria-label', 'Navigation principale');
      nav.innerHTML = `
        <a href="/menu.html" class="nav-logo" aria-current="page" aria-label="Menu — MOS Pub Mercière">
          <img src="/images/logo.png" alt="MOS" class="nav-logo-img"
               onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
          <span class="nav-logo-text" style="display:none;" aria-hidden="true">MOS</span>
        </a>
        <div class="nav-links"></div>
        <div class="nav-right">
          <span class="nav-user" aria-label="Connecté en tant que ${escapeHtml(user.name)}">${escapeHtml(user.name)}</span>
          <button class="btn-logout" id="btn-logout" type="button" aria-label="Se déconnecter">Déco.</button>
        </div>
      `;
      document.getElementById('btn-logout').addEventListener('click', () => logout());
    }

    init();
  </script>
