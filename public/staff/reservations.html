<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Réservations — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#0b2d3e">
  <style>

    /* ══ DATE BAR ══ */
    .date-bar { display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .date-bar input[type="date"] { flex:1; min-width:140px; max-width:180px; }
    .btn-nav { background:var(--bg-card); border:1px solid var(--border); color:var(--text-muted); border-radius:20px; padding:6px 14px; font-size:.82rem; cursor:pointer; white-space:nowrap; transition:border-color .15s,color .15s; }
    .btn-nav:hover { border-color:var(--primary); color:var(--primary); }

    /* ══ CHIPS ══ */
    .chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .chip { display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:20px; border:1px solid var(--border); background:var(--bg-card); font-size:.8rem; white-space:nowrap; }
    .chip b { font-size:.95rem; }
    .chip-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

    /* ══ CARTES ══ */
    .res-list { display:flex; flex-direction:column; gap:8px; }
    .res-card {
      background:var(--bg-card); border:1px solid var(--border); border-left:4px solid var(--border);
      border-radius:var(--radius); padding:13px 14px; cursor:pointer;
      transition:border-color .15s, background .12s;
      display:grid; grid-template-columns:56px 1fr auto; gap:0 12px; align-items:start;
    }
    .res-card:active { background:var(--bg-surface); }
    .res-card.st-confirmed { border-left-color:var(--info); }
    .res-card.st-arrived   { border-left-color:var(--success); }
    .res-card.st-no_show   { border-left-color:var(--danger); }
    .res-card.st-cancelled { border-left-color:var(--danger); background:rgba(232,84,84,.04); opacity:.7; }
    .res-card.st-cancelled .rc-time { text-decoration:line-through; color:var(--danger); }
    .res-card.st-cancelled .rc-name { text-decoration:line-through; color:var(--danger); }
    .res-card.is-joy       { border-left-color:var(--purple); }

    .rc-time { font-size:1.2rem; font-weight:800; letter-spacing:-.5px; padding-top:2px; line-height:1; }

    .rc-body { min-width:0; }
    .rc-name { font-size:1rem; font-weight:700; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .joy-tag { font-size:.65rem; font-weight:700; color:var(--purple); background:var(--purple-bg); border:1px solid rgba(155,114,240,.3); border-radius:20px; padding:1px 7px; }

    .rc-meta { display:flex; flex-wrap:wrap; gap:5px 10px; margin-top:5px; font-size:.78rem; color:var(--text-muted); align-items:center; }
    .rc-meta a { color:var(--text-muted); }
    .rc-space { font-size:.72rem; font-weight:600; color:var(--warning); background:var(--warning-bg); border:1px solid rgba(240,180,41,.3); border-radius:20px; padding:1px 7px; }
    .rc-table-ok  { font-size:.72rem; font-weight:600; color:var(--success); background:var(--success-bg); border:1px solid rgba(76,175,106,.3); border-radius:20px; padding:1px 7px; }
    .rc-table-nok { font-size:.72rem; font-weight:600; color:var(--danger); background:var(--danger-bg); border:1px solid rgba(232,84,84,.3); border-radius:20px; padding:1px 7px; animation:blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .rc-notes { font-size:.73rem; color:var(--text-muted); font-style:italic; margin-top:3px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }

    .rc-status { grid-column:3; align-self:center; }
    .status-pill { font-size:.7rem; font-weight:600; border-radius:20px; padding:4px 9px; border:1.5px solid; background:transparent; cursor:pointer; white-space:nowrap; appearance:none; -webkit-appearance:none; color:inherit; font-family:inherit; }
    .sp-confirmed { border-color:var(--info);    color:var(--info); }
    .sp-arrived   { border-color:var(--success); color:var(--success); }
    .sp-no_show   { border-color:var(--danger);  color:var(--danger); }
    .sp-cancelled { border-color:#555;           color:#555; }

    /* ══ DRAWER (partagé detail + edit) ══ */
    .drawer-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; opacity:0; pointer-events:none; transition:opacity .25s; }
    .drawer-backdrop.open { opacity:1; pointer-events:auto; }

    .drawer { position:fixed; bottom:0; left:0; right:0; z-index:201; background:var(--bg-card); border-radius:20px 20px 0 0; box-shadow:0 -8px 40px rgba(0,0,0,.5); transform:translateY(102%); transition:transform .3s cubic-bezier(.32,.72,0,1); max-height:92dvh; display:flex; flex-direction:column; }
    .drawer.open { transform:translateY(0); }

    @media (min-width:641px) {
      .drawer-backdrop { backdrop-filter:blur(2px); }
      .drawer { bottom:auto; top:50%; left:50%; right:auto; transform:translate(-50%,-40%); opacity:0; border-radius:var(--radius); width:100%; max-width:500px; max-height:90vh; transition:transform .25s ease,opacity .25s ease; }
      .drawer.open { transform:translate(-50%,-50%); opacity:1; }
    }

    .drawer-handle { width:40px; height:4px; background:rgba(255,255,255,.15); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
    @media (min-width:641px) { .drawer-handle { display:none; } }

    .drawer-head { display:flex; align-items:center; justify-content:space-between; padding:14px 20px 12px; flex-shrink:0; border-bottom:1px solid var(--border); }
    .drawer-title { font-size:1rem; font-weight:700; }
    .drawer-close { width:30px; height:30px; border-radius:50%; background:var(--bg-surface); color:var(--text-muted); display:flex; align-items:center; justify-content:center; font-size:.9rem; cursor:pointer; border:none; flex-shrink:0; }

    .drawer-body { overflow-y:auto; padding:16px 20px; flex:1; -webkit-overflow-scrolling:touch; }
    .drawer-footer { display:flex; gap:8px; padding:10px 20px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--border); flex-shrink:0; }
    .drawer-footer .btn { flex:1; justify-content:center; min-height:46px; }

    /* ── Vue détail ── */
    .detail-view { display:flex; flex-direction:column; gap:0; }
    .detail-row { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--border); }
    .detail-row:last-child { border-bottom:none; }
    .detail-icon { font-size:1.1rem; width:28px; text-align:center; flex-shrink:0; }
    .detail-label { font-size:.75rem; color:var(--text-muted); margin-bottom:2px; }
    .detail-value { font-size:.95rem; font-weight:600; }
    .detail-value a { color:var(--text); }
    .detail-value.muted { color:var(--text-muted); font-weight:400; font-style:italic; }
    .detail-status { font-size:.8rem; font-weight:600; border-radius:20px; padding:5px 14px; border:1.5px solid; background:transparent; cursor:pointer; appearance:none; -webkit-appearance:none; color:inherit; font-family:inherit; width:100%; }
    .detail-table-badge { display:inline-flex; align-items:center; gap:5px; font-size:.82rem; font-weight:600; padding:4px 12px; border-radius:20px; }
    .dtb-ok  { color:var(--success); background:var(--success-bg); border:1px solid rgba(76,175,106,.3); }
    .dtb-nok { color:var(--danger); background:var(--danger-bg); border:1px solid rgba(232,84,84,.3); }

    /* ── Formulaire ── */
    .frow { display:flex; flex-direction:column; gap:14px; }
    .fgroup { display:flex; flex-direction:column; gap:6px; }
    .fgroup label { font-size:.82rem; font-weight:600; color:var(--text-muted); }
    .f2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .stepper { display:flex; align-items:stretch; border:1.5px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; height:46px; transition:border-color .2s; }
    .stepper:focus-within { border-color:var(--primary); }
    .stepper-btn { width:48px; background:var(--bg-surface); color:var(--text); font-size:1.4rem; font-weight:300; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .12s; touch-action:manipulation; }
    .stepper-btn:active { background:var(--bg-hover); }
    .stepper-val { flex:1; text-align:center; background:var(--bg-card); border:none; border-left:1.5px solid var(--border); border-right:1.5px solid var(--border); color:var(--text); font-size:1.2rem; font-weight:700; font-family:inherit; padding:0; -moz-appearance:textfield; }
    .stepper-val::-webkit-inner-spin-button, .stepper-val::-webkit-outer-spin-button { -webkit-appearance:none; }

    /* Bouton assigner une table */
    .btn-assign { background:rgba(205,164,67,.12); border:1.5px solid rgba(205,164,67,.4); color:var(--primary); border-radius:var(--radius-sm); padding:12px 16px; font-size:.9rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; justify-content:center; transition:background .15s; width:100%; margin-top:4px; }
    .btn-assign:active { background:rgba(205,164,67,.22); }
  </style>
</head>
<body>
  <nav class="nav" id="nav"></nav>

  <div class="page">
    <div class="container-sm">

      <div class="page-header">
        <div>
          <div class="page-title">📋 Réservations</div>
          <div class="page-subtitle" id="dateLabel"></div>
        </div>
        <button class="btn btn-primary" onclick="openCreate()">+ Nouvelle</button>
      </div>

      <div class="date-bar">
        <button class="btn-nav" onclick="shiftDate(-1)">← Hier</button>
        <input type="date" id="viewDate" onchange="load()">
        <button class="btn-nav" onclick="goToday()">Aujourd'hui</button>
        <button class="btn-nav" onclick="shiftDate(1)">Demain →</button>
      </div>

      <div class="chips" id="chips"></div>
      <div class="res-list" id="resList"></div>

    </div>
  </div>

  <!-- ══ BACKDROP ══ -->
  <div class="drawer-backdrop" id="backdrop" onclick="closeDrawer()"></div>

  <!-- ══ DRAWER DÉTAIL ══ -->
  <div class="drawer" id="detailDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <div class="drawer-title" id="detailTitle">Réservation</div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body" id="detailBody"></div>
    <div class="drawer-footer">
      <button class="btn btn-secondary" onclick="closeDrawer()">Fermer</button>
      <button class="btn btn-danger" id="detailBtnDel" onclick="deleteFromDetail()" style="flex:0 0 auto;padding:0 16px">🗑</button>
      <button class="btn btn-primary" onclick="switchToEdit()">✏️ Modifier</button>
    </div>
  </div>

  <!-- ══ DRAWER ÉDITION ══ -->
  <div class="drawer" id="editDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <div class="drawer-title" id="editTitle">Modifier</div>
      <button class="drawer-close" onclick="closeEditDrawer()">✕</button>
    </div>
    <div class="drawer-body">
      <form id="resForm" onsubmit="saveRes(event)">
        <input type="hidden" id="resId">
        <div class="frow">
          <div class="fgroup">
            <label>Nom du client *</label>
            <input type="text" id="resName" placeholder="Ex : Dupont" required autocomplete="off">
          </div>
          <div class="fgroup">
            <label>Téléphone</label>
            <input type="tel" id="resPhone" placeholder="06 xx xx xx xx">
          </div>
          <div class="f2">
            <div class="fgroup"><label>Date *</label><input type="date" id="resDate" required></div>
            <div class="fgroup"><label>Heure *</label><input type="time" id="resTime" required></div>
          </div>
          <div class="fgroup">
            <label>Nombre de personnes</label>
            <div class="stepper">
              <button type="button" class="stepper-btn" onclick="stepParty(-1)">−</button>
              <input type="number" id="resParty" class="stepper-val" min="1" max="99" value="2" readonly>
              <button type="button" class="stepper-btn" onclick="stepParty(1)">+</button>
            </div>
          </div>
          <div class="fgroup">
            <label>Notes <span style="font-weight:400;color:var(--text-muted)">(allergies, occasion, demandes…)</span></label>
            <textarea id="resNotes" rows="3" placeholder="Ex : Allergie aux noix · Anniversaire…" style="resize:vertical"></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-secondary" onclick="closeEditDrawer()">Annuler</button>
      <button type="submit" form="resForm" class="btn btn-primary">Enregistrer</button>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script>
    buildNav('reservations');
    const socket = io();

    let reservations = [];
    let currentResId = null;
    const viewDate = document.getElementById('viewDate');
    viewDate.value = today();
    updateLabel();

    const ST = {
      confirmed: { label:'📋 Confirmée', cls:'sp-confirmed' },
      arrived:   { label:'✅ Arrivée',   cls:'sp-arrived'   },
      no_show:   { label:'⚠️ No show',   cls:'sp-no_show'   },
      cancelled: { label:'❌ Annulée',   cls:'sp-cancelled' },
    };

    // ── Chargement ────────────────────────────────────────────────────────────
    async function load() {
      updateLabel();
      const data = await api.get(`/api/reservations?date=${viewDate.value}`);
      if (!data) return;
      reservations = data.sort((a,b) => (a.time||'').localeCompare(b.time||''));
      render();
    }

    function updateLabel() {
      document.getElementById('dateLabel').textContent = formatDate(viewDate.value);
    }
    function shiftDate(d) {
      const dt = new Date(viewDate.value);
      dt.setDate(dt.getDate() + d);
      viewDate.value = dt.toISOString().split('T')[0];
      load();
    }
    function goToday() { viewDate.value = today(); load(); }

    // ── Rendu ─────────────────────────────────────────────────────────────────
    function render() { renderChips(); renderList(); }

    function renderChips() {
      const total   = reservations.length;
      const conf    = reservations.filter(r=>r.status==='confirmed').length;
      const arr     = reservations.filter(r=>r.status==='arrived').length;
      const ns      = reservations.filter(r=>r.status==='no_show').length;
      const pax     = reservations.filter(r=>r.status!=='cancelled').reduce((s,r)=>s+r.party_size,0);
      const joy     = reservations.filter(r=>r.joy_event_id).length;
      document.getElementById('chips').innerHTML = `
        <div class="chip" style="border-color:var(--primary-dim)"><b style="color:var(--primary)">${total}</b> résa${total!==1?'s':''} &nbsp;·&nbsp; ${pax} pers.</div>
        ${conf ? `<div class="chip"><div class="chip-dot" style="background:var(--info)"></div><b style="color:var(--info)">${conf}</b> confirmée${conf>1?'s':''}</div>` : ''}
        ${arr  ? `<div class="chip"><div class="chip-dot" style="background:var(--success)"></div><b style="color:var(--success)">${arr}</b> arrivée${arr>1?'s':''}</div>` : ''}
        ${ns   ? `<div class="chip"><div class="chip-dot" style="background:var(--danger)"></div><b style="color:var(--danger)">${ns}</b> no show</div>` : ''}
        ${joy  ? `<div class="chip" style="border-color:rgba(155,114,240,.35)"><div class="chip-dot" style="background:var(--purple)"></div><b style="color:var(--purple)">${joy}</b> Joy.io</div>` : ''}
      `;
    }

    function renderList() {
      const el = document.getElementById('resList');
      if (!reservations.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📅</div><div class="empty-state-text">Aucune réservation ce jour</div></div>`;
        return;
      }
      el.innerHTML = reservations.map(r => {
        const isJoy = !!r.joy_event_id;
        const st = ST[r.status] || ST.confirmed;
        const tableNames = r.table_names?.length ? r.table_names : (r.table_name ? [r.table_name] : []);
        const tableBadge = tableNames.length
          ? tableNames.map(n => `<span class="rc-table-ok">🪑 ${n}</span>`).join(' ')
          : `<span class="rc-table-nok">Sans table</span>`;
        return `
          <div class="res-card st-${r.status}${isJoy?' is-joy':''}" id="rc-${r.id}" onclick="openDetail(${r.id})">
            <div class="rc-time">${r.time||'—'}</div>
            <div class="rc-body">
              <div class="rc-name">${r.customer_name}${isJoy?`<span class="joy-tag">Joy.io</span>`:''}</div>
              <div class="rc-meta">
                <span>👥 ${r.party_size} pers.</span>
                ${r.phone?`<a href="tel:${r.phone}" onclick="event.stopPropagation()">📞 ${r.phone}</a>`:''}
                ${r.space?`<span class="rc-space">📍 ${r.space}</span>`:''}
                ${tableBadge}
              </div>
              ${r.notes?`<div class="rc-notes">📝 ${r.notes}</div>`:''}
            </div>
            <div class="rc-status" onclick="event.stopPropagation()">
              <select class="status-pill ${st.cls}" onchange="changeStatus(${r.id},this.value)">
                <option value="confirmed" ${r.status==='confirmed'?'selected':''}>📋 Confirmée</option>
                <option value="arrived"   ${r.status==='arrived'?'selected':''}>✅ Arrivée</option>
                <option value="no_show"   ${r.status==='no_show'?'selected':''}>⚠️ No show</option>
                <option value="cancelled" ${r.status==='cancelled'?'selected':''}>❌ Annulée</option>
              </select>
            </div>
          </div>`;
      }).join('');
    }

    // ── Statut rapide ─────────────────────────────────────────────────────────
    async function changeStatus(id, status) {
      await api.put(`/api/reservations/${id}`, { status });
      const r = reservations.find(x=>x.id===id);
      if (r) r.status = status;
      render();
      showToast('Statut mis à jour', 'success');
    }

    // ── DRAWER DÉTAIL ─────────────────────────────────────────────────────────
    function openDetail(id) {
      const r = reservations.find(x=>x.id===id);
      if (!r) return;
      currentResId = id;

      const isJoy = !!r.joy_event_id;
      const st = ST[r.status] || ST.confirmed;

      document.getElementById('detailTitle').innerHTML =
        r.customer_name + (isJoy ? ` <span class="joy-tag">Joy.io</span>` : '');

      const tableNames = r.table_names?.length ? r.table_names : (r.table_name ? [r.table_name] : []);
      const tableBadge = tableNames.length
        ? tableNames.map(n => `<span class="detail-table-badge dtb-ok">🪑 ${n}</span>`).join(' ')
        : `<span class="detail-table-badge dtb-nok">Pas de table assignée</span>`;

      document.getElementById('detailBody').innerHTML = `
        <div class="detail-view">
          <div class="detail-row">
            <div class="detail-icon">🕐</div>
            <div><div class="detail-label">Heure</div><div class="detail-value">${r.time||'—'} · ${r.date}</div></div>
          </div>
          <div class="detail-row">
            <div class="detail-icon">👥</div>
            <div><div class="detail-label">Personnes</div><div class="detail-value">${r.party_size} personne${r.party_size>1?'s':''}</div></div>
          </div>
          ${r.phone?`<div class="detail-row">
            <div class="detail-icon">📞</div>
            <div><div class="detail-label">Téléphone</div><div class="detail-value"><a href="tel:${r.phone}">${r.phone}</a></div></div>
          </div>`:''}
          ${r.space?`<div class="detail-row">
            <div class="detail-icon">📍</div>
            <div><div class="detail-label">Espace réservé</div><div class="detail-value">${r.space}</div></div>
          </div>`:''}
          <div class="detail-row">
            <div class="detail-icon">🪑</div>
            <div><div class="detail-label">Table</div><div class="detail-value">${tableBadge}</div></div>
          </div>
          ${r.notes?`<div class="detail-row">
            <div class="detail-icon">📝</div>
            <div><div class="detail-label">Notes</div><div class="detail-value">${r.notes}</div></div>
          </div>`:''}
          <div class="detail-row">
            <div class="detail-icon">📌</div>
            <div style="width:100%"><div class="detail-label">Statut</div>
              <select class="detail-status ${st.cls}" onchange="changeStatusFromDetail(${r.id},this.value)">
                <option value="confirmed" ${r.status==='confirmed'?'selected':''}>📋 Confirmée</option>
                <option value="arrived"   ${r.status==='arrived'?'selected':''}>✅ Arrivée</option>
                <option value="no_show"   ${r.status==='no_show'?'selected':''}>⚠️ No show</option>
                <option value="cancelled" ${r.status==='cancelled'?'selected':''}>❌ Annulée</option>
              </select>
            </div>
          </div>
        </div>

        <button class="btn-assign" onclick="goAssignTable(${r.id},'${r.date}','${encodeURIComponent(r.customer_name)}')">
          🗺️ Assigner une table sur le plan de salle
        </button>
      `;

      document.getElementById('detailBtnDel').style.display = isJoy ? 'none' : 'flex';
      openDrawer('detailDrawer');
    }

    async function changeStatusFromDetail(id, status) {
      await api.put(`/api/reservations/${id}`, { status });
      const r = reservations.find(x=>x.id===id);
      if (r) r.status = status;
      render();
      showToast('Statut mis à jour', 'success');
    }

    function goAssignTable(resId, date, name) {
      window.location.href = `/staff/tables.html?assignTo=${resId}&date=${date}&name=${name}`;
    }

    async function deleteFromDetail() {
      if (!currentResId || !confirm('Supprimer cette réservation ?')) return;
      await api.delete(`/api/reservations/${currentResId}`);
      closeDrawer();
      showToast('Réservation supprimée', 'info');
      load();
    }

    // ── DRAWER ÉDITION ────────────────────────────────────────────────────────
    function openCreate() {
      currentResId = null;
      document.getElementById('editTitle').textContent = 'Nouvelle réservation';
      document.getElementById('resId').value    = '';
      document.getElementById('resName').value  = '';
      document.getElementById('resPhone').value = '';
      document.getElementById('resDate').value  = viewDate.value;
      document.getElementById('resTime').value  = '';
      document.getElementById('resParty').value = 2;
      document.getElementById('resNotes').value = '';
      openDrawer('editDrawer');
      setTimeout(()=>document.getElementById('resName').focus(), 350);
    }

    function switchToEdit() {
      const r = reservations.find(x=>x.id===currentResId);
      if (!r) return;
      document.getElementById('editTitle').textContent = 'Modifier la réservation';
      document.getElementById('resId').value    = r.id;
      document.getElementById('resName').value  = r.customer_name;
      document.getElementById('resPhone').value = r.phone||'';
      document.getElementById('resDate').value  = r.date;
      document.getElementById('resTime').value  = r.time;
      document.getElementById('resParty').value = r.party_size;
      document.getElementById('resNotes').value = r.notes||'';
      closeAllDrawers(false);
      openDrawer('editDrawer');
    }

    function closeEditDrawer() {
      closeAllDrawers(false);
      // Revenir au détail si on était en mode edit depuis detail
      if (currentResId) openDetail(currentResId);
    }

    // ── Sauvegarder ───────────────────────────────────────────────────────────
    async function saveRes(e) {
      e.preventDefault();
      const id = document.getElementById('resId').value;
      const body = {
        customer_name: document.getElementById('resName').value.trim(),
        phone:         document.getElementById('resPhone').value.trim()||null,
        date:          document.getElementById('resDate').value,
        time:          document.getElementById('resTime').value,
        party_size:    parseInt(document.getElementById('resParty').value)||2,
        notes:         document.getElementById('resNotes').value.trim()||null,
      };
      const res = id ? await api.put(`/api/reservations/${id}`, body) : await api.post('/api/reservations', body);
      if (res?.error) { showToast(res.error, 'error'); return; }
      closeDrawer();
      showToast(id ? 'Réservation modifiée ✓' : 'Réservation ajoutée ✓', 'success');
      if (body.date === viewDate.value) load();
    }

    function stepParty(d) {
      const i = document.getElementById('resParty');
      i.value = Math.max(1, Math.min(99, (parseInt(i.value)||2)+d));
    }

    // ── Gestion drawers ───────────────────────────────────────────────────────
    function openDrawer(id) {
      document.getElementById('backdrop').classList.add('open');
      document.getElementById(id).classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeAllDrawers(resetBackdrop=true) {
      document.getElementById('detailDrawer').classList.remove('open');
      document.getElementById('editDrawer').classList.remove('open');
      if (resetBackdrop) {
        document.getElementById('backdrop').classList.remove('open');
        document.body.style.overflow = '';
      }
    }
    function closeDrawer() { closeAllDrawers(true); currentResId = null; }

    // ── Temps réel ────────────────────────────────────────────────────────────
    socket.on('reservation:updated', r => {
      if (r.date !== viewDate.value) return;
      const i = reservations.findIndex(x=>x.id===r.id);
      if (i>=0) reservations[i]=r; else reservations.push(r);
      reservations.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
      render();
    });
    socket.on('reservation:deleted', ({id}) => {
      reservations = reservations.filter(r=>r.id!==id);
      render();
    });

    // ── Retour depuis plan de salle (table assignée) ──────────────────────────
    const params = new URLSearchParams(location.search);
    if (params.get('assigned')) {
      showToast(`Table assignée ✓`, 'success');
      history.replaceState({}, '', location.pathname);
    }

    load();
  </script>
</body>
</html>
