<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dashboard Cuisine — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#08141c">
  <style>
    .dash-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; margin-bottom:14px; }
    .dash-card-title { font-size:.78rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:12px; }
    .planning-row { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); }
    .planning-row:last-child { border-bottom:none; }
    .pr-name { font-weight:700; font-size:.95rem; width:80px; flex-shrink:0; }
    .pr-shift { flex:1; }
    .pr-hours { font-size:.88rem; font-weight:600; color:var(--primary); }
    .pr-off { font-size:.82rem; color:var(--danger); }
    .pr-absent { font-size:.82rem; color:var(--text-muted); font-style:italic; }
    .pr-status { font-size:.72rem; font-weight:700; padding:2px 8px; border-radius:20px; }
    .pr-late { background:rgba(240,180,41,.15); color:var(--warning); border:1px solid rgba(240,180,41,.3); }
    .pr-supp { background:rgba(76,175,106,.12); color:var(--success); border:1px solid rgba(76,175,106,.3); }
    .task-prog-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .task-prog-row:last-child { margin-bottom:0; }
    .tp-name { font-weight:700; font-size:.88rem; width:72px; flex-shrink:0; }
    .tp-bar { flex:1; height:8px; background:var(--bg-surface); border-radius:4px; overflow:hidden; }
    .tp-fill { height:100%; border-radius:4px; background:var(--primary); transition:width .5s; }
    .tp-fill.full { background:var(--success); }
    .tp-count { font-size:.78rem; color:var(--text-muted); min-width:44px; text-align:right; }
    .global-prog { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .gp-bar { flex:1; height:10px; background:var(--bg-surface); border-radius:5px; overflow:hidden; }
    .gp-fill { height:100%; border-radius:5px; background:var(--primary); transition:width .5s; }
    .gp-fill.full { background:var(--success); }
    .gp-label { font-size:.9rem; font-weight:700; min-width:50px; text-align:right; }
    .te-row { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .te-row:last-child { border-bottom:none; }
    .te-badge { font-size:.7rem; font-weight:700; padding:2px 8px; border-radius:20px; white-space:nowrap; flex-shrink:0; margin-top:2px; }
    .te-retard { background:rgba(240,180,41,.15); color:var(--warning); border:1px solid rgba(240,180,41,.3); }
    .te-supp   { background:rgba(76,175,106,.12); color:var(--success); border:1px solid rgba(76,175,106,.3); }
    .te-body { flex:1; }
    .te-name { font-weight:700; font-size:.88rem; }
    .te-detail { font-size:.8rem; color:var(--text-muted); margin-top:2px; }
    .te-empty { font-size:.83rem; color:var(--text-muted); font-style:italic; }
    .week-table { width:100%; border-collapse:collapse; }
    .week-table th { font-size:.72rem; font-weight:700; color:var(--text-muted); text-align:left; padding:6px 8px; border-bottom:1px solid var(--border); }
    .week-table td { font-size:.82rem; padding:7px 8px; border-bottom:1px solid var(--border); }
    .week-table tr:last-child td { border-bottom:none; }
    .wt-name { font-weight:700; }
    .wt-pill { display:inline-block; font-size:.7rem; font-weight:700; padding:2px 7px; border-radius:20px; margin:1px; }
    .wt-retard { background:rgba(240,180,41,.15); color:var(--warning); }
    .wt-supp   { background:rgba(76,175,106,.12); color:var(--success); }
    .date-nav { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
    .date-nav-btn { background:var(--bg-card); border:1px solid var(--border); color:var(--text-muted); border-radius:20px; padding:6px 14px; font-size:.8rem; cursor:pointer; }
    .date-nav-btn:hover { border-color:var(--primary); color:var(--primary); }
    .date-nav-btn:focus-visible { box-shadow:var(--focus-ring); outline:none; }

    @media (prefers-reduced-motion: reduce) {
      .tp-fill, .gp-fill { transition: none !important; }
    }
  </style>
</head>
<body>
  <nav class="nav" id="nav" role="navigation" aria-label="Navigation principale"></nav>

  <main class="page" id="main-content" tabindex="-1">
    <div class="container-sm">

      <header class="page-header">
        <div>
          <h1 class="page-title">Dashboard Cuisine</h1>
          <p class="page-subtitle" id="dateLabel"></p>
        </div>
      </header>

      <div role="group" aria-label="Navigation par date" class="date-nav">
        <button class="date-nav-btn" id="btnPrev" aria-label="Jour précédent">← Hier</button>
        <label class="sr-only" for="viewDate">Date</label>
        <input type="date" id="viewDate" class="form-input" style="flex:1;min-width:130px;max-width:170px;">
        <button class="date-nav-btn" id="btnToday">Aujourd'hui</button>
        <button class="date-nav-btn" id="btnNext" aria-label="Jour suivant">Demain →</button>
      </div>

      <section class="dash-card" aria-labelledby="section-planning">
        <h2 class="dash-card-title" id="section-planning">Planning du jour</h2>
        <div id="planningToday" aria-live="polite" aria-atomic="true"></div>
      </section>

      <section class="dash-card" aria-labelledby="section-tasks">
        <h2 class="dash-card-title" id="section-tasks">Tâches du jour</h2>
        <div class="global-prog" aria-hidden="true">
          <div class="gp-bar"><div class="gp-fill" id="gpFill" style="width:0%"></div></div>
          <div class="gp-label" id="gpLabel">0/0</div>
        </div>
        <progress id="gpProgress" class="sr-only" aria-label="Progression globale des tâches" value="0" max="1"></progress>
        <div id="taskProgList" aria-live="polite" aria-atomic="true"></div>
      </section>

      <section class="dash-card" aria-labelledby="section-time">
        <h2 class="dash-card-title" id="section-time">Retards &amp; Heures supp — aujourd'hui</h2>
        <div id="timeEventsToday" aria-live="polite" aria-atomic="true"></div>
      </section>

      <section class="dash-card" aria-labelledby="section-week">
        <h2 class="dash-card-title" id="section-week">Résumé de la semaine</h2>
        <div id="weekSummary" aria-live="polite" aria-atomic="true"></div>
      </section>

    </div>
  </main>

  <div id="toast-container"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script>
    'use strict';
    buildNav('dashboard-cuisine');
    const socket = io();

    const viewDateEl = document.getElementById('viewDate');
    viewDateEl.value = today();
    updateLabel();

    function updateLabel() {
      document.getElementById('dateLabel').textContent = formatDate(viewDateEl.value);
    }

    document.getElementById('btnPrev').addEventListener('click', () => shiftDate(-1));
    document.getElementById('btnNext').addEventListener('click', () => shiftDate(1));
    document.getElementById('btnToday').addEventListener('click', () => { viewDateEl.value = today(); loadDay(); });
    viewDateEl.addEventListener('change', loadDay);

    function shiftDate(d) {
      const dt = new Date(viewDateEl.value);
      dt.setDate(dt.getDate() + d);
      viewDateEl.value = dt.toISOString().split('T')[0];
      loadDay();
    }

    function getMonday(dateStr) {
      const d = new Date(dateStr);
      const day = d.getDay();
      d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
      return d.toISOString().split('T')[0];
    }
    function addDays(dateStr, n) {
      const d = new Date(dateStr); d.setDate(d.getDate() + n); return d.toISOString().split('T')[0];
    }

    async function loadDay() {
      updateLabel();
      const date = viewDateEl.value;
      const weekStart = getMonday(date);
      const weekEnd   = addDays(weekStart, 6);

      const [completions, timeEvents, planning, weekEvents] = await Promise.all([
        api.get(`/api/cuisine/completions?date=${date}`),
        api.get(`/api/cuisine/time-events?date=${date}`),
        api.get(`/api/cuisine/planning?weekStart=${weekStart}`),
        api.get(`/api/cuisine/time-events?from=${weekStart}&to=${weekEnd}`),
      ]);

      renderPlanning(planning, date, timeEvents);
      renderTaskProg(completions);
      renderTimeEvents(timeEvents);
      renderWeekSummary(planning?.users || [], weekEvents || []);
    }

    function renderPlanning(planning, date, timeEvents) {
      const el = document.getElementById('planningToday');
      if (!planning?.users?.length) { el.innerHTML = '<div style="color:var(--text-muted);font-size:.85rem">Aucun staff enregistré</div>'; return; }
      el.innerHTML = '<ul role="list" style="list-style:none;padding:0;margin:0;">' + planning.users.map(u => {
        const shift = planning.shifts?.find(s => s.user_id === u.id && s.day_date === date);
        const late  = timeEvents?.find(e => e.user_id === u.id && e.type === 'retard');
        const supp  = timeEvents?.find(e => e.user_id === u.id && e.type === 'supp');
        let shiftHtml;
        if (!shift) shiftHtml = `<span class="pr-absent">Non planifié</span>`;
        else if (shift.is_off) shiftHtml = `<span class="pr-off">Repos</span>`;
        else shiftHtml = `<span class="pr-hours">${escapeHtml(shift.start_time?.slice(0,5)||'')} → ${escapeHtml(shift.end_time?.slice(0,5)||'')}</span>`;
        const badges = [
          late ? `<span class="pr-status pr-late">+${late.minutes}min retard</span>` : '',
          supp ? `<span class="pr-status pr-supp">+${supp.minutes}min supp</span>` : '',
        ].filter(Boolean).join(' ');
        return `<li class="planning-row"><div class="pr-name">${escapeHtml(u.name)}</div><div class="pr-shift">${shiftHtml} ${badges}</div></li>`;
      }).join('') + '</ul>';
    }

    function renderTaskProg(completions) {
      if (!completions?.length) {
        document.getElementById('taskProgList').innerHTML = '<div style="color:var(--text-muted);font-size:.85rem">Aucune donnée</div>';
        return;
      }
      const totalTasks = completions[0]?.total || 0;
      const uniqueDone = Math.max(...completions.map(m => m.done || 0));
      const pctGlobal = totalTasks > 0 ? Math.round(uniqueDone / totalTasks * 100) : 0;
      const fillEl = document.getElementById('gpFill');
      fillEl.style.width = pctGlobal + '%';
      fillEl.className = 'gp-fill' + (pctGlobal === 100 ? ' full' : '');
      document.getElementById('gpLabel').textContent = `${uniqueDone}/${totalTasks}`;
      const prog = document.getElementById('gpProgress');
      prog.value = uniqueDone; prog.max = totalTasks;
      document.getElementById('taskProgList').innerHTML = completions.map(m => {
        const pct = totalTasks > 0 ? Math.round((m.done || 0) / totalTasks * 100) : 0;
        return `<div class="task-prog-row">
          <div class="tp-name">${escapeHtml(m.name)}</div>
          <div class="tp-bar" aria-hidden="true"><div class="tp-fill ${pct===100?'full':''}" style="width:${pct}%"></div></div>
          <div class="tp-count" aria-label="${escapeHtml(m.name)} : ${m.done} sur ${totalTasks}">${m.done}/${totalTasks}</div>
        </div>`;
      }).join('');
    }

    function renderTimeEvents(events) {
      const el = document.getElementById('timeEventsToday');
      if (!events?.length) { el.innerHTML = '<div class="te-empty">Aucun signalement aujourd\'hui</div>'; return; }
      el.innerHTML = '<ul role="list" style="list-style:none;padding:0;margin:0;">' + events.map(e => `
        <li class="te-row">
          <span class="te-badge ${e.type==='retard'?'te-retard':'te-supp'}">${e.type==='retard'?'Retard':'H. supp'}</span>
          <div class="te-body">
            <div class="te-name">${escapeHtml(e.user_name)} <span style="font-weight:400;color:var(--text-muted)">+${e.minutes} min</span></div>
            ${e.note ? `<div class="te-detail">${escapeHtml(e.note)}</div>` : ''}
          </div>
        </li>`).join('') + '</ul>';
    }

    function renderWeekSummary(users, weekEvents) {
      const el = document.getElementById('weekSummary');
      if (!users.length) { el.innerHTML = '<div style="color:var(--text-muted);font-size:.85rem">Aucune donnée</div>'; return; }
      const totalRetard = weekEvents.filter(e => e.type === 'retard').reduce((s,e) => s + e.minutes, 0);
      const totalSupp   = weekEvents.filter(e => e.type === 'supp').reduce((s,e) => s + e.minutes, 0);
      const rows = users.map(u => {
        const ue = weekEvents.filter(e => e.user_id === u.id);
        const r  = ue.filter(e => e.type === 'retard').reduce((s,e) => s + e.minutes, 0);
        const s  = ue.filter(e => e.type === 'supp').reduce((s,e) => s + e.minutes, 0);
        const pills = [r ? `<span class="wt-pill wt-retard">+${r}min retard</span>` : '', s ? `<span class="wt-pill wt-supp">+${s}min supp</span>` : ''].filter(Boolean).join('');
        return `<tr><td class="wt-name">${escapeHtml(u.name)}</td><td>${pills||'<span style="color:var(--text-muted);font-size:.78rem">RAS</span>'}</td></tr>`;
      }).join('');
      el.innerHTML = `<table class="week-table">
        <caption class="sr-only">Résumé retards et heures supplémentaires de la semaine</caption>
        <thead><tr><th scope="col">Staff</th><th scope="col">Cette semaine</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${(totalRetard || totalSupp) ? `<div style="margin-top:10px;font-size:.78rem;color:var(--text-muted)" role="status">Total semaine : ${totalRetard?`+${totalRetard}min retard `:''} ${totalSupp?`+${totalSupp}min supp`:''}</div>` : ''}`;
    }

    socket.on('task:updated', () => { loadDay(); announce('Tâches mises à jour'); });
    socket.on('cuisine:time-events:updated', () => { loadDay(); announce('Signalements mis à jour'); });

    loadDay();
  </script>
</body>
</html>
