<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Planning Cuisine — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#0b2d3e">
  <style>
    /* ── Week nav ── */
    .week-nav { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:20px; }
    .week-nav-btn { background:var(--bg-card); border:1px solid var(--border); color:var(--text-muted); border-radius:20px; padding:7px 16px; font-size:.82rem; cursor:pointer; transition:border-color .15s,color .15s; white-space:nowrap; }
    .week-nav-btn:hover { border-color:var(--primary); color:var(--primary); }
    .week-label { font-size:.95rem; font-weight:700; text-align:center; flex:1; }

    /* ── Planning grid ── */
    .planning-grid { width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .planning-table { width:100%; border-collapse:collapse; min-width:600px; }
    .planning-table th {
      background:var(--bg-surface); border:1px solid var(--border);
      padding:8px 6px; font-size:.75rem; font-weight:700; text-align:center;
      color:var(--text-muted); white-space:nowrap;
    }
    .planning-table th.today-col { background:var(--primary-dim); color:var(--primary); border-color:var(--primary); }
    .planning-table td { border:1px solid var(--border); padding:4px; vertical-align:top; min-width:80px; }
    .staff-cell { background:var(--bg-card); padding:8px 10px; font-weight:700; font-size:.88rem; white-space:nowrap; }

    /* ── Shift cell ── */
    .shift-cell {
      background:var(--bg-card); min-height:56px; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:2px; border-radius:4px; padding:4px; transition:background .12s;
      text-align:center;
    }
    .shift-cell:hover { background:var(--bg-hover); }
    .shift-cell.is-work {
      background:rgba(205,164,67,.12); border:1.5px solid rgba(205,164,67,.35);
    }
    .shift-cell.is-off {
      background:rgba(232,84,84,.07); border:1.5px solid rgba(232,84,84,.25);
    }
    .shift-cell.is-empty { border:1.5px dashed var(--border); }
    .shift-cell .sc-time { font-size:.78rem; font-weight:700; color:var(--primary); line-height:1.2; }
    .shift-cell .sc-off { font-size:.75rem; font-weight:600; color:var(--danger); }
    .shift-cell .sc-empty { font-size:.7rem; color:var(--text-muted); }
    .today-col .shift-cell.is-work { background:rgba(205,164,67,.2); border-color:var(--primary); }

    /* ── Read only badge ── */
    .readonly-badge {
      display:inline-flex; align-items:center; gap:5px; font-size:.75rem;
      color:var(--text-muted); background:var(--bg-surface); border:1px solid var(--border);
      border-radius:20px; padding:4px 12px; margin-bottom:14px;
    }

    /* ── WhatsApp button ── */
    .btn-whatsapp {
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      background:#25d366; color:#fff; border:none;
      border-radius:var(--radius-sm); padding:13px 20px;
      font-size:.95rem; font-weight:700; cursor:pointer;
      transition:background .15s; text-decoration:none;
      white-space:nowrap; width:100%;
    }
    .btn-whatsapp:hover { background:#1da851; }
    .btn-whatsapp svg { width:20px; height:20px; fill:currentColor; flex-shrink:0; }

    /* ── Preview box ── */
    .preview-box {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-family: monospace;
      font-size: .82rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 340px;
      overflow-y: auto;
    }
    .preview-label {
      font-size: .72rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }

    /* ── Drawer ── */
    .drawer-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; opacity:0; pointer-events:none; transition:opacity .25s; }
    .drawer-backdrop.open { opacity:1; pointer-events:auto; }
    .drawer { position:fixed; bottom:0; left:0; right:0; z-index:201; background:var(--bg-card); border-radius:20px 20px 0 0; box-shadow:0 -8px 40px rgba(0,0,0,.5); transform:translateY(102%); transition:transform .3s cubic-bezier(.32,.72,0,1); max-height:92dvh; display:flex; flex-direction:column; }
    .drawer.open { transform:translateY(0); }
    @media (min-width:641px) {
      .drawer { bottom:auto; top:50%; left:50%; right:auto; transform:translate(-50%,-40%); opacity:0; pointer-events:none; border-radius:var(--radius); width:100%; max-width:380px; transition:transform .25s ease,opacity .25s ease; }
      .drawer.open { transform:translate(-50%,-50%); opacity:1; pointer-events:auto; }
    }
    .drawer-handle { width:40px; height:4px; background:rgba(255,255,255,.15); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
    @media (min-width:641px) { .drawer-handle { display:none; } }
    .drawer-head { display:flex; align-items:center; justify-content:space-between; padding:14px 20px 12px; flex-shrink:0; border-bottom:1px solid var(--border); }
    .drawer-title { font-size:1rem; font-weight:700; }
    .drawer-close { width:30px; height:30px; border-radius:50%; background:var(--bg-surface); color:var(--text-muted); display:flex; align-items:center; justify-content:center; font-size:.9rem; cursor:pointer; border:none; }
    .drawer-body { overflow-y:auto; padding:16px 20px; flex:1; }
    .drawer-footer { display:flex; gap:8px; padding:10px 20px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--border); flex-shrink:0; }
    .drawer-footer .btn { flex:1; justify-content:center; min-height:46px; }
    .frow { display:flex; flex-direction:column; gap:14px; }
    .fgroup { display:flex; flex-direction:column; gap:6px; }
    .fgroup label { font-size:.82rem; font-weight:600; color:var(--text-muted); }
    .f2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .off-toggle { display:flex; align-items:center; gap:12px; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 16px; cursor:pointer; }
    .off-toggle input { width:18px; height:18px; cursor:pointer; accent-color:var(--danger); }
    .off-toggle label { cursor:pointer; font-size:.9rem; }
  </style>
</head>
<body>
  <nav class="nav" id="nav"></nav>

  <div class="page">
    <div class="container-sm">

      <div class="page-header">
        <div>
          <div class="page-title">📅 Planning Cuisine</div>
          <div class="page-subtitle" id="weekSubtitle"></div>
        </div>
        <button id="btnValidate" class="btn btn-primary hidden" onclick="openPreview()">
          ✅ Valider le planning
        </button>
      </div>

      <div class="week-nav">
        <button class="week-nav-btn" onclick="shiftWeek(-1)">← Semaine préc.</button>
        <span class="week-label" id="weekLabel"></span>
        <button class="week-nav-btn" onclick="shiftWeek(1)">Semaine suiv. →</button>
      </div>

      <div id="readonlyBadge" class="readonly-badge hidden">👁 Lecture seule</div>

      <div class="planning-grid">
        <table class="planning-table" id="planningTable">
          <thead id="planningHead"></thead>
          <tbody id="planningBody"></tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- Backdrop (partagé — ferme tout) -->
  <div class="drawer-backdrop" id="drawerBackdrop" onclick="closeAll()"></div>

  <!-- Preview drawer -->
  <div class="drawer" id="previewDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <div class="drawer-title">📋 Aperçu du planning</div>
      <button class="drawer-close" onclick="closePreview()">✕</button>
    </div>
    <div class="drawer-body">
      <div class="preview-label">Message qui sera envoyé</div>
      <div class="preview-box" id="previewBox"></div>
    </div>
    <div class="drawer-footer" style="flex-direction:column;gap:10px;">
      <button class="btn-whatsapp" onclick="sendToWhatsApp()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        Ouvrir WhatsApp &amp; Envoyer
      </button>
      <button class="btn btn-secondary" onclick="closePreview()" style="justify-content:center;">Modifier encore</button>
    </div>
  </div>

  <!-- Shift editor drawer -->
  <div class="drawer" id="shiftDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <div class="drawer-title" id="shiftDrawerTitle">Modifier le shift</div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body">
      <form id="shiftForm" onsubmit="saveShift(event)">
        <input type="hidden" id="shiftUserId">
        <input type="hidden" id="shiftDayDate">
        <input type="hidden" id="shiftWeekStart">
        <div class="frow">
          <label class="off-toggle" onclick="toggleOff()">
            <input type="checkbox" id="shiftIsOff">
            <span>❌ Jour de repos</span>
          </label>
          <div id="shiftTimeFields" class="frow">
            <div class="f2">
              <div class="fgroup"><label>Début</label><input type="time" id="shiftStart" value="09:00"></div>
              <div class="fgroup"><label>Fin</label><input type="time" id="shiftEnd" value="17:00"></div>
            </div>
          </div>
        </div>
      </form>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-secondary" id="shiftBtnClear" onclick="clearShift()" style="flex:0 0 auto;padding:0 16px">🗑</button>
      <button class="btn btn-secondary" onclick="closeDrawer()">Annuler</button>
      <button type="submit" form="shiftForm" class="btn btn-primary">Enregistrer</button>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script>
    buildNav('cuisine-planning');
    const socket = io();

    let currentWeekStart = getMonday(new Date());
    let planningData = { users: [], shifts: [] };
    let isChef = false;
    let editUserId = null, editDayDate = null;

    const DAYS = [
      { label: 'Lundi',     short: 'Lun' },
      { label: 'Mardi',     short: 'Mar' },
      { label: 'Mercredi',  short: 'Mer' },
      { label: 'Jeudi',     short: 'Jeu' },
      { label: 'Vendredi',  short: 'Ven' },
      { label: 'Samedi',    short: 'Sam' },
      { label: 'Dimanche',  short: 'Dim' },
    ];

    function getMonday(d) {
      const dt = new Date(d);
      const day = dt.getDay();
      const diff = (day === 0 ? -6 : 1 - day);
      dt.setDate(dt.getDate() + diff);
      return dt.toISOString().split('T')[0];
    }

    function addDays(dateStr, n) {
      const d = new Date(dateStr);
      d.setDate(d.getDate() + n);
      return d.toISOString().split('T')[0];
    }

    function fmtWeekLabel(weekStart) {
      const end = addDays(weekStart, 6);
      const s = new Date(weekStart);
      const e = new Date(end);
      return `${s.getDate()} ${s.toLocaleDateString('fr-FR',{month:'short'})} → ${e.getDate()} ${e.toLocaleDateString('fr-FR',{month:'short',year:'numeric'})}`;
    }

    function shiftWeek(d) {
      currentWeekStart = addDays(currentWeekStart, d * 7);
      load();
    }

    async function init() {
      const user = await api.get('/api/auth/me');
      if (!user) return;
      isChef = user.role === 'admin' || (user.role === 'manager' && user.shift === 'cuisine');
      if (!isChef) {
        document.getElementById('readonlyBadge').classList.remove('hidden');
      } else {
        document.getElementById('btnValidate').classList.remove('hidden');
      }
      await load();
    }

    // ── WhatsApp send ─────────────────────────────────────────────
    function sendToWhatsApp() {
      const msg = buildMessage();
      const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
      window.open(url, '_blank');
      closePreview();
      showToast('WhatsApp ouvert — sélectionne le groupe 👍', 'success');
    }

    async function load() {
      document.getElementById('weekLabel').textContent = fmtWeekLabel(currentWeekStart);
      document.getElementById('weekSubtitle').textContent = `Semaine du ${formatDate(currentWeekStart)}`;
      const data = await api.get(`/api/cuisine/planning?weekStart=${currentWeekStart}`);
      if (!data) return;
      planningData = data;
      render();
    }

    function render() {
      const todayStr = today();
      const head = document.getElementById('planningHead');
      const body = document.getElementById('planningBody');

      const dayDates = DAYS.map((_, i) => addDays(currentWeekStart, i));

      // Header
      head.innerHTML = `<tr>
        <th style="min-width:90px;text-align:left;padding-left:10px">Staff</th>
        ${DAYS.map((d, i) => {
          const dd = dayDates[i];
          const isToday = dd === todayStr;
          const [,dm,dj] = dd.split('-');
          return `<th class="${isToday ? 'today-col' : ''}">${d.short}<br><span style="font-weight:400;font-size:.68rem">${dj}/${dm}</span></th>`;
        }).join('')}
      </tr>`;

      // Body
      body.innerHTML = planningData.users.map(u => `
        <tr>
          <td class="staff-cell">${u.name}</td>
          ${dayDates.map(dd => {
            const shift = planningData.shifts.find(s => s.user_id === u.id && s.day_date === dd);
            const isToday = dd === todayStr;
            let cellHtml, cellClass;

            if (!shift) {
              cellClass = 'shift-cell is-empty';
              cellHtml = isChef ? `<span class="sc-empty">+</span>` : '';
            } else if (shift.is_off) {
              cellClass = 'shift-cell is-off';
              cellHtml = `<span class="sc-off">Repos</span>`;
            } else {
              cellClass = 'shift-cell is-work';
              const s = shift.start_time ? shift.start_time.slice(0,5) : '';
              const e = shift.end_time   ? shift.end_time.slice(0,5)   : '';
              cellHtml = `<span class="sc-time">${s}<br>${e}</span>`;
            }

            const onclick = isChef ? `onclick="openShiftEditor(${u.id},'${dd}','${u.name}')"` : '';
            return `<td class="${isToday ? 'today-col' : ''}"><div class="${cellClass}" ${onclick}>${cellHtml}</div></td>`;
          }).join('')}
        </tr>
      `).join('');
    }

    // ── Shift editor ──────────────────────────────────────────────────────────
    function openShiftEditor(userId, dayDate, userName) {
      if (!isChef) return;
      editUserId  = userId;
      editDayDate = dayDate;

      const d = new Date(dayDate);
      const dayName = d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
      document.getElementById('shiftDrawerTitle').textContent = `${userName} — ${dayName}`;
      document.getElementById('shiftUserId').value   = userId;
      document.getElementById('shiftDayDate').value  = dayDate;
      document.getElementById('shiftWeekStart').value = currentWeekStart;

      const shift = planningData.shifts.find(s => s.user_id === userId && s.day_date === dayDate);
      const isOff = shift?.is_off;
      document.getElementById('shiftIsOff').checked = !!isOff;
      document.getElementById('shiftStart').value   = shift?.start_time?.slice(0,5) || '09:00';
      document.getElementById('shiftEnd').value     = shift?.end_time?.slice(0,5)   || '17:00';
      document.getElementById('shiftTimeFields').style.display = isOff ? 'none' : 'flex';

      document.getElementById('drawerBackdrop').classList.add('open');
      document.getElementById('shiftDrawer').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function toggleOff() {
      setTimeout(() => {
        const isOff = document.getElementById('shiftIsOff').checked;
        document.getElementById('shiftTimeFields').style.display = isOff ? 'none' : 'flex';
      }, 10);
    }

    function closeAll() {
      document.getElementById('drawerBackdrop').classList.remove('open');
      document.getElementById('shiftDrawer').classList.remove('open');
      document.getElementById('previewDrawer').classList.remove('open');
      document.body.style.overflow = '';
    }

    function closeDrawer() { closeAll(); }

    function openPreview() {
      if (!planningData.users.length) {
        showToast('Aucun planning à envoyer', 'warning');
        return;
      }
      document.getElementById('previewBox').textContent = buildMessage();
      document.getElementById('drawerBackdrop').classList.add('open');
      document.getElementById('previewDrawer').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closePreview() { closeAll(); }

    function buildMessage() {
      const dayDates = DAYS.map((_, i) => addDays(currentWeekStart, i));
      const weekLabel = fmtWeekLabel(currentWeekStart);

      let msg = `📅 Planning Cuisine — ${weekLabel}\n`;
      msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;

      planningData.users.forEach(u => {
        msg += `👤 ${u.name}\n`;
        let hasAny = false;
        dayDates.forEach((dd, i) => {
          const shift = planningData.shifts.find(s => s.user_id === u.id && s.day_date === dd);
          if (!shift) return;
          hasAny = true;
          const dayShort = DAYS[i].short;
          const [,wm,wj] = dd.split('-'); const dateStr = `${wj}/${wm}`;
          if (shift.is_off) {
            msg += `• ${dayShort} ${dateStr} : 📴 Repos\n`;
          } else {
            const start = shift.start_time ? shift.start_time.slice(0,5) : '?';
            const end   = shift.end_time   ? shift.end_time.slice(0,5)   : '?';
            msg += `• ${dayShort} ${dateStr} : ${start} → ${end}\n`;
          }
        });
        if (!hasAny) msg += `• Aucun créneau défini\n`;
        msg += '\n';
      });

      msg += `━━━━━━━━━━━━━━━━━━━━\n`;
      msg += `Mos Pub Mercière 🍺`;
      return msg;
    }

    async function saveShift(e) {
      e.preventDefault();
      const userId    = parseInt(document.getElementById('shiftUserId').value);
      const dayDate   = document.getElementById('shiftDayDate').value;
      const weekStart = document.getElementById('shiftWeekStart').value;
      const isOff     = document.getElementById('shiftIsOff').checked;
      const startTime = document.getElementById('shiftStart').value;
      const endTime   = document.getElementById('shiftEnd').value;

      await api.put('/api/cuisine/planning', {
        user_id:    userId,
        day_date:   dayDate,
        week_start: weekStart,
        start_time: isOff ? null : startTime,
        end_time:   isOff ? null : endTime,
        is_off:     isOff ? 1 : 0,
      });
      closeDrawer();
      await load();
      showToast('Planning mis à jour ✓', 'success');
    }

    async function clearShift() {
      if (!confirm('Effacer ce créneau ?')) return;
      const userId  = parseInt(document.getElementById('shiftUserId').value);
      const dayDate = document.getElementById('shiftDayDate').value;
      const ws      = document.getElementById('shiftWeekStart').value;
      const r = await fetch('/api/cuisine/planning', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, day_date: dayDate, week_start: ws })
      });
      if (r.status === 401) { window.location.href = '/'; return; }
      closeDrawer();
      await load();
      showToast('Créneau supprimé', 'info');
    }

    socket.on('cuisine:planning:updated', ({ weekStart, data }) => {
      if (weekStart === currentWeekStart) {
        planningData = data;
        render();
      }
    });

    init();
  </script>
</body>
</html>
