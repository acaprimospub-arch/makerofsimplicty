<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Demande de congés — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#08141c">
  <style>
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px; }
    .form-group input, .form-group textarea { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:10px 12px; font-size:14px; box-sizing:border-box; font-family:inherit; }
    .form-group input[readonly] { opacity:.6; cursor:default; }
    .form-group textarea { resize:vertical; min-height:80px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    .sig-wrap { border:1px solid var(--border); border-radius:10px; overflow:hidden; background:#fff; position:relative; }
    .sig-wrap canvas { display:block; width:100%; touch-action:none; cursor:crosshair; }
    .sig-placeholder { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#aaa; font-size:13px; pointer-events:none; user-select:none; }
    .sig-clear { position:absolute; top:8px; right:8px; background:rgba(0,0,0,.12); border:none; border-radius:6px; color:#555; font-size:11px; padding:3px 8px; cursor:pointer; }

    .sent-state { display:none; text-align:center; padding:32px 16px; }
    .sent-state .sent-icon  { font-size:3rem; margin-bottom:8px; }
    .sent-state .sent-title { font-size:1.1rem; font-weight:700; margin-bottom:6px; }
    .sent-state .sent-sub   { font-size:13px; color:var(--text-muted); }

    .demande-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; font-size:13px; }
    .demande-info { flex:1; min-width:0; }
    .demande-info strong { display:block; font-size:13px; }
    .demande-info small  { color:var(--text-muted); font-size:11px; }
    .demande-motif { font-size:11px; color:var(--text-muted); font-style:italic; margin-top:2px; }
    .sp-pending  { background:rgba(245,166,36,.15); color:var(--orange, #F5A624); }
    .sp-approved { background:var(--success-bg); color:var(--success); }
    .sp-rejected { background:rgba(232,84,84,.12); color:var(--danger); }
    .status-pill { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; flex-shrink:0; }

    @media(min-width:900px) { .container-sm { max-width:680px !important; } }
  </style>
</head>
<body>
  <nav class="nav" id="nav" role="navigation" aria-label="Navigation principale"></nav>

  <main class="page" id="main-content" tabindex="-1">
    <div class="container-sm">

      <header class="page-header" style="margin-bottom:20px">
        <div>
          <h1 class="page-title">Demande de congés</h1>
        </div>
        <a href="/staff/planning.html" class="btn btn-secondary" style="font-size:.85rem">← Planning</a>
      </header>

      <section class="card" style="margin-bottom:20px" aria-labelledby="conge-form-title">
        <div class="card-header" style="margin-bottom:16px">
          <h2 class="card-title" id="conge-form-title" style="font-size:13px">Nouvelle demande</h2>
        </div>

        <div id="congeForm">
          <div class="form-row">
            <div class="form-group">
              <label for="fName">Employé(e)</label>
              <input type="text" id="fName" readonly aria-readonly="true">
            </div>
            <div class="form-group">
              <label for="fToday">Date de la demande</label>
              <input type="text" id="fToday" readonly aria-readonly="true">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="fFrom">Début souhaité <span aria-hidden="true">*</span></label>
              <input type="date" id="fFrom" required aria-required="true">
            </div>
            <div class="form-group">
              <label for="fTo">Fin souhaitée <span aria-hidden="true">*</span></label>
              <input type="date" id="fTo" required aria-required="true">
            </div>
          </div>

          <div class="form-group">
            <label for="fMotif">Motif <span style="font-weight:400;text-transform:none">(facultatif)</span></label>
            <textarea id="fMotif" placeholder="Ex : vacances, raison personnelle…"></textarea>
          </div>

          <div class="form-group">
            <label id="sig-label">Signature <span aria-hidden="true">*</span></label>
            <div class="sig-wrap" role="img" aria-labelledby="sig-label" aria-describedby="sig-hint">
              <canvas id="sigCanvas" height="120" aria-label="Zone de signature"></canvas>
              <span class="sig-placeholder" id="sigPlaceholder" aria-hidden="true">Signez ici</span>
              <button class="sig-clear" id="btnClearSig" type="button" aria-label="Effacer la signature">Effacer</button>
            </div>
            <p id="sig-hint" style="font-size:.72rem;color:var(--text-muted);margin-top:4px">Dessinez votre signature avec le doigt ou la souris.</p>
          </div>

          <button class="btn btn-primary" id="btnSubmitConge" style="width:100%;margin-top:6px" type="button">Envoyer la demande</button>
        </div>

        <div class="sent-state" id="sentState" role="alert" aria-live="assertive">
          <div class="sent-icon" aria-hidden="true">✅</div>
          <div class="sent-title">Demande envoyée !</div>
          <div class="sent-sub">Votre demande a été transmise à la direction.</div>
          <button class="btn" id="btnNewConge" style="margin-top:20px" type="button">Nouvelle demande</button>
        </div>
      </section>

      <section class="card" aria-labelledby="mes-demandes-title">
        <div class="card-header" style="margin-bottom:16px">
          <h2 class="card-title" id="mes-demandes-title" style="font-size:13px">Mes demandes</h2>
        </div>
        <div id="demandesList" aria-live="polite"><div class="empty-state">Chargement…</div></div>
      </section>

    </div>
  </main>

  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script>
    'use strict';

    buildNav('conges');
    document.getElementById('fToday').value = new Date().toLocaleDateString('fr-FR');

    // ── Init user ────────────────────────────────────────────────────────────────
    (async () => {
      const user = await api.get('/api/auth/me');
      if (user) document.getElementById('fName').value = user.name;
      loadDemandes();
    })();

    const labels  = { pending:'En attente', approved:'Validée', rejected:'Refusée' };
    const classes = { pending:'sp-pending', approved:'sp-approved', rejected:'sp-rejected' };
    const fmtDate = d => new Date(d).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' });

    async function loadDemandes() {
      const data = await api.get('/api/staff/conge-requests');
      const el   = document.getElementById('demandesList');
      if (!data || !data.length) { el.innerHTML = '<div class="empty-state">Aucune demande pour le moment</div>'; return; }
      el.innerHTML = `<ul role="list" style="list-style:none;margin:0;padding:0;">` +
        data.map(d => `
          <li class="demande-item">
            <div class="demande-info">
              <strong>${escapeHtml(fmtDate(d.date_from))} → ${escapeHtml(fmtDate(d.date_to))}</strong>
              <small>Demandé le ${escapeHtml(new Date(d.requested_at).toLocaleDateString('fr-FR'))}</small>
              ${d.motif ? `<div class="demande-motif">${escapeHtml(d.motif)}</div>` : ''}
            </div>
            <span class="status-pill ${classes[d.status] || 'sp-pending'}" role="status">${escapeHtml(labels[d.status] || d.status)}</span>
          </li>`).join('') + `</ul>`;
    }

    // ── Signature canvas ─────────────────────────────────────────────────────────
    const sigCanvas = document.getElementById('sigCanvas');
    const ctx       = sigCanvas.getContext('2d');
    let drawing = false, hasSig = false;

    function resizeCanvas() {
      const w = sigCanvas.offsetWidth;
      sigCanvas.width  = w;
      sigCanvas.height = 120;
      ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function getPos(e) {
      const r = sigCanvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return { x: (src.clientX - r.left) * (sigCanvas.width / r.width), y: (src.clientY - r.top) * (sigCanvas.height / r.height) };
    }

    sigCanvas.addEventListener('mousedown',  e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    sigCanvas.addEventListener('mousemove',  e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSig = true; document.getElementById('sigPlaceholder').style.display = 'none'; });
    sigCanvas.addEventListener('mouseup',    () => drawing = false);
    sigCanvas.addEventListener('mouseleave', () => drawing = false);
    sigCanvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive:false });
    sigCanvas.addEventListener('touchmove',  e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSig = true; document.getElementById('sigPlaceholder').style.display = 'none'; }, { passive:false });
    sigCanvas.addEventListener('touchend',   () => drawing = false);

    document.getElementById('btnClearSig').addEventListener('click', clearSig);
    function clearSig() {
      ctx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
      hasSig = false;
      document.getElementById('sigPlaceholder').style.display = '';
    }

    // ── Soumettre ────────────────────────────────────────────────────────────────
    document.getElementById('btnSubmitConge').addEventListener('click', submitConge);

    async function submitConge() {
      const dateFrom = document.getElementById('fFrom').value;
      const dateTo   = document.getElementById('fTo').value;
      if (!dateFrom || !dateTo) { showToast('Veuillez renseigner les dates', 'warning'); return; }
      if (new Date(dateFrom) > new Date(dateTo)) { showToast('La date de fin doit être après le début', 'warning'); return; }
      if (!hasSig) { showToast('Veuillez signer le formulaire', 'warning'); return; }

      const btn = document.getElementById('btnSubmitConge');
      btn.disabled = true; btn.textContent = 'Envoi…';

      try {
        const res = await api.post('/api/staff/conge-request', {
          dateFrom, dateTo,
          motif:     document.getElementById('fMotif').value.trim(),
          signature: sigCanvas.toDataURL('image/png'),
        });
        if (res?.ok) {
          document.getElementById('congeForm').style.display = 'none';
          document.getElementById('sentState').style.display = 'block';
          document.getElementById('sentState').focus();
          loadDemandes();
        } else {
          showToast(res?.error || "Erreur lors de l'envoi", 'error');
          btn.disabled = false; btn.textContent = 'Envoyer la demande';
        }
      } catch(e) {
        showToast('Erreur : ' + escapeHtml(e.message), 'error');
        btn.disabled = false; btn.textContent = 'Envoyer la demande';
      }
    }

    document.getElementById('btnNewConge').addEventListener('click', () => {
      document.getElementById('fFrom').value  = '';
      document.getElementById('fTo').value    = '';
      document.getElementById('fMotif').value = '';
      clearSig();
      document.getElementById('congeForm').style.display = '';
      document.getElementById('sentState').style.display = 'none';
      const btn = document.getElementById('btnSubmitConge');
      btn.disabled = false; btn.textContent = 'Envoyer la demande';
      btn.focus();
    });
  </script>
</body>
</html>
