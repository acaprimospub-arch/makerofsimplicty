<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Réservations — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#08141c">
  <style>
    /* ── Week nav ── */
    .week-nav { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .week-nav-btn { background:var(--bg-card); border:1px solid var(--border); color:var(--text-muted); border-radius:20px; padding:7px 14px; font-size:.82rem; cursor:pointer; white-space:nowrap; }
    .week-nav-btn:hover { border-color:var(--primary); color:var(--primary); }
    .week-nav-btn:focus-visible { box-shadow:var(--focus-ring); outline:none; }
    .week-label { font-weight:700; font-size:.92rem; }

    /* ── Alerte sans table ── */
    .no-table-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(251,146,60,.08);
      border: 1px solid rgba(251,146,60,.35);
      border-radius: 12px;
      padding: 11px 16px;
      margin-bottom: 16px;
      cursor: pointer;
      width: 100%;
      text-align: left;
    }
    .no-table-banner:hover { background: rgba(251,146,60,.13); }
    .no-table-banner:focus-visible { box-shadow:var(--focus-ring); outline:none; }
    .no-table-banner-text { flex:1; font-size:.85rem; }
    .no-table-banner-text strong { color: #fb923c; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px; margin-bottom: 20px;
    }
    .filter-field { display:flex; flex-direction:column; gap:4px; flex:1; min-width:100px; }
    .filter-field label { font-size:.75rem; font-weight:600; color:var(--text-muted); }
    .filter-bar input, .filter-bar select {
      background: var(--bg-surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 6px 10px;
      font-size:.83rem;
    }
    .filter-bar input:focus-visible, .filter-bar select:focus-visible { box-shadow:var(--focus-ring); outline:none; }
    .filter-bar input::placeholder { color: var(--text-muted); }
    .filter-toggle {
      padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--bg-surface); color: var(--text-muted); cursor: pointer;
      font-size:.8rem; font-weight:600; white-space:nowrap; transition:.15s;
      align-self: flex-end;
    }
    .filter-toggle.active { background:rgba(251,146,60,.15); border-color:#fb923c; color:#fb923c; }
    .filter-toggle:focus-visible { box-shadow:var(--focus-ring); outline:none; }

    /* ── Day column ── */
    .week-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px;
    }
    @media (max-width: 1100px) { .week-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 700px)  { .week-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 450px)  { .week-grid { grid-template-columns: 1fr; } }

    .day-col {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .day-col.is-today { border-color: var(--primary); }
    .day-head {
      padding: 10px 12px 8px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .day-name  { font-size:.78rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); }
    .day-date  { font-size:.82rem; font-weight:700; }
    .day-col.is-today .day-name { color:var(--primary); }
    .day-count { font-size:.7rem; font-weight:700; padding:2px 7px; border-radius:99px; background:var(--primary-dim); color:var(--primary); }
    .day-body  { padding: 8px; min-height: 60px; }

    /* ── Resa mini card ── */
    .rmc {
      display: block; width: 100%;
      border-radius: 8px; padding: 7px 9px; margin-bottom: 6px;
      cursor: pointer; border-left: 3px solid transparent; transition: opacity .15s;
      background: none; text-align: left; color: var(--text);
    }
    .rmc:last-of-type { margin-bottom: 0; }
    .rmc:hover { opacity: .8; }
    .rmc:focus-visible { box-shadow:var(--focus-ring); outline:none; }
    .rmc.confirmed { background:rgba(96,165,250,.1);  border-left-color:#60a5fa; }
    .rmc.arrived   { background:rgba(34,197,94,.1);   border-left-color:#22c55e; }
    .rmc.no_show   { background:rgba(239,68,68,.1);   border-left-color:#ef4444; }
    .rmc.cancelled { background:rgba(255,255,255,.04); border-left-color:rgba(255,255,255,.15); opacity:.5; }
    .rmc-top  { display:flex; align-items:center; gap:5px; }
    .rmc-time { font-size:.75rem; font-weight:800; min-width:34px; }
    .rmc-name { font-size:.78rem; font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .rmc-pax  { font-size:.7rem; color:var(--text-muted); margin-top:2px; display:flex; align-items:center; gap:4px; }
    .no-table-tag {
      font-size:.62rem; font-weight:700; color:#fb923c;
      background:rgba(251,146,60,.15); border-radius:4px; padding:1px 5px;
    }
    .table-tag {
      font-size:.62rem; font-weight:700; color:#22c55e;
      background:rgba(34,197,94,.12); border-radius:4px; padding:1px 5px;
    }
    .joy-badge { font-size:.62rem; font-weight:700; color:#a78bfa; background:rgba(167,139,250,.12); border-radius:4px; padding:1px 5px; }
    .day-add { display:block; width:100%; text-align:center; padding:6px; font-size:.72rem; color:var(--text-muted); cursor:pointer; border-radius:6px; background:none; border:none; }
    .day-add:hover { background:var(--bg-hover); color:var(--primary); }
    .day-add:focus-visible { box-shadow:var(--focus-ring); outline:none; }

    /* ── Drawer ── */
    .drawer-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; opacity:0; pointer-events:none; transition:opacity .25s; }
    .drawer-backdrop.open { opacity:1; pointer-events:auto; }
    .drawer {
      position:fixed; bottom:0; left:0; right:0; z-index:201;
      background:var(--bg-card); border-radius:20px 20px 0 0;
      box-shadow:0 -8px 40px rgba(0,0,0,.5); transform:translateY(102%);
      transition:transform .3s cubic-bezier(.32,.72,0,1); max-height:92dvh; display:flex; flex-direction:column;
    }
    .drawer.open { transform:translateY(0); }
    @media (prefers-reduced-motion: reduce) {
      .drawer { transition: none; }
      .drawer-backdrop { transition: none; }
    }
    @media (min-width:641px) {
      .drawer { bottom:auto; top:50%; left:50%; right:auto; transform:translate(-50%,-40%); opacity:0; pointer-events:none; border-radius:var(--radius); width:100%; max-width:480px; transition:transform .25s ease,opacity .25s ease; }
      .drawer.open { transform:translate(-50%,-50%); opacity:1; pointer-events:auto; }
    }
    .drawer-handle { width:40px; height:4px; background:rgba(255,255,255,.15); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
    @media (min-width:641px) { .drawer-handle { display:none; } }
    .drawer-head   { display:flex; align-items:center; justify-content:space-between; padding:14px 20px 12px; flex-shrink:0; border-bottom:1px solid var(--border); }
    .drawer-title  { font-size:1rem; font-weight:700; }
    .drawer-close  { width:30px; height:30px; border-radius:50%; background:var(--bg-surface); color:var(--text-muted); display:flex; align-items:center; justify-content:center; font-size:.9rem; cursor:pointer; border:none; }
    .drawer-close:focus-visible { box-shadow:var(--focus-ring); outline:none; }
    .drawer-body   { overflow-y:auto; padding:16px 20px; flex:1; }
    .drawer-footer { display:flex; gap:8px; padding:10px 20px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--border); flex-shrink:0; }
    .drawer-footer .btn { flex:1; justify-content:center; min-height:46px; }
    .frow   { display:flex; flex-direction:column; gap:14px; }
    .fgroup { display:flex; flex-direction:column; gap:6px; }
    .fgroup label { font-size:.82rem; font-weight:600; color:var(--text-muted); }
    .f2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    /* ── Table assign button ── */
    .table-assign-box {
      display: flex; flex-direction: column; gap: 10px;
    }
    .table-assigned-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .assigned-tag {
      padding: 4px 10px; border-radius: 8px;
      background: rgba(34,197,94,.12); color: #22c55e;
      font-size: .78rem; font-weight: 700; border: 1px solid rgba(34,197,94,.3);
    }
    .no-assigned-label {
      font-size: .82rem; color: var(--text-muted); font-style: italic;
    }
    .btn-assign-plan {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-radius: 10px;
      background: rgba(11,45,62,.6); border: 1.5px solid var(--border);
      color: var(--text); font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: .15s; width: 100%; justify-content: center;
    }
    .btn-assign-plan:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }
    .btn-assign-plan:focus-visible { box-shadow:var(--focus-ring); outline:none; }

    /* ── Pièces jointes ── */
    .attach-section { margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
    .attach-title { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
    .attach-list { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
    .attach-item { display:flex; align-items:center; gap:10px; padding:8px 10px; background:var(--bg-surface); border:1px solid var(--border); border-radius:8px; }
    .attach-icon { font-size:1.1rem; flex-shrink:0; }
    .attach-info { flex:1; min-width:0; }
    .attach-name { font-size:.82rem; font-weight:600; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .attach-meta { font-size:.72rem; color:var(--text-muted); }
    .attach-btn-open { background:rgba(230,184,74,.12); border:1.5px solid rgba(230,184,74,.3); color:var(--primary); border-radius:6px; padding:4px 10px; font-size:.75rem; font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .attach-btn-open:focus-visible { box-shadow:var(--focus-ring); outline:none; }
    .attach-btn-del  { background:rgba(232,84,84,.1); border:1.5px solid rgba(232,84,84,.3); color:var(--danger); border-radius:6px; padding:4px 8px; font-size:.75rem; cursor:pointer; flex-shrink:0; }
    .attach-btn-del:focus-visible { box-shadow:var(--focus-ring); outline:none; }
    .attach-upload-label { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:10px; background:var(--bg-surface); border:1.5px dashed var(--border); border-radius:8px; color:var(--text-muted); font-size:.83rem; font-weight:600; cursor:pointer; transition:border-color .15s,color .15s; }
    .attach-upload-label:hover { border-color:var(--primary); color:var(--primary); }
    .attach-upload-label:focus-within { box-shadow:var(--focus-ring); outline:none; }
    .attach-upload-label input[type="file"] { position:absolute; opacity:0; pointer-events:none; width:1px; height:1px; }

    /* ── Status buttons ── */
    .status-btns { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
    .status-btn {
      flex:1; min-width:80px; padding:9px 6px; border-radius:10px; border:1.5px solid transparent;
      font-size:.8rem; font-weight:700; cursor:pointer; text-align:center; transition:.15s;
      display:flex; align-items:center; justify-content:center; gap:5px;
    }
    .status-btn.confirmed { background:rgba(96,165,250,.12); border-color:rgba(96,165,250,.35); color:#60a5fa; }
    .status-btn.arrived   { background:rgba(34,197,94,.12);  border-color:rgba(34,197,94,.35);  color:#4ade80; }
    .status-btn.no_show   { background:rgba(239,68,68,.12);  border-color:rgba(239,68,68,.35);  color:#f87171; }
    .status-btn.cancelled { background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.2); color:var(--text-muted); }
    .status-btn[aria-pressed="true"] { filter:brightness(1.3); box-shadow:0 0 0 2px currentColor; }
    .status-btn:hover     { filter:brightness(1.2); }
    .status-btn:focus-visible { box-shadow:var(--focus-ring); outline:none; }

    /* ── Confirm modal ── */
    .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:400; display:flex; align-items:center; justify-content:center; padding:20px; }
    .confirm-overlay.hidden { display:none; }
    .confirm-box { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; max-width:340px; width:100%; }
    .confirm-box p { font-size:.92rem; margin-bottom:20px; line-height:1.5; }
    .confirm-actions { display:flex; gap:10px; justify-content:flex-end; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Aller au contenu principal</a>
  <nav class="nav" id="nav" role="navigation" aria-label="Navigation principale"></nav>

  <main class="page" id="main-content" tabindex="-1">
    <div class="container">

      <!-- Header -->
      <div class="page-header" style="margin-bottom:20px;">
        <div>
          <h1 class="page-title">Réservations</h1>
          <p class="page-subtitle" id="weekSubtitle"></p>
        </div>
        <button class="btn btn-primary" id="btnNewResa">+ Nouvelle</button>
      </div>

      <!-- Bannière sans table -->
      <button type="button" id="noTableBanner" class="no-table-banner hidden" aria-live="polite">
        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fb923c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <div class="no-table-banner-text">
          <strong id="noTableCount">0</strong> réservation(s) sans table assignée cette semaine
        </div>
        <span id="noTableBannerBtn" style="font-size:.8rem;color:#fb923c;font-weight:700;" aria-hidden="true">Voir →</span>
      </button>

      <!-- Week nav -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;">
        <div class="week-nav" role="group" aria-label="Navigation par semaine">
          <button class="week-nav-btn" id="btnPrevWeek" aria-label="Semaine précédente">← Préc.</button>
          <span class="week-label" id="weekLabel" aria-live="polite" aria-atomic="true"></span>
          <button class="week-nav-btn" id="btnNextWeek" aria-label="Semaine suivante">Suiv. →</button>
        </div>
        <button class="week-nav-btn" id="btnToday">Aujourd'hui</button>
      </div>

      <!-- Filtres -->
      <div class="filter-bar" role="search" aria-label="Filtrer les réservations">
        <div class="filter-field">
          <label for="filterName">Nom du client</label>
          <input type="search" id="filterName" placeholder="Rechercher…" autocomplete="off">
        </div>
        <div class="filter-field">
          <label for="filterSpace">Espace</label>
          <select id="filterSpace">
            <option value="">Tous les espaces</option>
          </select>
        </div>
        <div class="filter-field">
          <label for="filterStatus">Statut</label>
          <select id="filterStatus">
            <option value="">Tous les statuts</option>
            <option value="confirmed">Confirmées</option>
            <option value="arrived">Arrivées</option>
            <option value="no_show">No-shows</option>
            <option value="cancelled">Annulées</option>
          </select>
        </div>
        <button class="filter-toggle" id="filterNoTableBtn" type="button" aria-pressed="false">
          <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
          Sans table
        </button>
      </div>

      <!-- Grille semaine -->
      <div class="week-grid" id="weekGrid" role="list" aria-label="Réservations de la semaine"></div>

    </div>
  </main>

  <!-- Backdrop -->
  <div class="drawer-backdrop" id="backdrop" aria-hidden="true"></div>

  <!-- Drawer création / édition -->
  <div class="drawer" id="mainDrawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle" hidden>
    <div class="drawer-handle" aria-hidden="true"></div>
    <div class="drawer-head">
      <h2 class="drawer-title" id="drawerTitle">Nouvelle réservation</h2>
      <button class="drawer-close" id="btnCloseDrawer" aria-label="Fermer">
        <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer-body">
      <form id="resaForm" novalidate>
        <input type="hidden" id="resaId">
        <div class="frow">

          <div class="fgroup">
            <label for="resaName">Nom du client <span aria-hidden="true">*</span></label>
            <input type="text" id="resaName" aria-required="true" autocomplete="off" placeholder="Ex: Dupont" required>
          </div>

          <div class="f2">
            <div class="fgroup">
              <label for="resaDate">Date <span aria-hidden="true">*</span></label>
              <input type="date" id="resaDate" aria-required="true" required>
            </div>
            <div class="fgroup">
              <label for="resaTime">Heure <span aria-hidden="true">*</span></label>
              <input type="time" id="resaTime" aria-required="true" required>
            </div>
          </div>

          <div class="f2">
            <div class="fgroup">
              <label for="resaPax">Nb de personnes <span aria-hidden="true">*</span></label>
              <input type="number" id="resaPax" min="1" max="200" value="2" aria-required="true" required>
            </div>
            <div class="fgroup">
              <label for="resaPhone">Téléphone</label>
              <input type="tel" id="resaPhone" placeholder="06…" autocomplete="off">
            </div>
          </div>

          <div class="fgroup">
            <label for="resaSpace">Espace</label>
            <select id="resaSpace">
              <option value="">Non précisé</option>
              <option value="salle_bas">Salle Bas</option>
              <option value="etage">Étage</option>
              <option value="terrasse">Terrasse</option>
              <option value="coin_canap">Coin Canapé</option>
            </select>
          </div>

          <!-- Table assign (via plan de salle) -->
          <div class="fgroup">
            <p class="fgroup" style="margin:0;padding:0;font-size:.82rem;font-weight:600;color:var(--text-muted);">Tables assignées</p>
            <div class="table-assign-box">
              <div class="table-assigned-tags" id="assignedTagsDisplay" aria-live="polite">
                <span class="no-assigned-label">Aucune table assignée</span>
              </div>
              <button type="button" class="btn-assign-plan" id="btnAssignPlan">
                <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Assigner via le plan de salle
              </button>
            </div>
          </div>

          <div class="fgroup">
            <label for="resaNotes">Notes</label>
            <input type="text" id="resaNotes" placeholder="Allergies, demandes spéciales…">
          </div>

          <!-- Statut (édition seulement) -->
          <div id="statusSection" hidden>
            <div class="fgroup">
              <p style="font-size:.82rem;font-weight:600;color:var(--text-muted);margin:0 0 6px;">Statut</p>
              <div class="status-btns" role="group" aria-label="Statut de la réservation">
                <button type="button" class="status-btn confirmed" data-status="confirmed" aria-pressed="false">
                  <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                  Confirmée
                </button>
                <button type="button" class="status-btn arrived" data-status="arrived" aria-pressed="false">
                  <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                  Arrivée
                </button>
                <button type="button" class="status-btn no_show" data-status="no_show" aria-pressed="false">
                  <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
                  No-show
                </button>
                <button type="button" class="status-btn cancelled" data-status="cancelled" aria-pressed="false">
                  <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  Annulée
                </button>
              </div>
            </div>
          </div>

        </div>
      </form>

      <!-- Pièces jointes (visibles en mode édition seulement) -->
      <div class="attach-section" id="attachSection" hidden>
        <p class="attach-title">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          Pièces jointes
        </p>
        <div id="attachList" class="attach-list" aria-live="polite"></div>
        <label class="attach-upload-label" id="attachUploadLabel">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          Ajouter un fichier
          <input type="file" id="attachInput" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" aria-label="Choisir un fichier à joindre à la réservation">
        </label>
      </div>

    </div>
    <div class="drawer-footer">
      <button class="btn btn-danger btn-sm" id="btnDelete" style="flex:0 0 auto;padding:0 16px;" hidden aria-label="Supprimer cette réservation">
        <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      </button>
      <button class="btn btn-secondary" id="btnCancelDrawer">Annuler</button>
      <button type="submit" form="resaForm" class="btn btn-primary" id="btnSave">Enregistrer</button>
    </div>
  </div>

  <!-- Confirm modal -->
  <div class="confirm-overlay hidden" id="confirmOverlay" role="dialog" aria-modal="true" aria-labelledby="confirmMsg">
    <div class="confirm-box">
      <p id="confirmMsg"></p>
      <div class="confirm-actions">
        <button class="btn btn-secondary btn-sm" id="confirmCancel">Annuler</button>
        <button class="btn btn-danger btn-sm" id="confirmOk">Supprimer</button>
      </div>
    </div>
  </div>

  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script>
    buildNav('marketing-reservations');
    const socket = io();

    function _canManageAttachments() {
      const u = window.__mosUser;
      return u && (u.role === 'admin' || u.role === 'manager');
    }

    const DAYS_FR   = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    const STATUS_LABELS = { confirmed:'Confirmée', arrived:'Arrivée', no_show:'No-show', cancelled:'Annulée' };

    let currentWeekStart = getMonday(new Date());
    let allResas      = [];
    let allTables     = [];
    let currentStatus = 'confirmed';
    let editId        = null;
    let editDate      = null;
    let filterNoTable = false;
    let _drawerTrigger = null;
    let _confirmCb     = null;

    function getMonday(d) {
      const dt = new Date(d); const day = dt.getDay();
      dt.setDate(dt.getDate() + (day === 0 ? -6 : 1 - day));
      return dt.toISOString().split('T')[0];
    }
    function addDays(s, n) {
      const d = new Date(s); d.setDate(d.getDate() + n); return d.toISOString().split('T')[0];
    }
    function fmtWeek(ws) {
      const we = addDays(ws,6); const s = new Date(ws+'T12:00'); const e = new Date(we+'T12:00');
      return `${s.getDate()} ${s.toLocaleDateString('fr-FR',{month:'short'})} → ${e.getDate()} ${e.toLocaleDateString('fr-FR',{month:'short',year:'numeric'})}`;
    }

    // ─── Confirm modal ────────────────────────────────────────────
    function showConfirm(msg, cb) {
      _confirmCb = cb;
      document.getElementById('confirmMsg').textContent = msg;
      document.getElementById('confirmOverlay').classList.remove('hidden');
      document.getElementById('confirmOk').focus();
    }
    document.getElementById('confirmOk').addEventListener('click', () => {
      document.getElementById('confirmOverlay').classList.add('hidden');
      if (_confirmCb) { _confirmCb(); _confirmCb = null; }
    });
    document.getElementById('confirmCancel').addEventListener('click', () => {
      document.getElementById('confirmOverlay').classList.add('hidden');
      _confirmCb = null;
    });

    // ─── Week navigation ──────────────────────────────────────────
    document.getElementById('btnPrevWeek').addEventListener('click', () => { currentWeekStart = addDays(currentWeekStart, -7); loadWeek(); });
    document.getElementById('btnNextWeek').addEventListener('click', () => { currentWeekStart = addDays(currentWeekStart,  7); loadWeek(); });
    document.getElementById('btnToday').addEventListener('click',    () => { currentWeekStart = getMonday(new Date()); loadWeek(); });

    // ─── Filters ──────────────────────────────────────────────────
    document.getElementById('filterName').addEventListener('input', applyFilters);
    document.getElementById('filterSpace').addEventListener('change', applyFilters);
    document.getElementById('filterStatus').addEventListener('change', applyFilters);
    document.getElementById('noTableBanner').addEventListener('click', toggleNoTable);
    document.getElementById('filterNoTableBtn').addEventListener('click', toggleNoTable);

    function toggleNoTable() {
      filterNoTable = !filterNoTable;
      document.getElementById('filterNoTableBtn').classList.toggle('active', filterNoTable);
      document.getElementById('filterNoTableBtn').setAttribute('aria-pressed', String(filterNoTable));
      document.getElementById('noTableBannerBtn').textContent = filterNoTable ? 'Masquer ✕' : 'Voir →';
      applyFilters();
    }

    function applyFilters() {
      const name   = document.getElementById('filterName').value.trim().toLowerCase();
      const space  = document.getElementById('filterSpace').value;
      const status = document.getElementById('filterStatus').value;
      let filtered = allResas;
      if (name)          filtered = filtered.filter(r => r.customer_name.toLowerCase().includes(name));
      if (space)         filtered = filtered.filter(r => r.space === space);
      if (status)        filtered = filtered.filter(r => r.status === status);
      if (filterNoTable) filtered = filtered.filter(r => r.status !== 'cancelled' && (!r.table_ids || r.table_ids.length === 0));
      renderWeek(filtered);
    }

    // ─── New resa button ──────────────────────────────────────────
    document.getElementById('btnNewResa').addEventListener('click', () => openCreate());

    // ─── Load ─────────────────────────────────────────────────────
    async function init() {
      allTables = await api.get('/api/tables') || [];
      loadWeek();
    }

    async function loadWeek() {
      document.getElementById('weekLabel').textContent    = fmtWeek(currentWeekStart);
      document.getElementById('weekSubtitle').textContent = `Semaine du ${formatDate(currentWeekStart)}`;

      const from = currentWeekStart;
      const to   = addDays(currentWeekStart, 6);
      const data = await api.get(`/api/reservations/range?from=${from}&to=${to}`);
      if (!data) return;
      allResas = data;

      // Bannière sans table
      const noTable = allResas.filter(r => r.status !== 'cancelled' && (!r.table_ids || r.table_ids.length === 0));
      const banner = document.getElementById('noTableBanner');
      if (noTable.length > 0) {
        document.getElementById('noTableCount').textContent = noTable.length;
        banner.classList.remove('hidden');
      } else {
        banner.classList.add('hidden');
        if (filterNoTable) toggleNoTable();
      }

      // Space filter
      const spaces = [...new Set(data.map(r => r.space).filter(Boolean))].sort();
      const sel = document.getElementById('filterSpace');
      const prev = sel.value;
      sel.innerHTML = '<option value="">Tous les espaces</option>' +
        spaces.map(s => `<option value="${escapeHtml(s)}" ${s===prev?'selected':''}>${escapeHtml(s)}</option>`).join('');

      applyFilters();
    }

    // ─── Render week ──────────────────────────────────────────────
    function renderWeek(resas) {
      const todayStr = today();
      const grid     = document.getElementById('weekGrid');
      const dayDates = Array.from({length:7}, (_, i) => addDays(currentWeekStart, i));

      grid.innerHTML = dayDates.map(dd => {
        const isToday  = dd === todayStr;
        const dayResas = resas.filter(r => r.date === dd);
        const d        = new Date(dd+'T12:00');
        const dowIdx   = d.getDay();
        const dayLabel = `${DAYS_FR[dowIdx]} ${d.getDate()} ${d.toLocaleDateString('fr-FR',{month:'short'})}`;

        const cards = dayResas.map(r => {
          const noTable  = !r.table_ids || r.table_ids.length === 0;
          const joyBadge = r.joy_event_id ? `<span class="joy-badge">Joy</span>` : '';
          const tableTag = noTable
            ? `<span class="no-table-tag" aria-label="sans table assignée">⚠ sans table</span>`
            : `<span class="table-tag" aria-label="table ${r.table_names.join(', ')}">T.${escapeHtml(r.table_names.join('+'))}</span>`;
          const statusLabel = STATUS_LABELS[r.status] || r.status;
          return `<button type="button" class="rmc ${escapeHtml(r.status)}" data-resa-id="${r.id}"
            aria-label="${escapeHtml(r.customer_name)}, ${r.time}, ${r.party_size} personnes, ${statusLabel}">
              <div class="rmc-top">
                <span class="rmc-time">${escapeHtml(r.time)}</span>
                <span class="rmc-name">${joyBadge}${escapeHtml(r.customer_name)}</span>
              </div>
              <div class="rmc-pax" aria-hidden="true">
                ${r.party_size} pers. &nbsp;${tableTag}
              </div>
            </button>`;
        }).join('');

        return `<div class="day-col ${isToday?'is-today':''}" role="listitem" aria-label="${dayLabel}${isToday?' (aujourd\'hui)':''}">
            <div class="day-head" aria-hidden="true">
              <div>
                <div class="day-name">${DAYS_FR[dowIdx]}</div>
                <div class="day-date">${d.getDate()} ${d.toLocaleDateString('fr-FR',{month:'short'})}</div>
              </div>
              ${dayResas.length ? `<div class="day-count">${dayResas.length}</div>` : ''}
            </div>
            <div class="day-body">
              ${cards}
              <button type="button" class="day-add" data-add-date="${escapeHtml(dd)}" aria-label="Ajouter une réservation le ${dayLabel}">+ Ajouter</button>
            </div>
          </div>`;
      }).join('');

      // Delegation for resa cards and add buttons
      grid.querySelectorAll('.rmc').forEach(btn => {
        btn.addEventListener('click', () => openEdit(parseInt(btn.dataset.resaId)));
      });
      grid.querySelectorAll('.day-add').forEach(btn => {
        btn.addEventListener('click', () => openCreate(btn.dataset.addDate));
      });
    }

    // ─── Table display ─────────────────────────────────────────────
    function refreshAssignedDisplay(tableIds) {
      const box = document.getElementById('assignedTagsDisplay');
      if (!tableIds || tableIds.length === 0) {
        box.innerHTML = '<span class="no-assigned-label">Aucune table assignée</span>';
      } else {
        const names = tableIds.map(id => allTables.find(t => t.id === id)?.name || `T.${id}`);
        box.innerHTML = names.map(n => `<span class="assigned-tag">${escapeHtml(n)}</span>`).join('');
      }
    }

    document.getElementById('btnAssignPlan').addEventListener('click', goToFloorPlan);

    async function goToFloorPlan() {
      const name  = document.getElementById('resaName').value.trim();
      const date  = document.getElementById('resaDate').value;
      const returnPath = encodeURIComponent('/marketing/reservations.html');
      if (editId) {
        const body = {
          customer_name: name,
          date,
          time:       document.getElementById('resaTime').value,
          party_size: parseInt(document.getElementById('resaPax').value),
          phone:      document.getElementById('resaPhone').value.trim() || null,
          space:      document.getElementById('resaSpace').value || null,
          notes:      document.getElementById('resaNotes').value.trim() || null,
          status:     currentStatus,
        };
        await api.put(`/api/reservations/${editId}`, body);
        window.location.href = `/staff/tables.html?assignTo=${editId}&date=${date}&name=${encodeURIComponent(name)}&returnTo=${returnPath}`;
      } else {
        if (!name || !date) { showToast('Remplis au moins le nom et la date', 'warning'); return; }
        const body = {
          customer_name: name,
          date,
          time:       document.getElementById('resaTime').value || '12:00',
          party_size: parseInt(document.getElementById('resaPax').value) || 2,
          phone:      document.getElementById('resaPhone').value.trim() || null,
          space:      document.getElementById('resaSpace').value || null,
          notes:      document.getElementById('resaNotes').value.trim() || null,
          status:     'confirmed',
        };
        const created = await api.post('/api/reservations', body);
        if (!created?.id) { showToast('Erreur lors de la création', 'error'); return; }
        window.location.href = `/staff/tables.html?assignTo=${created.id}&date=${date}&name=${encodeURIComponent(name)}&returnTo=${returnPath}`;
      }
    }

    // ─── Drawer create ────────────────────────────────────────────
    function openCreate(date, triggerEl) {
      editId = null;
      editDate = date || today();
      currentStatus = 'confirmed';
      document.getElementById('drawerTitle').textContent = 'Nouvelle réservation';
      document.getElementById('resaId').value    = '';
      document.getElementById('resaName').value  = '';
      document.getElementById('resaDate').value  = editDate;
      document.getElementById('resaTime').value  = '12:00';
      document.getElementById('resaPax').value   = 2;
      document.getElementById('resaPhone').value = '';
      document.getElementById('resaSpace').value = '';
      document.getElementById('resaNotes').value = '';
      document.getElementById('statusSection').hidden  = true;
      document.getElementById('btnDelete').hidden      = true;
      document.getElementById('attachSection').hidden  = true;
      document.getElementById('btnSave').textContent = 'Créer';
      refreshAssignedDisplay([]);
      updateStatusBtns();
      openDrawer(triggerEl);
    }

    async function openEdit(id, triggerEl) {
      const r = allResas.find(r => r.id === id);
      if (!r) return;
      editId = id;
      editDate = r.date;
      currentStatus = r.status;
      document.getElementById('drawerTitle').textContent = `Modifier · ${r.customer_name}`;
      document.getElementById('resaId').value    = r.id;
      document.getElementById('resaName').value  = r.customer_name;
      document.getElementById('resaDate').value  = r.date;
      document.getElementById('resaTime').value  = r.time;
      document.getElementById('resaPax').value   = r.party_size;
      document.getElementById('resaPhone').value = r.phone || '';
      document.getElementById('resaSpace').value = r.space || '';
      document.getElementById('resaNotes').value = r.notes || '';
      document.getElementById('statusSection').hidden = false;
      document.getElementById('btnDelete').hidden = !!r.joy_event_id;
      document.getElementById('btnSave').textContent = 'Enregistrer';
      document.getElementById('attachSection').hidden = false;
      updateStatusBtns();
      refreshAssignedDisplay(r.table_ids || []);
      openDrawer(triggerEl);
      loadAttachments(id);
    }

    // ─── Status buttons ───────────────────────────────────────────
    document.querySelectorAll('.status-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentStatus = btn.dataset.status;
        updateStatusBtns();
      });
    });
    function updateStatusBtns() {
      document.querySelectorAll('.status-btn').forEach(b => {
        const active = b.dataset.status === currentStatus;
        b.setAttribute('aria-pressed', String(active));
      });
    }

    // ─── Pièces jointes ───────────────────────────────────────────
    function _attachIcon(mime) {
      if (!mime) return '📄';
      if (mime.startsWith('image/')) return '🖼️';
      if (mime === 'application/pdf') return '📕';
      if (mime.includes('word') || mime.includes('document')) return '📝';
      if (mime.includes('excel') || mime.includes('spreadsheet')) return '📊';
      return '📄';
    }
    function _fmtSize(bytes) {
      if (bytes < 1024) return bytes + ' o';
      if (bytes < 1024*1024) return (bytes/1024).toFixed(0) + ' Ko';
      return (bytes/1024/1024).toFixed(1) + ' Mo';
    }

    async function loadAttachments(resId) {
      const list = document.getElementById('attachList');
      if (!list) return;
      const atts = await api.get(`/api/reservations/${resId}/attachments`);
      if (!atts) return;
      const canManage = _canManageAttachments();
      document.getElementById('attachUploadLabel').style.display = canManage ? 'flex' : 'none';
      if (!atts.length) {
        list.innerHTML = `<p style="font-size:.78rem;color:var(--text-muted);font-style:italic;">Aucune pièce jointe</p>`;
        return;
      }
      list.innerHTML = atts.map(a => `
        <div class="attach-item" id="att-${a.id}">
          <span class="attach-icon" aria-hidden="true">${_attachIcon(a.mimetype)}</span>
          <div class="attach-info">
            <div class="attach-name" title="${escapeHtml(a.original_name)}">${escapeHtml(a.original_name)}</div>
            <div class="attach-meta">${_fmtSize(a.size)}${a.uploader_name ? ' · ' + escapeHtml(a.uploader_name) : ''}</div>
          </div>
          <button class="attach-btn-open" data-att-open="${a.id}" aria-label="Voir ${escapeHtml(a.original_name)}">Voir</button>
          ${canManage ? `<button class="attach-btn-del" data-att-del="${a.id}" data-att-resid="${resId}" aria-label="Supprimer ${escapeHtml(a.original_name)}">
            <svg aria-hidden="true" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>` : ''}
        </div>
      `).join('');

      list.querySelectorAll('[data-att-open]').forEach(btn => {
        btn.addEventListener('click', () => window.open(`/api/attachments/${btn.dataset.attOpen}/file`, '_blank'));
      });
      list.querySelectorAll('[data-att-del]').forEach(btn => {
        btn.addEventListener('click', () => deleteAttachment(parseInt(btn.dataset.attDel), parseInt(btn.dataset.attResid)));
      });
    }

    document.getElementById('attachInput').addEventListener('change', function() {
      if (this.files.length && editId) uploadAttachment(this);
    });

    async function uploadAttachment(input) {
      const file = input.files[0];
      const fd = new FormData();
      fd.append('file', file);
      const res = await fetch(`/api/reservations/${editId}/attachments`, { method:'POST', body:fd });
      input.value = '';
      if (!res.ok) {
        const err = await res.json().catch(()=>({}));
        showToast(err.error || 'Erreur upload', 'error');
        return;
      }
      showToast('Fichier ajouté', 'success');
      loadAttachments(editId);
    }

    async function deleteAttachment(attId, resId) {
      showConfirm('Supprimer cette pièce jointe ?', async () => {
        const res = await api.delete(`/api/attachments/${attId}`);
        if (res?.ok) {
          showToast('Pièce jointe supprimée', 'info');
          loadAttachments(resId);
        }
      });
    }

    // ─── Save ─────────────────────────────────────────────────────
    document.getElementById('resaForm').addEventListener('submit', saveResa);

    async function saveResa(e) {
      e.preventDefault();
      const body = {
        customer_name: document.getElementById('resaName').value.trim(),
        date:          document.getElementById('resaDate').value,
        time:          document.getElementById('resaTime').value,
        party_size:    parseInt(document.getElementById('resaPax').value),
        phone:         document.getElementById('resaPhone').value.trim() || null,
        space:         document.getElementById('resaSpace').value || null,
        notes:         document.getElementById('resaNotes').value.trim() || null,
        status:        editId ? currentStatus : 'confirmed',
      };
      if (editId) {
        await api.put(`/api/reservations/${editId}`, body);
        showToast('Réservation mise à jour', 'success');
      } else {
        await api.post('/api/reservations', body);
        showToast('Réservation créée', 'success');
      }
      closeDrawer();
      loadWeek();
    }

    document.getElementById('btnDelete').addEventListener('click', deleteResa);

    async function deleteResa() {
      if (!editId) return;
      showConfirm('Supprimer cette réservation ?', async () => {
        await fetch(`/api/reservations/${editId}`, { method:'DELETE' });
        closeDrawer();
        showToast('Réservation supprimée', 'info');
        loadWeek();
      });
    }

    // ─── Drawer helpers ───────────────────────────────────────────
    function _getFocusable(el) {
      return Array.from(el.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])'));
    }
    function _trapFocus(e) {
      const el = document.getElementById('mainDrawer');
      const items = _getFocusable(el);
      if (!items.length) return;
      if (e.key === 'Tab') {
        if (e.shiftKey) {
          if (document.activeElement === items[0]) { e.preventDefault(); items[items.length-1].focus(); }
        } else {
          if (document.activeElement === items[items.length-1]) { e.preventDefault(); items[0].focus(); }
        }
      }
      if (e.key === 'Escape') closeDrawer();
    }

    function openDrawer(triggerEl) {
      _drawerTrigger = triggerEl || document.activeElement;
      const drawer = document.getElementById('mainDrawer');
      drawer.hidden = false;
      document.getElementById('backdrop').classList.add('open');
      drawer.classList.add('open');
      document.body.style.overflow = 'hidden';
      drawer.addEventListener('keydown', _trapFocus);
      requestAnimationFrame(() => {
        const first = _getFocusable(drawer)[0];
        if (first) first.focus();
      });
    }
    function closeDrawer() {
      const drawer = document.getElementById('mainDrawer');
      drawer.classList.remove('open');
      document.getElementById('backdrop').classList.remove('open');
      document.body.style.overflow = '';
      drawer.removeEventListener('keydown', _trapFocus);
      setTimeout(() => { drawer.hidden = true; }, 300);
      if (_drawerTrigger && typeof _drawerTrigger.focus === 'function') {
        _drawerTrigger.focus();
        _drawerTrigger = null;
      }
    }

    document.getElementById('btnCloseDrawer').addEventListener('click', closeDrawer);
    document.getElementById('btnCancelDrawer').addEventListener('click', closeDrawer);
    document.getElementById('backdrop').addEventListener('click', closeDrawer);

    // ─── Socket ───────────────────────────────────────────────────
    socket.on('reservation:updated', loadWeek);
    socket.on('reservation:deleted', loadWeek);
    socket.on('joy:synced', () => { loadWeek(); showToast('Joy.io synchronisé', 'success'); });

    // ─── URL params ───────────────────────────────────────────────
    const _urlParams = new URLSearchParams(location.search);
    const urlDate    = _urlParams.get('date');
    const urlAssigned = _urlParams.get('assigned');
    if (urlDate) currentWeekStart = getMonday(new Date(urlDate));

    init().then(() => {
      if (urlAssigned === '1') showToast('Tables assignées avec succès', 'success');
    });
  </script>
</body>
</html>
