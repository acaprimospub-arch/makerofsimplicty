<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Plan de Tables — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#0b2d3e">
  <style>
    .floor-canvas { position:relative; overflow:hidden; background: repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.03) 39px,rgba(255,255,255,0.03) 40px), repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.03) 39px,rgba(255,255,255,0.03) 40px); }
    .floor-table { position:absolute; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:grab; user-select:none; transition:box-shadow 0.15s; }
    .floor-table:active { cursor:grabbing; }
    .floor-table.selected { box-shadow:0 0 0 3px var(--primary) !important; z-index:10; }
    .floor-table.is-deco { cursor:move; border-style:dashed !important; background:rgba(255,255,255,0.04) !important; color:rgba(255,255,255,0.3) !important; border-color:rgba(255,255,255,0.2) !important; }
    .table-name { font-weight:700; text-align:center; line-height:1.1; }
    .table-cap  { font-size:0.62rem; opacity:0.7; margin-top:2px; }
    .toolbar { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    .prop-panel { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-top:12px; }
    .zone-tabs { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:12px; }
    .zone-tab { padding:8px 16px; border-radius:var(--radius-sm); font-size:0.85rem; font-weight:600; background:var(--bg-card); border:1px solid var(--border); color:var(--text-muted); cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .zone-tab:hover { border-color:var(--primary-dim); color:var(--text); }
    .zone-tab.active { background:var(--primary-dim); border-color:var(--primary); color:var(--primary); }
    .zone-tab .count { font-size:0.75rem; opacity:0.7; margin-left:5px; }
  </style>
</head>
<body>
  <nav class="nav" id="nav"></nav>
  <div class="page">
    <div class="container" style="max-width:1400px;">
      <div class="page-header">
        <div>
          <div class="page-title">🗺️ Plan de Tables</div>
          <div class="page-subtitle">Glissez pour repositionner · Cliquez pour configurer</div>
        </div>
      </div>

      <!-- Onglets de zone -->
      <div class="zone-tabs" id="zoneTabs"></div>

      <!-- Barre d'outils -->
      <div class="toolbar">
        <button class="btn btn-primary btn-sm" onclick="addTable('square')">+ Table carrée</button>
        <button class="btn btn-secondary btn-sm" onclick="addTable('round')">+ Table ronde</button>
        <button class="btn btn-secondary btn-sm" onclick="addDecoration()">+ Décoration</button>
        <div style="flex:1"></div>
        <button class="btn btn-danger btn-sm" id="btnDelete" onclick="deleteSelected()" style="display:none;">🗑 Supprimer</button>
      </div>

      <!-- Panel propriétés -->
      <div class="prop-panel hidden" id="propPanel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <strong>Propriétés</strong>
          <button class="btn btn-secondary btn-sm" onclick="deselectAll()">✕</button>
        </div>
        <div class="form-row form-row-3">
          <div class="form-group">
            <label class="form-label">Nom / Numéro</label>
            <input type="text" id="propName" oninput="updateSelected()">
          </div>
          <div class="form-group">
            <label class="form-label">Capacité</label>
            <input type="number" id="propCapacity" min="0" max="50" oninput="updateSelected()">
          </div>
          <div class="form-group">
            <label class="form-label">Forme</label>
            <select id="propShape" onchange="updateSelected()">
              <option value="square">Carrée / Rectangulaire</option>
              <option value="round">Ronde</option>
            </select>
          </div>
        </div>
        <div class="form-row form-row-3" style="margin-top:10px;">
          <div class="form-group">
            <label class="form-label">Largeur (px)</label>
            <input type="number" id="propWidth" min="40" max="400" step="5" oninput="updateSelected()">
          </div>
          <div class="form-group">
            <label class="form-label">Hauteur (px)</label>
            <input type="number" id="propHeight" min="40" max="400" step="5" oninput="updateSelected()">
          </div>
          <div class="form-group">
            <label class="form-label">Zone</label>
            <select id="propZone" onchange="updateSelected()">
              <option value="salle_bas">Salle Bas</option>
              <option value="etage">Étage</option>
              <option value="coin_canap">Coin Canapé</option>
              <option value="terrasse">Terrasse</option>
            </select>
          </div>
        </div>
        <div style="margin-top:12px;">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:0.88rem;">
            <input type="checkbox" id="propDeco" onchange="updateSelected()" style="width:auto;accent-color:var(--primary);">
            Élément de décoration (non réservable — BAR, canapé, escalier…)
          </label>
        </div>
      </div>

      <!-- Canvas -->
      <div class="floor-container mt-3" style="overflow:auto;">
        <div class="floor-canvas" id="floorCanvas"></div>
      </div>

      <p class="text-xs text-muted mt-2" style="text-align:center;">
        Modifications sauvegardées automatiquement · Synchronisé sur tous les appareils en temps réel
      </p>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script>
    buildNav('plan');
    const socket = io();

    const ZONES = [
      { key:'salle_bas',  label:'Salle Bas',   canvasW:1150, canvasH:660 },
      { key:'etage',      label:'Étage',        canvasW:1000, canvasH:650 },
      { key:'coin_canap', label:'Coin Canapé',  canvasW:980,  canvasH:560 },
      { key:'terrasse',   label:'Terrasse',     canvasW:1120, canvasH:580 },
    ];

    let tables     = [];
    let currentZone = 'salle_bas';
    let selectedId  = null;
    let dragging    = null;
    let dragOffset  = { x:0, y:0 };
    let saveTimer   = null;

    // ── Chargement ────────────────────────────────────────────────
    async function loadTables() {
      const data = await api.get('/api/tables');
      if (!data) return;
      tables = data;
      renderZoneTabs();
      renderAll();
    }

    // ── Onglets ───────────────────────────────────────────────────
    function renderZoneTabs() {
      document.getElementById('zoneTabs').innerHTML = ZONES.map(z => {
        const count = tables.filter(t => t.zone === z.key && !t.is_decoration).length;
        return `<button class="zone-tab ${z.key === currentZone ? 'active' : ''}"
                        onclick="switchZone('${z.key}')">
                  ${z.label}<span class="count">${count}</span>
                </button>`;
      }).join('');
    }

    function switchZone(key) {
      currentZone = key;
      deselectAll();
      renderZoneTabs();
      renderAll();
    }

    // ── Rendu ─────────────────────────────────────────────────────
    function renderAll() {
      const zone = ZONES.find(z => z.key === currentZone);
      const canvas = document.getElementById('floorCanvas');
      canvas.style.width  = (zone?.canvasW ?? 1150) + 'px';
      canvas.style.height = (zone?.canvasH ?? 660)  + 'px';
      canvas.innerHTML = '';
      tables.filter(t => t.zone === currentZone).forEach(t => renderTable(t));
    }

    function renderTable(t) {
      const el = document.createElement('div');
      el.id = 'tbl-' + t.id;
      el.className = 'floor-table' + (t.is_decoration ? ' is-deco' : '');
      el.style.cssText = `
        left:${t.x}px; top:${t.y}px;
        width:${t.width}px; height:${t.height}px;
        border-radius:${t.shape==='round' ? '50%' : '10px'};
        border:2px solid ${t.is_decoration ? 'rgba(255,255,255,0.2)' : 'var(--border)'};
        background:${t.is_decoration ? 'rgba(255,255,255,0.04)' : 'var(--bg-surface)'};
        color:${t.is_decoration ? 'rgba(255,255,255,0.3)' : 'var(--text)'};
      `;
      const fs = Math.min(t.width, t.height) > 75 ? '0.78rem' : '0.62rem';
      el.innerHTML = `<div class="table-name" style="font-size:${fs}">${t.name}</div>
        ${!t.is_decoration ? `<div class="table-cap">${t.capacity}p</div>` : ''}`;

      el.addEventListener('mousedown',  e => startDrag(e, t.id));
      el.addEventListener('touchstart', e => startDrag(e, t.id), { passive:false });
      el.addEventListener('click',      e => { e.stopPropagation(); selectTable(t.id); });

      document.getElementById('floorCanvas').appendChild(el);
      if (selectedId === t.id) el.classList.add('selected');
    }

    // ── Sélection ─────────────────────────────────────────────────
    function selectTable(id) {
      selectedId = id;
      document.querySelectorAll('.floor-table').forEach(el => el.classList.remove('selected'));
      const el = document.getElementById('tbl-' + id);
      if (el) el.classList.add('selected');
      const t = tables.find(t => t.id === id);
      if (t) {
        document.getElementById('propName').value     = t.name;
        document.getElementById('propCapacity').value = t.capacity;
        document.getElementById('propShape').value    = t.shape;
        document.getElementById('propWidth').value    = t.width;
        document.getElementById('propHeight').value   = t.height;
        document.getElementById('propZone').value     = t.zone;
        document.getElementById('propDeco').checked   = !!t.is_decoration;
        document.getElementById('propPanel').classList.remove('hidden');
        document.getElementById('btnDelete').style.display = 'flex';
      }
    }

    function deselectAll() {
      selectedId = null;
      document.querySelectorAll('.floor-table').forEach(el => el.classList.remove('selected'));
      document.getElementById('propPanel').classList.add('hidden');
      document.getElementById('btnDelete').style.display = 'none';
    }

    document.addEventListener('click', e => {
      if (e.target.id === 'floorCanvas') deselectAll();
    });

    // ── Drag & drop ───────────────────────────────────────────────
    function startDrag(e, id) {
      e.stopPropagation();
      selectTable(id);
      dragging = id;
      const el     = document.getElementById('tbl-' + id);
      const canvas = document.getElementById('floorCanvas').getBoundingClientRect();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      dragOffset.x = cx - canvas.left - parseFloat(el.style.left);
      dragOffset.y = cy - canvas.top  - parseFloat(el.style.top);
    }

    document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
    document.addEventListener('touchmove', e => {
      if (dragging) { e.preventDefault(); moveDrag(e.touches[0].clientX, e.touches[0].clientY); }
    }, { passive:false });

    function moveDrag(cx, cy) {
      if (!dragging) return;
      const canvas = document.getElementById('floorCanvas').getBoundingClientRect();
      const el = document.getElementById('tbl-' + dragging);
      if (!el) return;
      const x = Math.max(0, Math.round((cx - canvas.left - dragOffset.x) / 5) * 5);
      const y = Math.max(0, Math.round((cy - canvas.top  - dragOffset.y) / 5) * 5);
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
    }

    document.addEventListener('mouseup',  () => endDrag());
    document.addEventListener('touchend', () => endDrag());

    function endDrag() {
      if (!dragging) return;
      const el = document.getElementById('tbl-' + dragging);
      if (el) {
        const x = parseFloat(el.style.left);
        const y = parseFloat(el.style.top);
        const t = tables.find(t => t.id === dragging);
        if (t) { t.x = x; t.y = y; }
        scheduleSave(dragging, { x, y });
      }
      dragging = null;
    }

    // ── Mise à jour propriétés ────────────────────────────────────
    function updateSelected() {
      if (!selectedId) return;
      const t = tables.find(t => t.id === selectedId);
      if (!t) return;
      t.name         = document.getElementById('propName').value;
      t.capacity     = parseInt(document.getElementById('propCapacity').value) || 0;
      t.shape        = document.getElementById('propShape').value;
      t.width        = parseInt(document.getElementById('propWidth').value) || 65;
      t.height       = parseInt(document.getElementById('propHeight').value) || 65;
      t.zone         = document.getElementById('propZone').value;
      t.is_decoration = document.getElementById('propDeco').checked ? 1 : 0;

      // Re-render this table
      const old = document.getElementById('tbl-' + selectedId);
      if (old) old.remove();
      if (t.zone === currentZone) renderTable(t);

      scheduleSave(selectedId, t);
      renderZoneTabs();
    }

    function scheduleSave(id, data) {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(async () => {
        await api.put(`/api/tables/${id}`, data);
      }, 600);
    }

    // ── Ajouter table ─────────────────────────────────────────────
    async function addTable(shape) {
      const result = await api.post('/api/tables', {
        name: `T${tables.filter(t=>t.zone===currentZone&&!t.is_decoration).length + 1}`,
        zone: currentZone,
        x: 50, y: 50,
        width: shape==='round' ? 80 : 65,
        height: shape==='round' ? 80 : 65,
        shape, capacity: 2, is_decoration: 0
      });
      if (result?.error) { showToast(result.error, 'error'); return; }
      tables.push(result);
      renderZoneTabs();
      renderTable(result);
      selectTable(result.id);
      showToast('Table ajoutée', 'success');
    }

    async function addDecoration() {
      const result = await api.post('/api/tables', {
        name: 'DÉCOR',
        zone: currentZone,
        x: 50, y: 50,
        width: 100, height: 60,
        shape: 'square', capacity: 0, is_decoration: 1
      });
      if (result?.error) { showToast(result.error, 'error'); return; }
      tables.push(result);
      renderZoneTabs();
      renderTable(result);
      selectTable(result.id);
      showToast('Élément ajouté', 'success');
    }

    // ── Supprimer ─────────────────────────────────────────────────
    async function deleteSelected() {
      if (!selectedId) return;
      const t = tables.find(t => t.id === selectedId);
      if (!confirm(`Supprimer "${t?.name}" ?`)) return;
      await api.delete(`/api/tables/${selectedId}`);
      tables = tables.filter(t => t.id !== selectedId);
      const el = document.getElementById('tbl-' + selectedId);
      if (el) el.remove();
      deselectAll();
      renderZoneTabs();
      showToast('Supprimé', 'info');
    }

    // ── Sync temps réel ───────────────────────────────────────────
    socket.on('table:created', t => {
      if (!tables.find(x => x.id === t.id)) { tables.push(t); renderZoneTabs(); if (t.zone===currentZone) renderTable(t); }
    });
    socket.on('table:updated', t => {
      const idx = tables.findIndex(x => x.id === t.id);
      if (idx >= 0) tables[idx] = t;
      renderZoneTabs();
      const el = document.getElementById('tbl-' + t.id);
      if (el) el.remove();
      if (t.zone === currentZone) renderTable(t);
    });
    socket.on('table:deleted', ({ id }) => {
      tables = tables.filter(t => t.id !== id);
      renderZoneTabs();
      const el = document.getElementById('tbl-' + id);
      if (el) el.remove();
    });

    loadTables();
  </script>
</body>
</html>
