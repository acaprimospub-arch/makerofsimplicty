<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mes Tâches — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#08141c">
  <style>
    .task-item.my-done {
      border-left-color:var(--primary);
      background:rgba(230,184,74,.06);
    }
    .task-item.my-done .task-desc {
      text-decoration:line-through;
      color:var(--text-muted);
    }
    .task-item.my-done .task-checkbox {
      background:var(--primary); color:#000;
      border-color:var(--primary); font-weight:900;
    }
    .task-item.others-done {
      border-left-color:#5b8dee;
      background:rgba(91,141,238,.04);
    }
    .task-item.others-done .task-desc {
      text-decoration:line-through;
      color:var(--text-muted);
    }
    .task-item.others-done .task-checkbox {
      background:rgba(91,141,238,.18); color:#5b8dee;
      border-color:#5b8dee;
    }

    /* Task item as button */
    .task-item {
      width:100%; text-align:left; cursor:pointer;
      background:none; border:none; border-left:3px solid var(--border);
      padding:16px 14px !important; min-height:60px !important;
      display:flex; align-items:flex-start; gap:12px;
      border-radius:0; transition:background .12s;
    }
    .task-item:hover { background:var(--bg-hover); }
    .task-checkbox {
      width:28px !important; height:28px !important;
      font-size:1rem !important; border-radius:8px !important;
      min-width:28px; border:2px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .task-content { flex:1; min-width:0; }
    .task-desc { font-size:.9rem; line-height:1.4; }

    .task-completers {
      display:flex; flex-wrap:wrap; gap:4px; margin-top:8px;
    }
    .completer-avatar {
      width:28px; height:28px; border-radius:50%;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:10px; font-weight:800; flex-shrink:0; cursor:default;
    }
    .completer-avatar.me {
      background:rgba(230,184,74,.25); color:var(--primary);
      border:2px solid var(--primary);
    }
    .completer-avatar.other {
      background:rgba(91,141,238,.18); color:#5b8dee;
      border:2px solid rgba(91,141,238,.6);
    }

    .tab-count {
      display:inline-block; font-size:.72rem; font-weight:700;
      opacity:.6; margin-left:5px;
    }
    .tab[aria-selected="true"] .tab-count { opacity:1; color:var(--primary); }

    @keyframes task-check { 0%{transform:scale(1)} 35%{transform:scale(.93)} 100%{transform:scale(1)} }
    .task-item.toggling { animation:task-check 0.2s ease-out; }

    .team-stats-bar {
      display:flex; align-items:center; gap:6px;
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:var(--radius); padding:10px 16px;
      margin-bottom:16px; flex-wrap:wrap;
    }
    .team-stat-item { display:flex; align-items:center; gap:6px; font-size:.82rem; white-space:nowrap; }
    .team-stat-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .team-stat-dot.mine  { background:var(--primary); }
    .team-stat-dot.team  { background:#5b8dee; }
    .team-stat-dot.left  { background:var(--border); border:1px solid #555; }
    .team-stat-label { color:var(--text-muted); }
    .team-stat-value { font-weight:700; color:var(--text); }
    .team-stat-sep { color:var(--border); margin:0 4px; }

    .subsection-count { font-size:.72rem; color:var(--text-muted); font-weight:400; margin-left:8px; }
    .subsection-count .done-count { color:var(--primary); font-weight:600; }

    .shift-messages { margin-top:28px; display:flex; flex-direction:column; gap:14px; }
    .msg-card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:var(--radius); overflow:hidden;
    }
    .msg-card-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px; border-bottom:1px solid var(--border); gap:10px;
    }
    .msg-card-title { font-size:.88rem; font-weight:700; display:flex; align-items:center; gap:8px; }
    .msg-from-badge { font-size:.7rem; font-weight:700; padding:2px 8px; border-radius:20px; }
    .msg-from-midi { background:rgba(240,180,41,.15); color:var(--warning); border:1px solid rgba(240,180,41,.3); }
    .msg-from-soir { background:rgba(155,114,240,.12); color:#9b72f0; border:1px solid rgba(155,114,240,.3); }
    .msg-edit-btn {
      font-size:.78rem; color:var(--text-muted);
      background:var(--bg-surface); border:1px solid var(--border);
      border-radius:20px; padding:4px 12px; cursor:pointer;
      white-space:nowrap; flex-shrink:0;
    }
    .msg-edit-btn:hover { border-color:var(--primary); color:var(--primary); }
    .msg-body { padding:14px 16px; }
    .msg-text { font-size:.9rem; line-height:1.55; white-space:pre-wrap; word-break:break-word; }
    .msg-empty { font-size:.85rem; color:var(--text-muted); font-style:italic; }
    .msg-author { font-size:.72rem; color:var(--text-muted); margin-top:8px; }
    .msg-compose {
      padding:12px 16px; display:flex; flex-direction:column; gap:10px;
      border-top:1px solid var(--border); background:var(--bg-surface);
    }
    .msg-compose textarea { border-radius:var(--radius-sm); resize:none; font-size:.9rem; min-height:80px; }
    .msg-compose-actions { display:flex; gap:8px; justify-content:flex-end; }
  </style>
</head>
<body>
  <nav class="nav" id="nav" role="navigation" aria-label="Navigation principale"></nav>

  <main class="page" id="main-content" tabindex="-1">
    <div class="container-sm">
      <header class="page-header">
        <div>
          <h1 class="page-title" id="pageTitle">Mes Tâches</h1>
          <p class="page-subtitle" id="dateLabel"></p>
        </div>
      </header>

      <!-- Tab bar + progress globale -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:12px;">
        <div role="tablist" aria-label="Catégories de tâches" class="tabs" id="tabBar"></div>
        <div style="display:flex;align-items:center;gap:10px;min-width:220px;" aria-label="Progression globale">
          <progress id="progressBar" aria-label="Progression globale" value="0" max="100" style="width:1px;height:1px;opacity:0;position:absolute;pointer-events:none;" tabindex="-1"></progress>
          <div class="progress-bar" style="flex:1;" aria-hidden="true">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
          <span class="text-sm text-muted" id="progressLabel" aria-live="polite" aria-atomic="true">0/0</span>
        </div>
      </div>

      <!-- Stats équipe -->
      <div class="team-stats-bar" id="teamStatsBar" aria-label="Statistiques équipe" role="status">
        <div class="team-stat-item">
          <div class="team-stat-dot mine" aria-hidden="true"></div>
          <span class="team-stat-label">Moi :</span>
          <span class="team-stat-value" id="statMe">0</span>
        </div>
        <span class="team-stat-sep" aria-hidden="true">·</span>
        <div class="team-stat-item">
          <div class="team-stat-dot team" aria-hidden="true"></div>
          <span class="team-stat-label">Collègues :</span>
          <span class="team-stat-value" id="statTeam">0</span>
        </div>
        <span class="team-stat-sep" aria-hidden="true">·</span>
        <div class="team-stat-item">
          <div class="team-stat-dot left" aria-hidden="true"></div>
          <span class="team-stat-label">Restantes :</span>
          <span class="team-stat-value" id="statLeft">0</span>
        </div>
      </div>

      <!-- Tasks list — panels are injected here -->
      <div id="tasksPanels"></div>

      <!-- Messages d'équipe -->
      <div class="shift-messages" id="shiftMessages"></div>
    </div>
  </main>

  <div id="toast-container"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script>
    'use strict';

    buildNav('taches');
    document.getElementById('dateLabel').textContent = formatDate(today());

    const socket = io();
    let allTasks    = [];
    let currentTab  = null;
    let currentUser = null;
    let activeTabs  = null;

    const TAB_CONFIG = {
      midi: [
        { key:'matin',     label:'MATIN' },
        { key:'passation', label:'PASSATION' },
      ],
      soir: [
        { key:'soir', label:'FERMETURE' },
      ],
      all: [
        { key:'matin',     label:'MATIN' },
        { key:'passation', label:'PASSATION' },
        { key:'soir',      label:'FERMETURE' },
      ],
    };

    // ─── Init ─────────────────────────────────────────────────────────────────
    async function init() {
      currentUser = await api.get('/api/auth/me');
      if (!currentUser) return;

      activeTabs = TAB_CONFIG[
        (currentUser.role === 'admin' || currentUser.role === 'manager') ? 'all' : currentUser.shift
      ] || TAB_CONFIG.midi;
      currentTab = activeTabs[0].key;

      if (currentUser.role === 'admin' || currentUser.role === 'manager') {
        document.getElementById('pageTitle').textContent = 'Toutes les tâches';
      } else if (currentUser.shift === 'soir') {
        document.getElementById('pageTitle').textContent = 'Fermeture';
      }

      // Build tab buttons
      const tabBar = document.getElementById('tabBar');
      tabBar.innerHTML = activeTabs.map((t, i) => `
        <button role="tab"
                class="tab${t.key === currentTab ? ' active' : ''}"
                id="tab-${t.key}"
                aria-selected="${t.key === currentTab ? 'true' : 'false'}"
                aria-controls="pane-${t.key}"
                tabindex="${t.key === currentTab ? '0' : '-1'}">${escapeHtml(t.label)}</button>
      `).join('');

      // Build tab panels
      const panelsEl = document.getElementById('tasksPanels');
      panelsEl.innerHTML = activeTabs.map(t => `
        <div role="tabpanel" id="pane-${t.key}" aria-labelledby="tab-${t.key}"${t.key !== currentTab ? ' hidden' : ''}></div>
      `).join('');

      // Tab click/keyboard navigation
      tabBar.querySelectorAll('[role="tab"]').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.id.replace('tab-', '')));
        btn.addEventListener('keydown', e => {
          const idx  = activeTabs.findIndex(t => t.key === btn.id.replace('tab-', ''));
          let next = -1;
          if (e.key === 'ArrowRight') next = (idx + 1) % activeTabs.length;
          if (e.key === 'ArrowLeft')  next = (idx - 1 + activeTabs.length) % activeTabs.length;
          if (e.key === 'Home')       next = 0;
          if (e.key === 'End')        next = activeTabs.length - 1;
          if (next >= 0) {
            e.preventDefault();
            switchTab(activeTabs[next].key);
            document.getElementById(`tab-${activeTabs[next].key}`).focus();
          }
        });
      });

      await loadTasks();
      await loadShiftMessages();
    }

    async function loadTasks() {
      const data = await api.get('/api/tasks');
      if (!data) return;
      allTasks = data;
      renderAllTabs();
    }

    function switchTab(tab) {
      currentTab = tab;
      activeTabs.forEach(t => {
        const btn   = document.getElementById(`tab-${t.key}`);
        const panel = document.getElementById(`pane-${t.key}`);
        const active = t.key === tab;
        btn.setAttribute('aria-selected', active ? 'true' : 'false');
        btn.setAttribute('tabindex', active ? '0' : '-1');
        btn.classList.toggle('active', active);
        panel.hidden = !active;
      });
    }

    function renderAllTabs() {
      activeTabs.forEach(t => renderTabPanel(t.key));
      updateGlobalStats();
    }

    function updateGlobalStats() {
      const tasks     = allTasks.filter(t => t.category === currentTab);
      const totalDone = tasks.filter(t => t.completion_count > 0).length;
      const myDone    = tasks.filter(t => t.my_completed).length;
      const onlyTeam  = tasks.filter(t => t.completion_count > 0 && !t.my_completed).length;
      const remaining = tasks.filter(t => t.completion_count === 0).length;
      const pct       = tasks.length ? Math.round(totalDone / tasks.length * 100) : 0;

      const fill = document.getElementById('progressFill');
      fill.style.width = pct + '%';
      fill.className   = 'progress-fill' + (pct === 100 ? ' success' : '');

      document.getElementById('progressBar').value = pct;
      document.getElementById('progressBar').max   = 100;
      document.getElementById('progressLabel').innerHTML =
        `<span style="font-size:1.05rem;font-weight:800;color:var(--text)">${pct}%</span>` +
        `<span style="color:var(--text-muted);font-size:.8rem;margin-left:5px">${totalDone}/${tasks.length}</span>`;

      document.getElementById('statMe').textContent   = myDone;
      document.getElementById('statTeam').textContent = onlyTeam;
      document.getElementById('statLeft').textContent = remaining;

      // Update tab labels with counts
      activeTabs.forEach(tabCfg => {
        const tabTasks = allTasks.filter(t => t.category === tabCfg.key);
        const tabDone  = tabTasks.filter(t => t.completion_count > 0).length;
        const btn      = document.getElementById(`tab-${tabCfg.key}`);
        if (btn) btn.innerHTML = `${escapeHtml(tabCfg.label)} <span class="tab-count" aria-hidden="true">${tabDone}/${tabTasks.length}</span>`;
      });
    }

    function renderTabPanel(tabKey) {
      const panelEl = document.getElementById(`pane-${tabKey}`);
      if (!panelEl) return;

      const tasks = allTasks.filter(t => t.category === tabKey);
      if (!tasks.length) {
        panelEl.innerHTML = `<div class="empty-state"><div class="empty-state-text">Aucune tâche pour cette catégorie.</div></div>`;
        return;
      }

      const sections = {};
      tasks.forEach(t => {
        if (!sections[t.section]) sections[t.section] = {};
        if (!sections[t.section][t.subsection]) sections[t.section][t.subsection] = [];
        sections[t.section][t.subsection].push(t);
      });

      panelEl.innerHTML = Object.entries(sections).map(([section, subsections]) => `
        <div class="task-section">
          <div class="task-section-header">
            <span class="task-section-title">${escapeHtml(section)}</span>
          </div>
          ${Object.entries(subsections).map(([sub, items]) => {
            const subDone = items.filter(t => t.completion_count > 0).length;
            const countLabel = subDone > 0
              ? `<span class="subsection-count" aria-label="${subDone} sur ${items.length} faite${subDone > 1 ? 's' : ''}">(<span class="done-count" aria-hidden="true">${subDone}</span><span aria-hidden="true">/${items.length}</span>)</span>`
              : `<span class="subsection-count" aria-hidden="true">(${items.length})</span>`;
            return `
              <div class="task-subsection">
                <div class="task-subsection-header">${escapeHtml(sub)} ${countLabel}</div>
                ${items.map(t => renderTask(t)).join('')}
              </div>`;
          }).join('')}
        </div>
      `).join('');

      // Bind click handlers
      panelEl.querySelectorAll('.task-item').forEach(btn => {
        const id = parseInt(btn.dataset.taskId, 10);
        btn.addEventListener('click', () => toggleTask(id));
        btn.addEventListener('keydown', e => {
          if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleTask(id); }
        });
      });
    }

    function renderTask(t) {
      const isMine  = !!t.my_completed;
      const anyDone = t.completion_count > 0;
      let cssClass  = 'task-item';
      if (isMine)       cssClass += ' my-done';
      else if (anyDone) cssClass += ' others-done';

      let badgesHtml = '';
      if (anyDone && t.completers) {
        const names = t.completers.split(', ');
        badgesHtml = `<div class="task-completers" aria-label="Complété par : ${escapeHtml(t.completers)}">` +
          names.map(name => {
            const isMe     = currentUser && name === currentUser.name;
            const initials = name.split(' ').map(n => n[0] || '').join('').toUpperCase().slice(0, 2);
            return `<span class="completer-avatar ${isMe ? 'me' : 'other'}" aria-label="${escapeHtml(name)}" title="${escapeHtml(name)}" role="img">${escapeHtml(initials)}</span>`;
          }).join('') +
          `</div>`;
      }

      const checkHtml = (isMine || anyDone)
        ? `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        : '';

      const stateLabel = isMine ? 'Coché par moi' : (anyDone ? `Coché par ${t.completers}` : 'Non coché');

      return `
        <button class="${cssClass}"
                id="task-${t.id}"
                data-task-id="${t.id}"
                type="button"
                aria-pressed="${isMine ? 'true' : 'false'}"
                aria-label="${escapeHtml(t.description)} — ${stateLabel}">
          <div class="task-checkbox" aria-hidden="true">${checkHtml}</div>
          <div class="task-content">
            <div class="task-desc">${escapeHtml(t.description)}</div>
            ${badgesHtml}
          </div>
        </button>`;
    }

    async function toggleTask(id) {
      const task = allTasks.find(t => t.id === id);
      if (!task) return;

      if (task.my_completed) {
        await api.delete(`/api/tasks/${id}/complete`);
        task.my_completed   = 0;
        task.completion_count = Math.max(0, (task.completion_count || 1) - 1);
        if (task.completers && currentUser) {
          task.completers = task.completers.split(', ').filter(n => n !== currentUser.name).join(', ') || null;
        }
        announce(`Tâche décochée : ${task.description}`);
      } else {
        await api.post(`/api/tasks/${id}/complete`, {});
        task.my_completed     = 1;
        task.completion_count = (task.completion_count || 0) + 1;
        if (currentUser) {
          const names = task.completers ? task.completers.split(', ') : [];
          if (!names.includes(currentUser.name)) names.push(currentUser.name);
          task.completers = names.join(', ');
        }
        announce(`Tâche cochée : ${task.description}`);
      }

      const el = document.getElementById(`task-${id}`);
      if (el) {
        el.classList.add('toggling');
        setTimeout(() => { el.classList.remove('toggling'); renderAllTabs(); }, 200);
      } else {
        renderAllTabs();
      }
    }

    // ─── Socket.io real-time ─────────────────────────────────────────────────
    socket.on('task:updated', ({ taskId, userId, userName, completed }) => {
      if (userId === currentUser?.id) return;
      const task = allTasks.find(t => t.id === taskId);
      if (!task) return;

      const names = task.completers ? task.completers.split(', ') : [];
      if (completed) {
        if (!names.includes(userName)) names.push(userName);
        task.completion_count = (task.completion_count || 0) + 1;
      } else {
        const idx = names.indexOf(userName);
        if (idx > -1) names.splice(idx, 1);
        task.completion_count = Math.max(0, (task.completion_count || 1) - 1);
      }
      task.completers = names.join(', ') || null;
      renderAllTabs();
      announce(`${escapeHtml(userName)} a ${completed ? 'coché' : 'décoché'} une tâche.`);
    });

    // ─── Messages d'équipe ───────────────────────────────────────────────────
    let shiftMessages = { midiToSoir:null, soirToMatin:null };
    let editingMsg    = null;

    async function loadShiftMessages() {
      const data = await api.get(`/api/shift-messages?date=${today()}`);
      if (!data) return;
      shiftMessages = data;
      renderShiftMessages();
    }

    function canEditMidi() {
      return currentUser && (currentUser.shift === 'midi' || currentUser.role === 'admin' || (currentUser.role === 'manager' && currentUser.shift === 'midi'));
    }
    function canEditSoir() {
      return currentUser && (currentUser.shift === 'soir' || currentUser.role === 'admin' || (currentUser.role === 'manager' && currentUser.shift === 'soir'));
    }

    function renderShiftMessages() {
      const el = document.getElementById('shiftMessages');

      const renderCard = (type, msg, canEdit, title, fromBadge, fromBadgeClass, placeholder) => {
        const isEditing = editingMsg === type;
        const hasMsg    = msg && msg.message;
        const timeStr   = msg?.updated_at
          ? new Date(msg.updated_at).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' })
          : '';

        return `<div class="msg-card" role="region" aria-labelledby="msg-title-${type}">
          <div class="msg-card-header">
            <div class="msg-card-title" id="msg-title-${type}">
              ${escapeHtml(title)}
              <span class="msg-from-badge ${fromBadgeClass}">${escapeHtml(fromBadge)}</span>
            </div>
            ${canEdit ? `<button class="msg-edit-btn" id="msg-edit-btn-${type}" type="button" aria-expanded="${isEditing ? 'true' : 'false'}" aria-controls="msg-compose-${type}" data-type="${type}">
              ${isEditing ? 'Annuler' : (hasMsg ? 'Modifier' : 'Écrire')}
            </button>` : ''}
          </div>
          <div class="msg-body">
            ${isEditing ? '' : (hasMsg
              ? `<p class="msg-text">${escapeHtml(msg.message)}</p>
                 <p class="msg-author">${escapeHtml(msg.author_name || '?')} · ${escapeHtml(timeStr)}</p>`
              : `<p class="msg-empty">Aucun message pour le moment.</p>`
            )}
          </div>
          ${isEditing ? `
            <div class="msg-compose" id="msg-compose-${type}">
              <label class="form-label sr-only" for="msg-textarea-${type}">${escapeHtml(title)}</label>
              <textarea id="msg-textarea-${type}" placeholder="${escapeHtml(placeholder)}" rows="3">${hasMsg ? escapeHtml(msg.message) : ''}</textarea>
              <div class="msg-compose-actions">
                <button class="btn btn-secondary btn-sm" type="button" data-cancel="${type}">Annuler</button>
                <button class="btn btn-primary btn-sm" type="button" data-send="${type}">Envoyer</button>
              </div>
            </div>` : `<div id="msg-compose-${type}" hidden></div>`}
        </div>`;
      };

      el.innerHTML =
        renderCard('midi', shiftMessages.midiToSoir, canEditMidi(),
          "Pour l'équipe du soir", 'Midi → Soir', 'msg-from-midi',
          'Ex : Le bar est en rupture de citron · Résa de 20 personnes à 20h…') +
        renderCard('soir', shiftMessages.soirToMatin, canEditSoir(),
          "Pour l'équipe du matin", 'Soir → Matin', 'msg-from-soir',
          'Ex : Caisse validée · Problème frigo · Stock à commander…');

      // Bind edit-toggle buttons
      el.querySelectorAll('[data-type]').forEach(btn => {
        btn.addEventListener('click', () => toggleEditMsg(btn.dataset.type));
      });
      // Bind cancel buttons
      el.querySelectorAll('[data-cancel]').forEach(btn => {
        btn.addEventListener('click', () => toggleEditMsg(btn.dataset.cancel));
      });
      // Bind send buttons
      el.querySelectorAll('[data-send]').forEach(btn => {
        btn.addEventListener('click', () => sendMsg(btn.dataset.send));
      });
    }

    function toggleEditMsg(type) {
      editingMsg = editingMsg === type ? null : type;
      renderShiftMessages();
      if (editingMsg) {
        setTimeout(() => {
          const ta = document.getElementById(`msg-textarea-${type}`);
          if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
        }, 50);
      }
    }

    async function sendMsg(type) {
      const ta      = document.getElementById(`msg-textarea-${type}`);
      const message = ta?.value.trim();
      if (!message) return;
      await api.post('/api/shift-messages', { message });
      editingMsg = null;
      await loadShiftMessages();
      showToast('Message envoyé', 'success');
    }

    socket.on('shift-message:updated', ({ from_shift, msg }) => {
      if (from_shift === 'midi') shiftMessages.midiToSoir = msg;
      else shiftMessages.soirToMatin = msg;
      if (editingMsg !== from_shift) {
        renderShiftMessages();
        announce('Nouveau message d\'équipe reçu.');
      }
    });

    init();
  </script>
</body>
</html>
