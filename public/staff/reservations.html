<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Réservations — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#08141c">
  <style>
    :root { --orange:#F5A624; --orange-bg:rgba(245,166,36,.12); }

    .date-bar { display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .date-bar input[type="date"] { flex:1; min-width:140px; max-width:180px; }
    .btn-nav { background:var(--bg-card); border:1px solid var(--border); color:var(--text-muted); border-radius:20px; padding:6px 14px; font-size:.82rem; cursor:pointer; white-space:nowrap; transition:border-color .15s,color .15s; }
    .btn-nav:hover { border-color:var(--primary); color:var(--primary); }
    .btn-today.not-today { border-color:var(--primary) !important; color:var(--primary) !important; font-weight:600; }

    .chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .chip { display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:20px; border:1px solid var(--border); background:var(--bg-card); font-size:.8rem; white-space:nowrap; }
    .chip b { font-size:.95rem; }
    .chip-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

    .res-list { display:flex; flex-direction:column; gap:8px; }
    .res-card {
      background:var(--bg-card); border:1px solid var(--border); border-left:4px solid var(--border);
      border-radius:10px; padding:13px 14px; cursor:pointer;
      transition:border-color .15s,background .12s;
      display:grid; grid-template-columns:56px 1fr auto; gap:0 12px; align-items:start;
      box-shadow:0 1px 4px rgba(0,0,0,.15);
      width:100%; text-align:left;
    }
    .res-card:focus-visible { outline:none; box-shadow:var(--focus-ring); }
    .res-card:active { background:var(--bg-surface); }

    .res-card.vs-unplaced  { border-left-color:var(--orange);   background:var(--orange-bg); }
    .res-card.vs-placed    { border-left-color:var(--info);     background:var(--info-bg); }
    .res-card.vs-arrived   { border-left-color:var(--success);  background:var(--success-bg); }
    .res-card.vs-late      { border-left-color:var(--danger);   background:var(--danger-bg); animation:blink-card 1.5s ease-in-out infinite; }
    .res-card.vs-no_show   { border-left-color:var(--danger);   background:rgba(232,84,84,.08); opacity:.7; }
    .res-card.vs-cancelled { border-left-color:#555;            background:rgba(85,85,85,.07); opacity:.55; }
    .res-card.vs-cancelled .rc-time,.res-card.vs-cancelled .rc-name { text-decoration:line-through; color:#666; }
    @keyframes blink-card { 0%,100%{opacity:1} 50%{opacity:.55} }
    @media (prefers-reduced-motion:reduce) { .res-card.vs-late { animation:none; } }

    .rc-time { font-size:1.2rem; font-weight:800; letter-spacing:-.5px; padding-top:2px; line-height:1; }
    .rc-body { min-width:0; }
    .rc-name { font-size:1rem; font-weight:700; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .joy-tag { font-size:.65rem; font-weight:700; color:#9b72f0; background:rgba(155,114,240,.12); border:1px solid rgba(155,114,240,.3); border-radius:20px; padding:1px 7px; }
    .rc-meta { display:flex; flex-wrap:wrap; gap:5px 10px; margin-top:5px; font-size:.78rem; color:var(--text-muted); align-items:center; }
    .rc-meta a { color:var(--text-muted); }
    .rc-space { font-size:.72rem; font-weight:600; color:var(--warning); background:var(--warning-bg); border:1px solid rgba(240,180,41,.3); border-radius:20px; padding:1px 7px; }
    .rc-table-ok  { font-size:.72rem; font-weight:600; color:var(--success); background:var(--success-bg); border:1px solid rgba(76,175,106,.3); border-radius:20px; padding:1px 7px; }
    .rc-table-nok { font-size:.72rem; font-weight:600; color:var(--orange); background:var(--orange-bg); border:1px solid rgba(245,166,36,.3); border-radius:20px; padding:1px 7px; }
    .rc-notes { font-size:.73rem; color:var(--text-muted); font-style:italic; margin-top:3px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .rc-status { grid-column:3; align-self:center; display:flex; align-items:center; gap:6px; }

    .btn-arrived-quick {
      width:44px; height:44px; border-radius:50%;
      border:2px solid var(--success); background:var(--success-bg); color:var(--success);
      font-size:1.15rem; display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0; transition:background .15s,transform .1s; touch-action:manipulation;
    }
    .btn-arrived-quick:active { background:rgba(76,175,106,.3); transform:scale(0.9); }

    .status-pill {
      font-size:.7rem; font-weight:600; border-radius:20px; padding:4px 9px;
      border:1.5px solid; background:transparent; cursor:pointer; white-space:nowrap;
      appearance:none; -webkit-appearance:none; color:inherit; font-family:inherit;
    }
    .vs-unplaced  { border-color:var(--orange);   color:var(--orange); }
    .vs-placed    { border-color:var(--info);      color:var(--info); }
    .vs-arrived   { border-color:var(--success);   color:var(--success); }
    .vs-late      { border-color:var(--danger);    color:var(--danger); }
    .vs-no_show   { border-color:var(--danger);    color:var(--danger); }
    .vs-cancelled { border-color:#555;             color:#555; }

    .vs-badge { display:inline-flex; align-items:center; padding:5px 14px; border-radius:20px; font-size:.8rem; font-weight:700; border:1.5px solid; }
    .vsb-unplaced  { color:var(--orange);  border-color:var(--orange);  background:var(--orange-bg); }
    .vsb-placed    { color:var(--info);    border-color:var(--info);    background:var(--info-bg); }
    .vsb-arrived   { color:var(--success); border-color:var(--success); background:var(--success-bg); }
    .vsb-late      { color:var(--danger);  border-color:var(--danger);  background:var(--danger-bg); }
    .vsb-no_show   { color:var(--danger);  border-color:var(--danger);  background:rgba(232,84,84,.08); }
    .vsb-cancelled { color:#666;           border-color:#555;           background:rgba(85,85,85,.08); }

    .drawer-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; opacity:0; pointer-events:none; transition:opacity .25s; }
    .drawer-backdrop.open { opacity:1; pointer-events:auto; }
    .drawer { position:fixed; bottom:0; left:0; right:0; z-index:201; background:var(--bg-card); border-radius:20px 20px 0 0; box-shadow:0 -8px 40px rgba(0,0,0,.5); transform:translateY(102%); transition:transform .3s cubic-bezier(.32,.72,0,1); max-height:92dvh; display:flex; flex-direction:column; }
    .drawer.open { transform:translateY(0); }
    @media (min-width:641px) {
      .drawer-backdrop { backdrop-filter:blur(2px); }
      .drawer { bottom:auto; top:50%; left:50%; right:auto; transform:translate(-50%,-40%); opacity:0; pointer-events:none; border-radius:var(--radius); width:100%; max-width:520px; max-height:90vh; transition:transform .25s ease,opacity .25s ease; }
      .drawer.open { transform:translate(-50%,-50%); opacity:1; pointer-events:auto; }
    }
    @media (prefers-reduced-motion:reduce) { .drawer { transition:none; } }
    .drawer-handle { width:40px; height:4px; background:rgba(255,255,255,.15); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
    @media (min-width:641px) { .drawer-handle { display:none; } }
    .drawer-head { display:flex; align-items:center; justify-content:space-between; padding:14px 20px 12px; flex-shrink:0; border-bottom:1px solid var(--border); }
    .drawer-title { font-size:1rem; font-weight:700; }
    .drawer-close { width:30px; height:30px; border-radius:50%; background:var(--bg-surface); color:var(--text-muted); display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; flex-shrink:0; }
    .drawer-body { overflow-y:auto; padding:16px 20px; flex:1; -webkit-overflow-scrolling:touch; }
    .drawer-footer { display:flex; gap:8px; padding:10px 20px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--border); flex-shrink:0; }
    .drawer-footer .btn { flex:1; justify-content:center; min-height:46px; }

    .detail-view { display:flex; flex-direction:column; }
    .detail-row { display:flex; align-items:flex-start; gap:12px; padding:11px 0; border-bottom:1px solid var(--border); }
    .detail-row:last-child { border-bottom:none; }
    .detail-icon { font-size:1.1rem; width:28px; text-align:center; flex-shrink:0; padding-top:2px; }
    .detail-label { font-size:.73rem; color:var(--text-muted); margin-bottom:3px; }
    .detail-value { font-size:.95rem; font-weight:600; }
    .detail-value a { color:var(--text); }
    .detail-table-badge { display:inline-flex; align-items:center; gap:5px; font-size:.82rem; font-weight:600; padding:4px 12px; border-radius:20px; }
    .dtb-ok  { color:var(--success); background:var(--success-bg); border:1px solid rgba(76,175,106,.3); }
    .dtb-nok { color:var(--orange);  background:var(--orange-bg);  border:1px solid rgba(245,166,36,.3); }
    .detail-status-select { font-size:.82rem; font-weight:600; border-radius:20px; padding:5px 14px; border:1.5px solid var(--border); background:transparent; cursor:pointer; appearance:none; -webkit-appearance:none; color:var(--text); font-family:inherit; }

    .btn-assign { background:rgba(230,184,74,.1); border:1.5px solid rgba(230,184,74,.4); color:var(--primary); border-radius:var(--radius-sm); padding:13px 16px; font-size:.9rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; justify-content:center; transition:background .15s; width:100%; margin-top:16px; }
    .btn-assign:active { background:rgba(230,184,74,.2); }

    .admin-section { margin-top:16px; padding:14px; background:rgba(230,184,74,.06); border:1px solid rgba(230,184,74,.2); border-radius:var(--radius); }
    .admin-section-title { font-size:.73rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--primary); margin-bottom:10px; }
    .admin-notes-ro { font-size:.88rem; color:var(--text); white-space:pre-wrap; line-height:1.55; }

    .attach-section { margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
    .attach-title { font-size:.73rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-bottom:10px; }
    .attach-list { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
    .attach-item { display:flex; align-items:center; gap:10px; padding:8px 10px; background:var(--bg-surface); border:1px solid var(--border); border-radius:8px; }
    .attach-info { flex:1; min-width:0; }
    .attach-name { font-size:.82rem; font-weight:600; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .attach-meta { font-size:.72rem; color:var(--text-muted); }
    .attach-btn-open { background:rgba(230,184,74,.12); border:1.5px solid rgba(230,184,74,.3); color:var(--primary); border-radius:6px; padding:4px 10px; font-size:.75rem; font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .attach-btn-del  { background:rgba(232,84,84,.1); border:1.5px solid rgba(232,84,84,.3); color:var(--danger); border-radius:6px; padding:4px 8px; font-size:.75rem; cursor:pointer; flex-shrink:0; }
    .attach-upload-lbl { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:11px; background:var(--bg-surface); border:1.5px dashed var(--border); border-radius:8px; color:var(--text-muted); font-size:.83rem; font-weight:600; cursor:pointer; transition:border-color .15s,color .15s; }
    .attach-upload-lbl:hover { border-color:var(--primary); color:var(--primary); }

    .frow { display:flex; flex-direction:column; gap:14px; }
    .fgroup { display:flex; flex-direction:column; gap:6px; }
    .fgroup label { font-size:.82rem; font-weight:600; color:var(--text-muted); }
    .f2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .stepper { display:flex; align-items:stretch; border:1.5px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; height:46px; transition:border-color .2s; }
    .stepper:focus-within { border-color:var(--primary); }
    .stepper-btn { width:48px; background:var(--bg-surface); color:var(--text); font-size:1.4rem; font-weight:300; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; touch-action:manipulation; }
    .stepper-btn:active { background:var(--bg-hover); }
    .stepper-val { flex:1; text-align:center; background:var(--bg-card); border:none; border-left:1.5px solid var(--border); border-right:1.5px solid var(--border); color:var(--text); font-size:1.2rem; font-weight:700; font-family:inherit; padding:0; -moz-appearance:textfield; }
    .stepper-val::-webkit-inner-spin-button,.stepper-val::-webkit-outer-spin-button { -webkit-appearance:none; }

    .joy-sync-bar { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding:8px 12px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); font-size:.78rem; color:var(--text-muted); }
    .joy-sync-bar button { background:var(--bg-surface); border:1px solid var(--border); color:var(--text-muted); border-radius:20px; padding:4px 12px; font-size:.75rem; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .joy-sync-bar button:hover { border-color:var(--primary); color:var(--primary); }
  </style>
</head>
<body>
  <nav class="nav" id="nav" role="navigation" aria-label="Navigation principale"></nav>

  <main class="page" id="main-content" tabindex="-1">
    <div class="container-sm">

      <header class="page-header">
        <div>
          <h1 class="page-title">Réservations</h1>
          <p class="page-subtitle" id="dateLabel"></p>
        </div>
        <button class="btn btn-primary" id="btnCreate">+ Nouvelle</button>
      </header>

      <div role="group" aria-label="Navigation par date" class="date-bar">
        <button class="btn-nav" id="btnPrevDay" aria-label="Hier">← Hier</button>
        <label for="viewDate" class="sr-only">Date des réservations</label>
        <input type="date" id="viewDate">
        <button class="btn-nav btn-today" id="btnToday">Aujourd'hui</button>
        <button class="btn-nav" id="btnNextDay" aria-label="Demain">Demain →</button>
      </div>

      <div class="chips" id="chips" aria-live="polite" aria-atomic="true"></div>

      <div id="joySyncBar" class="joy-sync-bar" style="display:none" aria-label="Synchronisation Joy.io">
        <span style="flex:1" id="joySyncLabel" aria-live="polite">Joy.io</span>
        <button id="joySyncBtn" type="button">Sync Joy.io</button>
      </div>

      <div id="resList" class="res-list" aria-live="polite" aria-atomic="true"></div>

    </div>
  </main>

  <!-- Backdrop -->
  <div class="drawer-backdrop" id="backdrop"></div>

  <!-- Drawer DÉTAIL -->
  <div class="drawer" id="detailDrawer" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
    <div class="drawer-handle" aria-hidden="true"></div>
    <div class="drawer-head">
      <h2 class="drawer-title" id="detailTitle">Réservation</h2>
      <button class="drawer-close" id="detailClose" aria-label="Fermer le détail">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="drawer-body" id="detailBody"></div>
    <div class="drawer-footer">
      <button class="btn btn-secondary" id="detailBtnClose">Fermer</button>
      <button class="btn btn-danger" id="detailBtnDel" style="flex:0 0 auto;padding:0 16px" aria-label="Supprimer la réservation">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor" aria-hidden="true"><path d="M2 4h10M5 4V2h4v2M3 4l1 8h6l1-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </button>
      <button class="btn btn-primary" id="detailBtnEdit">Modifier</button>
    </div>
  </div>

  <!-- Drawer ÉDITION -->
  <div class="drawer" id="editDrawer" role="dialog" aria-modal="true" aria-labelledby="editTitle">
    <div class="drawer-handle" aria-hidden="true"></div>
    <div class="drawer-head">
      <h2 class="drawer-title" id="editTitle">Modifier</h2>
      <button class="drawer-close" id="editClose" aria-label="Fermer le formulaire">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="drawer-body">
      <form id="resForm" novalidate>
        <input type="hidden" id="resId">
        <div class="frow">
          <div class="fgroup">
            <label for="resName">Nom du client <span aria-hidden="true">*</span></label>
            <input type="text" id="resName" placeholder="Ex : Dupont" required aria-required="true" autocomplete="off">
          </div>
          <div class="fgroup">
            <label for="resPhone">Téléphone</label>
            <input type="tel" id="resPhone" placeholder="06 xx xx xx xx">
          </div>
          <div class="f2">
            <div class="fgroup">
              <label for="resDate">Date <span aria-hidden="true">*</span></label>
              <input type="date" id="resDate" required aria-required="true">
            </div>
            <div class="fgroup">
              <label for="resTime">Heure <span aria-hidden="true">*</span></label>
              <input type="time" id="resTime" required aria-required="true">
            </div>
          </div>
          <div class="fgroup">
            <label for="resParty">Nombre de personnes</label>
            <div class="stepper">
              <button type="button" class="stepper-btn" id="btnPartyDec" aria-label="Diminuer le nombre de personnes">−</button>
              <input type="number" id="resParty" class="stepper-val" min="1" max="99" value="2" aria-label="Nombre de personnes" readonly>
              <button type="button" class="stepper-btn" id="btnPartyInc" aria-label="Augmenter le nombre de personnes">+</button>
            </div>
          </div>
          <div class="fgroup">
            <label for="resNotes">Notes client <span style="font-weight:400;color:var(--text-muted)">(allergies, occasion…)</span></label>
            <textarea id="resNotes" rows="3" placeholder="Ex : Allergie aux noix · Anniversaire…" style="resize:vertical"></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-secondary" id="editCancelBtn">Annuler</button>
      <button type="submit" form="resForm" class="btn btn-primary">Enregistrer</button>
    </div>
  </div>

  <!-- Confirmation suppression -->
  <div class="modal-overlay hidden" id="deleteModal" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="delete-modal-title">Supprimer la réservation</h2>
      </div>
      <p style="font-size:.9rem;color:var(--text-muted);">Cette action est irréversible.</p>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="deleteModalCancel">Annuler</button>
        <button class="btn btn-danger"    id="deleteModalConfirm">Supprimer</button>
      </div>
    </div>
  </div>

  <!-- Confirmation suppression pièce jointe -->
  <div class="modal-overlay hidden" id="deleteAttModal" role="dialog" aria-modal="true" aria-labelledby="delete-att-title">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="delete-att-title">Supprimer cette pièce jointe ?</h2>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="deleteAttCancel">Annuler</button>
        <button class="btn btn-danger"    id="deleteAttConfirm">Supprimer</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script>
    'use strict';

    buildNav('reservations');
    const socket = io();

    let reservations  = [];
    let currentResId  = null;
    let _drawerTrigger = null;
    let _pendingAttId  = null;

    // ─── Auth ─────────────────────────────────────────────────────────────────
    function _canManage() {
      const u = window.__mosUser;
      return u && (u.role === 'admin' || u.role === 'manager');
    }

    // ─── Date input ───────────────────────────────────────────────────────────
    const viewDate = document.getElementById('viewDate');
    viewDate.value = today();
    updateLabel();

    viewDate.addEventListener('change', load);
    document.getElementById('btnPrevDay').addEventListener('click', () => shiftDate(-1));
    document.getElementById('btnNextDay').addEventListener('click', () => shiftDate(1));
    document.getElementById('btnToday').addEventListener('click', () => { viewDate.value = today(); load(); });

    function updateLabel() {
      document.getElementById('dateLabel').textContent = formatDate(viewDate.value);
      document.getElementById('btnToday').classList.toggle('not-today', viewDate.value !== today());
    }
    function shiftDate(d) {
      const dt = new Date(viewDate.value);
      dt.setDate(dt.getDate() + d);
      viewDate.value = dt.toISOString().split('T')[0];
      load();
    }

    // ─── Status visuel ────────────────────────────────────────────────────────
    function computeVS(r) {
      if (r.status === 'cancelled') return 'cancelled';
      if (r.status === 'no_show')   return 'no_show';
      if (r.status === 'arrived')   return 'arrived';
      const todayStr = new Date().toISOString().split('T')[0];
      if (r.date === todayStr && r.time) {
        const resMs = new Date(r.date + 'T' + r.time + ':00').getTime();
        if (!isNaN(resMs) && Date.now() - resMs > 15 * 60 * 1000) return 'late';
      }
      const ids = Array.isArray(r.table_ids) ? r.table_ids : [];
      return ids.length > 0 ? 'placed' : 'unplaced';
    }

    const VS_LABELS = {
      unplaced:  'À placer',
      placed:    'Placé',
      arrived:   'Arrivé',
      late:      'En retard',
      no_show:   'No show',
      cancelled: 'Annulé',
    };

    // ─── Chargement ───────────────────────────────────────────────────────────
    async function load() {
      updateLabel();
      const data = await api.get(`/api/reservations?date=${viewDate.value}`);
      if (!data) return;
      reservations = data.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
      render();
    }

    function render() { renderChips(); renderList(); }

    function renderChips() {
      const counts = { unplaced:0, placed:0, arrived:0, late:0, no_show:0, cancelled:0 };
      reservations.forEach(r => { const vs = computeVS(r); if (counts[vs] !== undefined) counts[vs]++; });
      const pax   = reservations.filter(r => r.status !== 'cancelled').reduce((s, r) => s + (r.party_size || 0), 0);
      const total = reservations.length;

      let html = `<div class="chip" style="border-color:rgba(230,184,74,.3)" aria-label="${total} réservation${total>1?'s':''}, ${pax} personnes"><strong style="color:var(--primary)">${total}</strong>&nbsp;résa${total>1?'s':''}&nbsp;·&nbsp;${pax}&nbsp;pers.</div>`;
      if (counts.unplaced)  html += `<div class="chip" style="border-color:rgba(245,166,36,.4)" aria-label="${counts.unplaced} à placer"><div class="chip-dot" style="background:var(--orange)" aria-hidden="true"></div><strong style="color:var(--orange)">${counts.unplaced}</strong>&nbsp;à placer</div>`;
      if (counts.placed)    html += `<div class="chip" style="border-color:rgba(33,150,243,.4)" aria-label="${counts.placed} placé${counts.placed>1?'s':''}"><div class="chip-dot" style="background:var(--info)" aria-hidden="true"></div><strong style="color:var(--info)">${counts.placed}</strong>&nbsp;placé${counts.placed>1?'s':''}</div>`;
      if (counts.arrived)   html += `<div class="chip" style="border-color:rgba(76,175,106,.4)" aria-label="${counts.arrived} arrivé${counts.arrived>1?'s':''}"><div class="chip-dot" style="background:var(--success)" aria-hidden="true"></div><strong style="color:var(--success)">${counts.arrived}</strong>&nbsp;arrivé${counts.arrived>1?'s':''}</div>`;
      if (counts.late)      html += `<div class="chip" style="border-color:rgba(232,84,84,.5)" aria-label="${counts.late} en retard"><div class="chip-dot" style="background:var(--danger)" aria-hidden="true"></div><strong style="color:var(--danger)">${counts.late}</strong>&nbsp;en retard</div>`;
      if (counts.no_show)   html += `<div class="chip" style="opacity:.8" aria-label="${counts.no_show} no show"><strong style="color:var(--danger)">${counts.no_show}</strong>&nbsp;no show</div>`;
      if (counts.cancelled) html += `<div class="chip" style="opacity:.55" aria-label="${counts.cancelled} annulée${counts.cancelled>1?'s':''}"><strong>${counts.cancelled}</strong>&nbsp;annulée${counts.cancelled>1?'s':''}</div>`;
      document.getElementById('chips').innerHTML = html;
    }

    function renderList() {
      const el = document.getElementById('resList');
      if (!reservations.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-state-text">Aucune réservation ce jour</div></div>`;
        return;
      }
      el.innerHTML = `<ul role="list" style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;">` +
        reservations.map(r => {
          const isJoy = !!r.joy_event_id;
          const vs    = computeVS(r);
          const tableNames = Array.isArray(r.table_names) && r.table_names.length ? r.table_names
                           : (r.table_name ? [r.table_name] : []);
          const tableBadge = tableNames.length
            ? tableNames.map(n => `<span class="rc-table-ok">${escapeHtml(n)}</span>`).join(' ')
            : `<span class="rc-table-nok">Sans table</span>`;
          const vsLabel = VS_LABELS[vs] || vs;
          const statusOptions = [
            { v:'confirmed', l:'Confirmée' }, { v:'arrived', l:'Arrivée' },
            { v:'no_show',   l:'No show'  }, { v:'cancelled', l:'Annulée' }
          ];

          return `<li>
            <button class="res-card vs-${vs}" id="rc-${r.id}" data-res-id="${r.id}"
                    type="button"
                    aria-label="${escapeHtml(r.customer_name)}, ${escapeHtml(r.time||'—')}, ${r.party_size} personnes, ${vsLabel}">
              <time class="rc-time" datetime="${escapeHtml(r.date)}T${escapeHtml(r.time||'')}">${escapeHtml(r.time||'—')}</time>
              <div class="rc-body">
                <div class="rc-name">${escapeHtml(r.customer_name)}${isJoy ? `<span class="joy-tag" aria-label="Source Joy.io">Joy.io</span>` : ''}</div>
                <div class="rc-meta">
                  <span>${r.party_size} pers.</span>
                  ${r.phone ? `<a href="tel:${escapeHtml(r.phone)}" onclick="event.stopPropagation()" aria-label="Appeler ${escapeHtml(r.phone)}">${escapeHtml(r.phone)}</a>` : ''}
                  ${r.space ? `<span class="rc-space">${escapeHtml(r.space)}</span>` : ''}
                  ${tableBadge}
                </div>
                ${r.notes ? `<div class="rc-notes">${escapeHtml(r.notes)}</div>` : ''}
              </div>
              <div class="rc-status" onclick="event.stopPropagation()">
                ${vs !== 'arrived' && vs !== 'cancelled' && vs !== 'no_show' ? `
                  <button class="btn-arrived-quick" type="button" data-arrived="${r.id}" aria-label="Marquer arrivé — ${escapeHtml(r.customer_name)}">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 8l4 4 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>` : ''}
                <label class="sr-only" for="status-${r.id}">Statut de ${escapeHtml(r.customer_name)}</label>
                <select class="status-pill vs-${vs}" id="status-${r.id}" data-status-id="${r.id}" aria-label="Statut : ${vsLabel}">
                  ${statusOptions.map(o => `<option value="${o.v}"${r.status===o.v?' selected':''}>${escapeHtml(o.l)}</option>`).join('')}
                </select>
              </div>
            </button>
          </li>`;
        }).join('') +
        `</ul>`;

      // Bind card open
      el.querySelectorAll('[data-res-id]').forEach(btn => {
        btn.addEventListener('click', () => openDetail(parseInt(btn.dataset.resId, 10), btn));
      });
      // Bind quick arrived
      el.querySelectorAll('[data-arrived]').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          await changeStatus(parseInt(btn.dataset.arrived, 10), 'arrived');
        });
      });
      // Bind status select
      el.querySelectorAll('[data-status-id]').forEach(sel => {
        sel.addEventListener('change', async e => {
          e.stopPropagation();
          await changeStatus(parseInt(sel.dataset.statusId, 10), sel.value);
        });
      });
    }

    async function changeStatus(id, status) {
      await api.put(`/api/reservations/${id}`, { status });
      const r = reservations.find(x => x.id === id);
      if (r) r.status = status;
      render();
      showToast('Statut mis à jour', 'success');
    }

    // ─── Drawer helpers ───────────────────────────────────────────────────────
    function openDrawer(id, triggerEl) {
      if (triggerEl) _drawerTrigger = triggerEl;
      document.getElementById('backdrop').classList.add('open');
      const drawer = document.getElementById(id);
      drawer.classList.add('open');
      document.body.classList.add('modal-open');
      // Focus first focusable element
      setTimeout(() => {
        const focusable = drawer.querySelectorAll('button:not([disabled]),a,[tabindex]:not([tabindex="-1"]),input,select,textarea');
        if (focusable.length) focusable[0].focus();
      }, 300);
    }

    function closeAllDrawers(resetTrigger = true) {
      ['detailDrawer', 'editDrawer'].forEach(id => document.getElementById(id).classList.remove('open'));
      document.getElementById('backdrop').classList.remove('open');
      document.body.classList.remove('modal-open');
      if (resetTrigger && _drawerTrigger) {
        _drawerTrigger.focus();
        _drawerTrigger = null;
      }
      if (resetTrigger) currentResId = null;
    }

    document.getElementById('backdrop').addEventListener('click', () => closeAllDrawers());

    // Keyboard trap for open drawers
    ['detailDrawer', 'editDrawer'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeAllDrawers(); return; }
        if (e.key === 'Tab') {
          const drawer = document.getElementById(id);
          const focusable = Array.from(drawer.querySelectorAll('button:not([disabled]),a,[tabindex]:not([tabindex="-1"]),input,select,textarea'));
          if (!focusable.length) return;
          const first = focusable[0];
          const last  = focusable[focusable.length - 1];
          if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
          else             { if (document.activeElement === last)  { e.preventDefault(); first.focus(); } }
        }
      });
    });

    // ─── Drawer DÉTAIL ────────────────────────────────────────────────────────
    function openDetail(id, triggerEl) {
      const r = reservations.find(x => x.id === id);
      if (!r) return;
      currentResId = id;
      _drawerTrigger = triggerEl || null;

      const isJoy    = !!r.joy_event_id;
      const vs       = computeVS(r);
      const canManage = _canManage();

      document.getElementById('detailTitle').textContent = r.customer_name + (isJoy ? ' (Joy.io)' : '');

      const tableNames = Array.isArray(r.table_names) && r.table_names.length ? r.table_names
                       : (r.table_name ? [r.table_name] : []);
      const tableBadge = tableNames.length
        ? tableNames.map(n => `<span class="detail-table-badge dtb-ok">${escapeHtml(n)}</span>`).join(' ')
        : `<span class="detail-table-badge dtb-nok">Pas de table assignée</span>`;

      const statusOptions = [
        { v:'confirmed', l:'Confirmée' }, { v:'arrived', l:'Arrivée' },
        { v:'no_show',   l:'No show'  }, { v:'cancelled', l:'Annulée' }
      ];

      let adminNotesHtml = '';
      if (canManage) {
        adminNotesHtml = `
          <div class="admin-section">
            <div class="admin-section-title">Notes internes (équipe)</div>
            <label for="adminNotesTA" class="sr-only">Notes internes pour l'équipe</label>
            <textarea id="adminNotesTA" rows="3" placeholder="Notes pour l'équipe — non visibles par le client…" style="resize:vertical;width:100%;box-sizing:border-box">${escapeHtml(r.admin_notes||'')}</textarea>
            <button class="btn btn-secondary btn-sm" id="saveAdminNotesBtn" style="margin-top:8px;width:100%" type="button">Enregistrer les notes</button>
          </div>`;
      } else if (r.admin_notes) {
        adminNotesHtml = `
          <div class="admin-section">
            <div class="admin-section-title">Notes internes</div>
            <div class="admin-notes-ro">${escapeHtml(r.admin_notes)}</div>
          </div>`;
      }

      const attachHtml = `
        <div class="attach-section">
          <div class="attach-title">Pièces jointes (devis…)</div>
          <div id="attachList" class="attach-list"><div style="font-size:.78rem;color:var(--text-muted);font-style:italic;">Chargement…</div></div>
          ${canManage ? `<label class="attach-upload-lbl">
            <input type="file" id="attachInput" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" class="sr-only" aria-label="Ajouter un fichier (devis, contrat…)">
            Ajouter un fichier (devis, contrat…)
          </label>` : ''}
        </div>`;

      document.getElementById('detailBody').innerHTML = `
        <dl class="detail-view">
          <div class="detail-row">
            <div class="detail-icon" aria-hidden="true">🕐</div>
            <div><dt class="detail-label">Heure · Date</dt>
            <dd class="detail-value"><time datetime="${escapeHtml(r.date)}T${escapeHtml(r.time||'')}">${escapeHtml(r.time||'—')}</time> · ${escapeHtml(formatDate(r.date))}</dd></div>
          </div>
          <div class="detail-row">
            <div class="detail-icon" aria-hidden="true">👥</div>
            <div><dt class="detail-label">Personnes</dt>
            <dd class="detail-value">${r.party_size} personne${r.party_size>1?'s':''}</dd></div>
          </div>
          ${r.phone ? `<div class="detail-row">
            <div class="detail-icon" aria-hidden="true">📞</div>
            <div><dt class="detail-label">Téléphone</dt>
            <dd class="detail-value"><a href="tel:${escapeHtml(r.phone)}">${escapeHtml(r.phone)}</a></dd></div>
          </div>` : ''}
          ${r.space ? `<div class="detail-row">
            <div class="detail-icon" aria-hidden="true">📍</div>
            <div><dt class="detail-label">Espace réservé</dt>
            <dd class="detail-value">${escapeHtml(r.space)}</dd></div>
          </div>` : ''}
          <div class="detail-row">
            <div class="detail-icon" aria-hidden="true">🪑</div>
            <div style="flex:1"><dt class="detail-label">Table(s)</dt>
            <dd class="detail-value" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:2px">${tableBadge}</dd></div>
          </div>
          ${r.notes ? `<div class="detail-row">
            <div class="detail-icon" aria-hidden="true">📝</div>
            <div><dt class="detail-label">Notes client</dt>
            <dd class="detail-value" style="font-size:.88rem;font-weight:400;white-space:pre-wrap;line-height:1.5">${escapeHtml(r.notes)}</dd></div>
          </div>` : ''}
          <div class="detail-row">
            <div class="detail-icon" aria-hidden="true">📌</div>
            <div style="width:100%">
              <dt class="detail-label">Statut</dt>
              <dd style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:6px">
                <span class="vs-badge vsb-${vs}" role="status">${escapeHtml(VS_LABELS[vs] || vs)}</span>
                <label for="detail-status-sel" class="sr-only">Changer le statut</label>
                <select class="detail-status-select" id="detail-status-sel" data-detail-status="${r.id}" aria-label="Modifier le statut">
                  ${statusOptions.map(o => `<option value="${o.v}"${r.status===o.v?' selected':''}>${escapeHtml(o.l)}</option>`).join('')}
                </select>
              </dd>
            </div>
          </div>
        </dl>

        <button class="btn-assign" id="btnAssignTable" type="button" data-res-id="${r.id}" data-res-date="${escapeHtml(r.date)}" data-res-name="${escapeHtml(r.customer_name)}">
          Assigner une table sur le plan de salle
        </button>

        ${adminNotesHtml}
        ${attachHtml}
      `;

      document.getElementById('detailBtnDel').style.display = isJoy ? 'none' : 'flex';

      // Bind detail-internal events
      const statusSel = document.getElementById('detail-status-sel');
      if (statusSel) {
        statusSel.addEventListener('change', async () => {
          await changeStatus(parseInt(statusSel.dataset.detailStatus, 10), statusSel.value);
          openDetail(parseInt(statusSel.dataset.detailStatus, 10));
        });
      }
      const assignBtn = document.getElementById('btnAssignTable');
      if (assignBtn) {
        assignBtn.addEventListener('click', () => {
          const { resId, resDate, resName } = assignBtn.dataset;
          window.location.href = `/staff/tables.html?assignTo=${resId}&date=${resDate}&name=${encodeURIComponent(resName)}`;
        });
      }
      const saveNotesBtn = document.getElementById('saveAdminNotesBtn');
      if (saveNotesBtn) {
        saveNotesBtn.addEventListener('click', () => saveAdminNotes(id));
      }
      const attachInput = document.getElementById('attachInput');
      if (attachInput) {
        attachInput.addEventListener('change', () => uploadAttachment(attachInput));
      }

      openDrawer('detailDrawer');
      loadAttachments(id);
    }

    async function saveAdminNotes(id) {
      const ta = document.getElementById('adminNotesTA');
      if (!ta) return;
      const notes = ta.value.trim() || null;
      const res   = await api.put(`/api/reservations/${id}`, { admin_notes: notes });
      if (res?.error) { showToast(res.error, 'error'); return; }
      const r = reservations.find(x => x.id === id);
      if (r) r.admin_notes = notes;
      showToast('Notes enregistrées', 'success');
    }

    // ─── Pièces jointes ───────────────────────────────────────────────────────
    function _fmtSize(b) {
      if (b < 1024) return b + ' o';
      if (b < 1048576) return Math.round(b / 1024) + ' Ko';
      return (b / 1048576).toFixed(1) + ' Mo';
    }

    async function loadAttachments(resId) {
      const list = document.getElementById('attachList');
      if (!list) return;
      const atts = await api.get(`/api/reservations/${resId}/attachments`);
      if (!atts) { list.innerHTML = ''; return; }
      if (!atts.length) {
        list.innerHTML = `<p style="font-size:.78rem;color:var(--text-muted);font-style:italic;">Aucune pièce jointe</p>`;
        return;
      }
      const cm = _canManage();
      list.innerHTML = atts.map(a => `
        <div class="attach-item">
          <div class="attach-info">
            <div class="attach-name" title="${escapeHtml(a.original_name)}">${escapeHtml(a.original_name)}</div>
            <div class="attach-meta">${_fmtSize(a.size)}${a.uploader_name ? ' · ' + escapeHtml(a.uploader_name) : ''}</div>
          </div>
          <button class="attach-btn-open" type="button" data-att-open="${a.id}" aria-label="Voir ${escapeHtml(a.original_name)}">Voir</button>
          ${cm ? `<button class="attach-btn-del" type="button" data-att-del="${a.id}" aria-label="Supprimer ${escapeHtml(a.original_name)}">✕</button>` : ''}
        </div>`).join('');

      list.querySelectorAll('[data-att-open]').forEach(btn => {
        btn.addEventListener('click', () => window.open(`/api/attachments/${btn.dataset.attOpen}/file`, '_blank'));
      });
      list.querySelectorAll('[data-att-del]').forEach(btn => {
        btn.addEventListener('click', () => {
          _pendingAttId = { attId: parseInt(btn.dataset.attDel, 10), resId };
          showModal('deleteAttModal', btn);
          setTimeout(() => document.getElementById('deleteAttCancel').focus(), 50);
        });
      });
    }

    async function uploadAttachment(input) {
      if (!input.files.length || !currentResId) return;
      const fd = new FormData();
      fd.append('file', input.files[0]);
      input.value = '';
      const res = await fetch(`/api/reservations/${currentResId}/attachments`, { method:'POST', body:fd });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showToast(err.error || 'Erreur upload', 'error'); return;
      }
      showToast('Fichier ajouté', 'success');
      loadAttachments(currentResId);
    }

    document.getElementById('deleteAttCancel').addEventListener('click', () => { hideModal('deleteAttModal'); _pendingAttId = null; });
    document.getElementById('deleteAttConfirm').addEventListener('click', async () => {
      if (!_pendingAttId) return;
      const { attId, resId } = _pendingAttId;
      const res = await api.delete(`/api/attachments/${attId}`);
      hideModal('deleteAttModal');
      _pendingAttId = null;
      if (res?.ok) { showToast('Supprimé', 'info'); loadAttachments(resId); }
    });

    // ─── Drawer controls ──────────────────────────────────────────────────────
    document.getElementById('detailClose').addEventListener('click', () => closeAllDrawers());
    document.getElementById('detailBtnClose').addEventListener('click', () => closeAllDrawers());
    document.getElementById('detailBtnEdit').addEventListener('click', switchToEdit);
    document.getElementById('detailBtnDel').addEventListener('click', () => {
      showModal('deleteModal', document.getElementById('detailBtnDel'));
      setTimeout(() => document.getElementById('deleteModalCancel').focus(), 50);
    });
    document.getElementById('deleteModalCancel').addEventListener('click', () => hideModal('deleteModal'));
    document.getElementById('deleteModalConfirm').addEventListener('click', async () => {
      if (!currentResId) return;
      await api.delete(`/api/reservations/${currentResId}`);
      hideModal('deleteModal');
      closeAllDrawers();
      showToast('Réservation supprimée', 'info');
      load();
    });

    document.getElementById('editClose').addEventListener('click', closeEditDrawer);
    document.getElementById('editCancelBtn').addEventListener('click', closeEditDrawer);

    function closeEditDrawer() {
      closeAllDrawers(false);
      if (currentResId) openDetail(currentResId);
      else { _drawerTrigger?.focus(); _drawerTrigger = null; }
    }

    // ─── Create / Edit ────────────────────────────────────────────────────────
    document.getElementById('btnCreate').addEventListener('click', function() {
      openCreate(this);
    });

    function openCreate(triggerEl) {
      currentResId = null;
      document.getElementById('editTitle').textContent = 'Nouvelle réservation';
      document.getElementById('resId').value    = '';
      document.getElementById('resName').value  = '';
      document.getElementById('resPhone').value = '';
      document.getElementById('resDate').value  = viewDate.value;
      document.getElementById('resTime').value  = '';
      document.getElementById('resParty').value = 2;
      document.getElementById('resNotes').value = '';
      openDrawer('editDrawer', triggerEl);
      setTimeout(() => document.getElementById('resName').focus(), 350);
    }

    function switchToEdit() {
      const r = reservations.find(x => x.id === currentResId);
      if (!r) return;
      document.getElementById('editTitle').textContent = 'Modifier la réservation';
      document.getElementById('resId').value    = r.id;
      document.getElementById('resName').value  = r.customer_name;
      document.getElementById('resPhone').value = r.phone || '';
      document.getElementById('resDate').value  = r.date;
      document.getElementById('resTime').value  = r.time;
      document.getElementById('resParty').value = r.party_size;
      document.getElementById('resNotes').value = r.notes || '';
      closeAllDrawers(false);
      openDrawer('editDrawer');
    }

    document.getElementById('resForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const id   = document.getElementById('resId').value;
      const body = {
        customer_name: document.getElementById('resName').value.trim(),
        phone:         document.getElementById('resPhone').value.trim() || null,
        date:          document.getElementById('resDate').value,
        time:          document.getElementById('resTime').value,
        party_size:    parseInt(document.getElementById('resParty').value) || 2,
        notes:         document.getElementById('resNotes').value.trim() || null,
      };
      const res = id ? await api.put(`/api/reservations/${id}`, body) : await api.post('/api/reservations', body);
      if (res?.error) { showToast(res.error, 'error'); return; }
      closeAllDrawers();
      showToast(id ? 'Réservation modifiée' : 'Réservation créée', 'success');
      if (body.date === viewDate.value) load();
    });

    document.getElementById('btnPartyDec').addEventListener('click', () => stepParty(-1));
    document.getElementById('btnPartyInc').addEventListener('click', () => stepParty(1));
    function stepParty(d) {
      const i = document.getElementById('resParty');
      i.value = Math.max(1, Math.min(99, (parseInt(i.value) || 2) + d));
    }

    // ─── Joy.io sync ──────────────────────────────────────────────────────────
    async function initSyncBar() {
      const user = await api.get('/api/auth/me');
      if (!user || (user.role !== 'admin' && user.role !== 'manager')) return;
      document.getElementById('joySyncBar').style.display = 'flex';
      refreshSyncLabel();
    }
    async function refreshSyncLabel() {
      const cfg = await api.get('/api/joy/config');
      if (!cfg) return;
      const d = cfg.lastSync ? new Date(cfg.lastSync) : null;
      document.getElementById('joySyncLabel').textContent = d
        ? `Joy.io · dernière sync : ${d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' })}`
        : 'Joy.io · jamais synchronisé';
    }
    document.getElementById('joySyncBtn').addEventListener('click', async function() {
      this.textContent = 'Sync…'; this.disabled = true;
      const r = await api.post('/api/joy/sync', {});
      this.textContent = 'Sync Joy.io'; this.disabled = false;
      if (r?.error) { showToast('Erreur : ' + escapeHtml(r.error), 'error'); return; }
      showToast(`Joy.io — ${r.synced} résa${r.synced>1?'s':''} synchronisée${r.synced>1?'s':''}`, 'success');
      refreshSyncLabel();
      load();
    });
    initSyncBar();

    // ─── Auto-refresh (late detection) ───────────────────────────────────────
    setInterval(() => {
      if (viewDate.value === new Date().toISOString().split('T')[0]) render();
    }, 60000);

    // ─── Socket.io ────────────────────────────────────────────────────────────
    socket.on('reservation:updated', raw => {
      if (raw.date !== viewDate.value) return;
      if (typeof raw.table_ids === 'string') {
        try { raw.table_ids = JSON.parse(raw.table_ids); } catch(e) { raw.table_ids = []; }
      }
      const i = reservations.findIndex(x => x.id === raw.id);
      if (i >= 0) reservations[i] = raw; else reservations.push(raw);
      reservations.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
      render();
    });
    socket.on('reservation:deleted', ({ id }) => {
      reservations = reservations.filter(r => r.id !== id);
      render();
    });
    socket.on('joy:synced', () => { load(); refreshSyncLabel(); });

    // ─── URL param: assigned ──────────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    if (params.get('assigned')) {
      showToast('Table assignée', 'success');
      history.replaceState({}, '', location.pathname);
    }

    load();
  </script>
</body>
</html>
