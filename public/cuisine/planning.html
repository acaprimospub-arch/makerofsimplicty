<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Planning Cuisine — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#08141c">
  <style>
    .week-nav { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:20px; }
    .week-nav-btn { background:var(--bg-card); border:1px solid var(--border); color:var(--text-muted); border-radius:20px; padding:7px 16px; font-size:.82rem; cursor:pointer; transition:border-color .15s,color .15s; white-space:nowrap; }
    .week-nav-btn:hover { border-color:var(--primary); color:var(--primary); }
    .week-nav-btn:focus-visible { box-shadow:var(--focus-ring); outline:none; }
    .week-label { font-size:.95rem; font-weight:700; text-align:center; flex:1; }
    .planning-grid { width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .planning-table { width:100%; border-collapse:collapse; min-width:600px; }
    .planning-table th { background:var(--bg-surface); border:1px solid var(--border); padding:8px 6px; font-size:.75rem; font-weight:700; text-align:center; color:var(--text-muted); white-space:nowrap; }
    .planning-table th.today-col { background:var(--primary-dim); color:var(--primary); border-color:var(--primary); }
    .planning-table td { border:1px solid var(--border); padding:4px; vertical-align:top; min-width:80px; }
    .staff-cell { background:var(--bg-card); padding:8px 10px; font-weight:700; font-size:.88rem; white-space:nowrap; }
    .shift-cell { background:var(--bg-card); min-height:56px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; border-radius:4px; padding:4px; text-align:center; }
    .shift-cell[role="button"] { cursor:pointer; transition:background .12s; }
    .shift-cell[role="button"]:hover { background:var(--bg-hover); }
    .shift-cell[role="button"]:focus-visible { box-shadow:var(--focus-ring); outline:none; }
    .shift-cell.is-work { background:rgba(205,164,67,.12); border:1.5px solid rgba(205,164,67,.35); }
    .shift-cell.is-off  { background:rgba(232,84,84,.07);  border:1.5px solid rgba(232,84,84,.25); }
    .shift-cell.is-empty { border:1.5px dashed var(--border); }
    .shift-cell .sc-time { font-size:.78rem; font-weight:700; color:var(--primary); line-height:1.2; }
    .shift-cell .sc-off  { font-size:.75rem; font-weight:600; color:var(--danger); }
    .shift-cell .sc-empty { font-size:.7rem; color:var(--text-muted); }
    .today-col .shift-cell.is-work { background:rgba(205,164,67,.2); border-color:var(--primary); }
    .readonly-badge { display:inline-flex; align-items:center; gap:5px; font-size:.75rem; color:var(--text-muted); background:var(--bg-surface); border:1px solid var(--border); border-radius:20px; padding:4px 12px; margin-bottom:14px; }
    .btn-whatsapp { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:#25d366; color:#fff; border:none; border-radius:var(--radius-sm); padding:13px 20px; font-size:.95rem; font-weight:700; cursor:pointer; transition:background .15s; width:100%; }
    .btn-whatsapp:hover { background:#1da851; }
    .btn-whatsapp:focus-visible { box-shadow:var(--focus-ring); outline:none; }
    .btn-whatsapp svg { width:20px; height:20px; fill:currentColor; flex-shrink:0; }

    .drawer-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; opacity:0; pointer-events:none; transition:opacity .25s; }
    .drawer-backdrop.open { opacity:1; pointer-events:auto; }
    .drawer { position:fixed; bottom:0; left:0; right:0; z-index:201; background:var(--bg-card); border-radius:20px 20px 0 0; box-shadow:0 -8px 40px rgba(0,0,0,.5); transform:translateY(102%); transition:transform .3s cubic-bezier(.32,.72,0,1); max-height:92dvh; display:flex; flex-direction:column; }
    .drawer.open { transform:translateY(0); }
    @media (min-width:641px) {
      .drawer { bottom:auto; top:50%; left:50%; right:auto; transform:translate(-50%,-40%); opacity:0; pointer-events:none; border-radius:var(--radius); width:100%; max-width:380px; transition:transform .25s ease,opacity .25s ease; }
      .drawer.open { transform:translate(-50%,-50%); opacity:1; pointer-events:auto; }
    }
    .drawer-handle { width:40px; height:4px; background:rgba(255,255,255,.15); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
    @media (min-width:641px) { .drawer-handle { display:none; } }
    .drawer-head { display:flex; align-items:center; justify-content:space-between; padding:14px 20px 12px; flex-shrink:0; border-bottom:1px solid var(--border); }
    .drawer-title { font-size:1rem; font-weight:700; }
    .drawer-close { width:30px; height:30px; border-radius:50%; background:var(--bg-surface); color:var(--text-muted); display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }
    .drawer-close:focus-visible { box-shadow:var(--focus-ring); outline:none; }
    .drawer-body { overflow-y:auto; padding:16px 20px; flex:1; }
    .drawer-footer { display:flex; gap:8px; padding:10px 20px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--border); flex-shrink:0; }
    .drawer-footer .btn { flex:1; justify-content:center; min-height:46px; }
    .frow { display:flex; flex-direction:column; gap:14px; }
    .fgroup { display:flex; flex-direction:column; gap:6px; }
    .fgroup label { font-size:.82rem; font-weight:600; color:var(--text-muted); }
    .f2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .off-toggle-label { display:flex; align-items:center; gap:12px; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 16px; cursor:pointer; }
    .off-toggle-label input { width:18px; height:18px; cursor:pointer; accent-color:var(--danger); }

    @media (prefers-reduced-motion: reduce) {
      .drawer, .drawer-backdrop { transition: none !important; }
    }
  </style>
</head>
<body>
  <nav class="nav" id="nav" role="navigation" aria-label="Navigation principale"></nav>

  <main class="page" id="main-content" tabindex="-1">
    <div class="container-sm">

      <header class="page-header">
        <div>
          <h1 class="page-title">Planning Cuisine</h1>
          <p class="page-subtitle" id="weekSubtitle"></p>
        </div>
        <button id="btnValidate" class="btn btn-primary hidden">Valider le planning</button>
      </header>

      <div role="group" aria-label="Navigation par semaine" class="week-nav">
        <button class="week-nav-btn" id="btnWeekPrev" aria-label="Semaine précédente">← Semaine préc.</button>
        <span class="week-label" id="weekLabel" aria-live="polite" aria-atomic="true"></span>
        <button class="week-nav-btn" id="btnWeekNext" aria-label="Semaine suivante">Semaine suiv. →</button>
      </div>

      <div id="readonlyBadge" class="readonly-badge hidden" role="status">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 2a5 5 0 100 10A5 5 0 007 2zm0 2a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm0 7a4 4 0 01-3.2-6.4C4.3 5.6 5 6.5 5 7.5c0 .83.5 1.55 1.24 1.87A3 3 0 007 11z" fill="currentColor"/></svg>
        Lecture seule
      </div>

      <div class="planning-grid" role="region" aria-label="Grille de planning de la semaine">
        <table class="planning-table" id="planningTable">
          <caption class="sr-only">Planning cuisine de la semaine</caption>
          <thead id="planningHead"></thead>
          <tbody id="planningBody"></tbody>
        </table>
      </div>

    </div>
  </main>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <!-- Preview drawer -->
  <div class="drawer" id="previewDrawer" role="dialog" aria-modal="true" aria-labelledby="previewDrawerTitle">
    <div class="drawer-handle" aria-hidden="true"></div>
    <div class="drawer-head">
      <h2 class="drawer-title" id="previewDrawerTitle">Aperçu du planning</h2>
      <button class="drawer-close" id="closePreviewDrawer" aria-label="Fermer l'aperçu">
        <svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><path d="M10 2L2 10M2 2l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      </button>
    </div>
    <div class="drawer-body" style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div id="previewLoading" role="status" style="color:var(--text-muted);font-size:.9rem;">Génération de l'image…</div>
      <img id="previewImg" style="display:none;max-width:100%;border-radius:10px;border:1px solid var(--border);" alt="Aperçu du planning cuisine">
    </div>
    <div class="drawer-footer" style="flex-direction:column;gap:10px;">
      <button class="btn-whatsapp" id="btnShare" aria-label="Partager le planning sur WhatsApp" style="display:none;">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        Envoyer sur WhatsApp
      </button>
      <button class="btn btn-secondary" id="closePreviewDrawerFooter" style="justify-content:center;">Fermer</button>
    </div>
  </div>

  <!-- Shift editor drawer -->
  <div class="drawer" id="shiftDrawer" role="dialog" aria-modal="true" aria-labelledby="shiftDrawerTitle">
    <div class="drawer-handle" aria-hidden="true"></div>
    <div class="drawer-head">
      <h2 class="drawer-title" id="shiftDrawerTitle">Modifier le shift</h2>
      <button class="drawer-close" id="closeShiftDrawer" aria-label="Fermer l'éditeur de shift">
        <svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><path d="M10 2L2 10M2 2l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      </button>
    </div>
    <div class="drawer-body">
      <form id="shiftForm">
        <input type="hidden" id="shiftUserId">
        <input type="hidden" id="shiftDayDate">
        <input type="hidden" id="shiftWeekStart">
        <div class="frow">
          <label class="off-toggle-label" for="shiftIsOff">
            <input type="checkbox" id="shiftIsOff">
            <span>Jour de repos</span>
          </label>
          <div id="shiftTimeFields" class="frow">
            <div class="f2">
              <div class="fgroup"><label for="shiftStart">Début</label><input type="time" id="shiftStart" class="form-input" value="09:00"></div>
              <div class="fgroup"><label for="shiftEnd">Fin</label><input type="time" id="shiftEnd" class="form-input" value="17:00"></div>
            </div>
          </div>
        </div>
      </form>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-secondary" id="btnClearShift" style="flex:0 0 auto;padding:0 16px" aria-label="Effacer ce créneau">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor" aria-hidden="true"><path d="M2 4h10M5 4V2h4v2M6 6v5M8 6v5M3 4l1 8h6l1-8"/></svg>
      </button>
      <button class="btn btn-secondary" id="cancelShiftDrawer">Annuler</button>
      <button type="submit" form="shiftForm" class="btn btn-primary">Enregistrer</button>
    </div>
  </div>

  <!-- Modal confirmation -->
  <div class="modal-overlay hidden" id="confirmModal" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="modal">
      <div class="modal-header"><h2 class="modal-title" id="confirm-title">Confirmer</h2></div>
      <p id="confirmMsg" style="font-size:.9rem;color:var(--text-muted);"></p>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="confirmCancel">Annuler</button>
        <button class="btn btn-danger" id="confirmOk">Confirmer</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    'use strict';
    buildNav('cuisine-planning');
    const socket = io();

    let currentWeekStart = getMonday(new Date());
    let planningData = { users: [], shifts: [] };
    let isChef = false;
    let capturedBlob = null;

    const DAYS = [
      { label: 'Lundi', short: 'Lun' }, { label: 'Mardi', short: 'Mar' },
      { label: 'Mercredi', short: 'Mer' }, { label: 'Jeudi', short: 'Jeu' },
      { label: 'Vendredi', short: 'Ven' }, { label: 'Samedi', short: 'Sam' },
      { label: 'Dimanche', short: 'Dim' },
    ];

    function getMonday(d) {
      const dt = new Date(d);
      const day = dt.getDay();
      dt.setDate(dt.getDate() + (day === 0 ? -6 : 1 - day));
      return dt.toISOString().split('T')[0];
    }
    function addDays(dateStr, n) {
      const d = new Date(dateStr); d.setDate(d.getDate() + n); return d.toISOString().split('T')[0];
    }
    function fmtWeekLabel(ws) {
      const end = addDays(ws, 6), s = new Date(ws), e = new Date(end);
      return `${s.getDate()} ${s.toLocaleDateString('fr-FR',{month:'short'})} → ${e.getDate()} ${e.toLocaleDateString('fr-FR',{month:'short',year:'numeric'})}`;
    }

    // ── Drawers ──────────────────────────────────────────────────────────────
    let _drawerTrigger = null;

    function openDrawer(id, triggerEl = null) {
      _drawerTrigger = triggerEl;
      document.getElementById('drawerBackdrop').classList.add('open');
      const drawer = document.getElementById(id);
      drawer.classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(() => { const first = drawer.querySelector('button:not([disabled]),input,select'); if (first) first.focus(); }, 50);
    }

    function closeAll() {
      document.getElementById('drawerBackdrop').classList.remove('open');
      document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
      document.body.style.overflow = '';
      if (_drawerTrigger) { _drawerTrigger.focus(); _drawerTrigger = null; }
    }

    document.querySelectorAll('.drawer').forEach(drawer => {
      drawer.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeAll(); return; }
        if (e.key !== 'Tab') return;
        const focusable = Array.from(drawer.querySelectorAll('button:not([disabled]),input,select')).filter(el => el.offsetParent !== null);
        if (!focusable.length) return;
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
      });
    });

    document.getElementById('drawerBackdrop').addEventListener('click', closeAll);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAll(); });

    document.getElementById('closePreviewDrawer').addEventListener('click', closeAll);
    document.getElementById('closePreviewDrawerFooter').addEventListener('click', closeAll);
    document.getElementById('closeShiftDrawer').addEventListener('click', closeAll);
    document.getElementById('cancelShiftDrawer').addEventListener('click', closeAll);

    // ── Modal confirmation ───────────────────────────────────────────────────
    let _confirmCb = null;
    function showConfirm(msg, cb) {
      _confirmCb = cb;
      document.getElementById('confirmMsg').textContent = msg;
      showModal('confirmModal');
      setTimeout(() => document.getElementById('confirmCancel').focus(), 50);
    }
    document.getElementById('confirmCancel').addEventListener('click', () => { hideModal('confirmModal'); _confirmCb = null; });
    document.getElementById('confirmOk').addEventListener('click', () => { hideModal('confirmModal'); if (_confirmCb) { _confirmCb(); _confirmCb = null; } });

    // ── Week navigation ──────────────────────────────────────────────────────
    document.getElementById('btnWeekPrev').addEventListener('click', () => shiftWeek(-1));
    document.getElementById('btnWeekNext').addEventListener('click', () => shiftWeek(1));

    function shiftWeek(d) { currentWeekStart = addDays(currentWeekStart, d * 7); load(); }

    // ── Init ─────────────────────────────────────────────────────────────────
    async function init() {
      const user = await api.get('/api/auth/me');
      if (!user) return;
      isChef = user.role === 'admin' || (user.role === 'manager' && user.shift === 'cuisine');
      if (!isChef) {
        document.getElementById('readonlyBadge').classList.remove('hidden');
      } else {
        document.getElementById('btnValidate').classList.remove('hidden');
        document.getElementById('btnValidate').addEventListener('click', e => openPreview(e.currentTarget));
      }
      await load();
    }

    // ── Load & render ─────────────────────────────────────────────────────────
    async function load() {
      document.getElementById('weekLabel').textContent = fmtWeekLabel(currentWeekStart);
      document.getElementById('weekSubtitle').textContent = `Semaine du ${formatDate(currentWeekStart)}`;
      const data = await api.get(`/api/cuisine/planning?weekStart=${currentWeekStart}`);
      if (!data) return;
      planningData = data;
      render();
    }

    function render() {
      const todayStr = today();
      const dayDates = DAYS.map((_, i) => addDays(currentWeekStart, i));

      document.getElementById('planningHead').innerHTML = `<tr>
        <th scope="col" style="min-width:90px;text-align:left;padding-left:10px">Staff</th>
        ${DAYS.map((d, i) => {
          const dd = dayDates[i], isToday = dd === todayStr;
          const [,dm,dj] = dd.split('-');
          return `<th scope="col" class="${isToday?'today-col':''}">${d.short}<br><span style="font-weight:400;font-size:.68rem">${dj}/${dm}</span></th>`;
        }).join('')}
      </tr>`;

      const tbody = document.getElementById('planningBody');
      tbody.innerHTML = planningData.users.map(u => `
        <tr>
          <th scope="row" class="staff-cell">${escapeHtml(u.name)}</th>
          ${dayDates.map(dd => {
            const shift   = planningData.shifts.find(s => s.user_id === u.id && s.day_date === dd);
            const isToday = dd === todayStr;
            let cellHtml, cellClass, ariaLabel = '', interactive = '';
            if (!shift) {
              cellClass = 'shift-cell is-empty';
              cellHtml = isChef ? `<span class="sc-empty" aria-hidden="true">+</span>` : '';
              ariaLabel = `${escapeHtml(u.name)}, non planifié`;
            } else if (shift.is_off) {
              cellClass = 'shift-cell is-off';
              cellHtml = `<span class="sc-off">Repos</span>`;
              ariaLabel = `${escapeHtml(u.name)}, repos`;
            } else {
              const s = shift.start_time ? shift.start_time.slice(0,5) : '';
              const e = shift.end_time   ? shift.end_time.slice(0,5)   : '';
              cellClass = 'shift-cell is-work';
              cellHtml = `<span class="sc-time" aria-hidden="true">${escapeHtml(s)}<br>${escapeHtml(e)}</span>`;
              ariaLabel = `${escapeHtml(u.name)}, ${escapeHtml(s)} à ${escapeHtml(e)}`;
            }
            if (isChef) {
              interactive = `role="button" tabindex="0" data-uid="${u.id}" data-date="${dd}" data-name="${escapeHtml(u.name)}" aria-label="Modifier : ${ariaLabel}"`;
            }
            return `<td class="${isToday?'today-col':''}"><div class="${cellClass}" ${interactive}>${cellHtml}</div></td>`;
          }).join('')}
        </tr>
      `).join('');

      if (isChef) {
        tbody.querySelectorAll('[data-uid]').forEach(cell => {
          cell.addEventListener('click', () => openShiftEditor(parseInt(cell.dataset.uid), cell.dataset.date, cell.dataset.name, cell));
          cell.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openShiftEditor(parseInt(cell.dataset.uid), cell.dataset.date, cell.dataset.name, cell); } });
        });
      }
    }

    // ── Shift editor ─────────────────────────────────────────────────────────
    function openShiftEditor(userId, dayDate, userName, triggerEl = null) {
      if (!isChef) return;
      const d = new Date(dayDate);
      document.getElementById('shiftDrawerTitle').textContent = `${userName} — ${d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}`;
      document.getElementById('shiftUserId').value    = userId;
      document.getElementById('shiftDayDate').value   = dayDate;
      document.getElementById('shiftWeekStart').value = currentWeekStart;
      const shift = planningData.shifts.find(s => s.user_id === userId && s.day_date === dayDate);
      const isOff = shift?.is_off;
      document.getElementById('shiftIsOff').checked = !!isOff;
      document.getElementById('shiftStart').value   = shift?.start_time?.slice(0,5) || '09:00';
      document.getElementById('shiftEnd').value     = shift?.end_time?.slice(0,5)   || '17:00';
      document.getElementById('shiftTimeFields').style.display = isOff ? 'none' : 'flex';
      openDrawer('shiftDrawer', triggerEl);
    }

    document.getElementById('shiftIsOff').addEventListener('change', function() {
      document.getElementById('shiftTimeFields').style.display = this.checked ? 'none' : 'flex';
    });

    document.getElementById('shiftForm').addEventListener('submit', async e => {
      e.preventDefault();
      const isOff = document.getElementById('shiftIsOff').checked;
      await api.put('/api/cuisine/planning', {
        user_id:    parseInt(document.getElementById('shiftUserId').value),
        day_date:   document.getElementById('shiftDayDate').value,
        week_start: document.getElementById('shiftWeekStart').value,
        start_time: isOff ? null : document.getElementById('shiftStart').value,
        end_time:   isOff ? null : document.getElementById('shiftEnd').value,
        is_off:     isOff ? 1 : 0,
      });
      closeAll(); await load();
      showToast('Planning mis à jour', 'success');
    });

    document.getElementById('btnClearShift').addEventListener('click', () => {
      showConfirm('Effacer ce créneau ?', async () => {
        const r = await fetch('/api/cuisine/planning', {
          method: 'DELETE', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id:    parseInt(document.getElementById('shiftUserId').value),
            day_date:   document.getElementById('shiftDayDate').value,
            week_start: document.getElementById('shiftWeekStart').value,
          }),
        });
        if (r.status === 401) { window.location.href = '/'; return; }
        closeAll(); await load();
        showToast('Créneau supprimé', 'info');
      });
    });

    // ── Preview & partage ─────────────────────────────────────────────────────
    async function openPreview(triggerEl = null) {
      if (!planningData.users.length) { showToast('Aucun planning à envoyer', 'warning'); return; }
      capturedBlob = null;
      document.getElementById('previewImg').style.display = 'none';
      document.getElementById('btnShare').style.display = 'none';
      document.getElementById('previewLoading').style.display = 'block';
      document.getElementById('previewLoading').textContent = 'Génération de l\'image…';
      openDrawer('previewDrawer', triggerEl);
      try {
        const table = document.getElementById('planningTable');
        const canvas = await html2canvas(table, { backgroundColor: '#08141c', scale: 2, useCORS: true, logging: false });
        canvas.toBlob(blob => {
          capturedBlob = blob;
          const img = document.getElementById('previewImg');
          img.src = URL.createObjectURL(blob);
          img.style.display = 'block';
          document.getElementById('previewLoading').style.display = 'none';
          document.getElementById('btnShare').style.display = 'flex';
        }, 'image/png');
      } catch(e) {
        document.getElementById('previewLoading').textContent = 'Erreur lors de la capture';
      }
    }

    document.getElementById('btnShare').addEventListener('click', async () => {
      if (!capturedBlob) return;
      const filename = `planning-cuisine-${currentWeekStart}.png`;
      const file = new File([capturedBlob], filename, { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file], title: `Planning Cuisine — ${fmtWeekLabel(currentWeekStart)}` }); closeAll(); }
        catch(e) {}
      } else {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(capturedBlob); a.download = filename; a.click();
        showToast('Image téléchargée — envoie-la sur WhatsApp', 'success');
      }
    });

    // ── Socket.io ─────────────────────────────────────────────────────────────
    socket.on('cuisine:planning:updated', ({ weekStart, data }) => {
      if (weekStart === currentWeekStart) { planningData = data; render(); }
    });

    init();
  </script>
</body>
</html>
