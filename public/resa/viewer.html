<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pièce jointe — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <meta name="theme-color" content="#08141c">
  <style>
    .viewer-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      z-index: 100;
    }
    .viewer-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
    }
    .viewer-back:hover { background: var(--bg); }
    .viewer-back:focus-visible { box-shadow: var(--focus-ring); outline: none; }
    .viewer-filename {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .viewer-download {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(230,184,74,.1);
      border: 1px solid rgba(230,184,74,.4);
      color: var(--primary);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
    }
    .viewer-download:hover { background: rgba(230,184,74,.18); }
    .viewer-download:focus-visible { box-shadow: var(--focus-ring); outline: none; }
    .viewer-content {
      margin-top: 52px;
      height: calc(100vh - 52px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }
    .viewer-content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .viewer-content img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .file-card {
      text-align: center;
      padding: 40px;
    }
    .file-icon { font-size: 4rem; margin-bottom: 16px; }
    .file-name { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .file-size { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="viewer-bar" role="toolbar" aria-label="Barre de visualisation">
    <button class="viewer-back" id="btnBack" aria-label="Retour à la page précédente">
      <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Retour
    </button>
    <span class="viewer-filename" id="filename" aria-label="Nom du fichier">Chargement…</span>
    <a class="viewer-download" id="downloadLink" href="#">
      <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Télécharger
    </a>
  </div>

  <main class="viewer-content" id="viewerContent" tabindex="-1">
    <p style="color:var(--text-muted);font-size:14px">Chargement…</p>
  </main>

  <script src="/js/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const attachId = params.get('id');
    const fromPage = params.get('from') || '/resa/gestion.html';

    document.getElementById('btnBack').addEventListener('click', () => {
      if (history.length > 1) {
        history.back();
      } else {
        window.location.href = fromPage;
      }
    });

    async function loadViewer() {
      if (!attachId) {
        document.getElementById('viewerContent').innerHTML = '<p style="color:var(--text-muted)">Fichier introuvable</p>';
        return;
      }

      const fileUrl = `/api/attachments/${attachId}/file`;
      const name = params.get('name') || 'Fichier';
      const mime = params.get('mime') || '';
      const size = parseInt(params.get('size') || '0');

      document.getElementById('filename').textContent = name;
      document.title = `${name} — Mos Pub Mercière`;

      const dlLink = document.getElementById('downloadLink');
      dlLink.href = fileUrl;
      dlLink.download = name;
      dlLink.setAttribute('aria-label', `Télécharger ${name}`);

      const content = document.getElementById('viewerContent');

      if (mime.startsWith('image/')) {
        content.innerHTML = `<img src="${escapeHtml(fileUrl)}" alt="${escapeHtml(name)}">`;
      } else if (mime === 'application/pdf') {
        content.innerHTML = `<iframe src="${escapeHtml(fileUrl)}#toolbar=1&view=FitH" title="${escapeHtml(name)}"></iframe>`;
      } else {
        const icon = mime.includes('word') ? '📝'
          : mime.includes('sheet') || mime.includes('excel') ? '📊'
          : '📄';
        const sizeStr = size > 1048576 ? (size/1048576).toFixed(1)+' Mo'
          : size > 1024 ? Math.round(size/1024)+' Ko'
          : size+' o';
        content.innerHTML = `
          <div class="file-card">
            <div class="file-icon" aria-hidden="true">${icon}</div>
            <p class="file-name">${escapeHtml(name)}</p>
            <p class="file-size">${sizeStr}</p>
            <a class="viewer-download" href="${escapeHtml(fileUrl)}" download="${escapeHtml(name)}">
              <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Télécharger le fichier
            </a>
          </div>
        `;
      }
    }

    loadViewer();
  </script>
</body>
</html>
