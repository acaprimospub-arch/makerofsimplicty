<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Comptes Instagram — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b2d3e">
  <style>
    .accounts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .account-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .account-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .account-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--bg-surface);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .account-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .account-info { flex: 1; min-width: 0; }
    .account-name { font-weight: 700; font-size: .95rem; color: var(--text); }
    .account-username { font-size: .78rem; color: var(--text-muted); }
    .account-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge-type {
      font-size: .7rem; font-weight: 600; padding: 2px 8px;
      border-radius: 99px; background: var(--primary-dim, rgba(205,164,67,.15));
      color: var(--primary); text-transform: uppercase; letter-spacing: .05em;
    }
    .badge-token {
      font-size: .7rem; font-weight: 600; padding: 2px 8px;
      border-radius: 99px;
    }
    .badge-token.ok      { background: rgba(76,175,106,.15); color: #4caf6a; }
    .badge-token.expiring{ background: rgba(240,180,41,.15);  color: #f0b429; }
    .badge-token.missing { background: rgba(232,84,84,.15);   color: #e85454; }
    .account-actions { display: flex; gap: 8px; margin-top: 4px; }
    .account-actions .btn { font-size: .78rem; }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:300; align-items:center; justify-content:center; padding:16px; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--bg-card); border-radius:var(--radius); width:100%; max-width:520px; max-height:90vh; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:16px; }
    .modal-header { display:flex; align-items:center; justify-content:space-between; }
    .modal-title  { font-size:1.05rem; font-weight:700; color:var(--text); }
    .form-row-2   { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:480px) { .form-row-2 { grid-template-columns:1fr; } }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-label { font-size:.78rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; }
    .form-group input, .form-group select { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); padding:9px 12px; font-size:.88rem; width:100%; }
    .form-hint { font-size:.73rem; color:var(--text-muted); }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; }

    .token-warning { background:rgba(240,180,41,.12); border:1px solid rgba(240,180,41,.3); border-radius:var(--radius-sm); padding:10px 14px; font-size:.8rem; color:#f0b429; }
  </style>
</head>
<body>
  <nav class="nav" id="nav"></nav>
  <div class="page">
    <div class="container">
      <div class="page-header">
        <div>
          <div class="page-title">Comptes Instagram</div>
          <div class="page-subtitle">Gestion des accès et tokens API</div>
        </div>
        <div style="display:flex;gap:8px">
          <a href="/instagram/index.html" class="btn btn-secondary btn-sm">← Planificateur</a>
          <button class="btn btn-primary" id="btnAdd">+ Nouveau compte</button>
        </div>
      </div>

      <div class="token-warning" id="tokenWarning" style="display:none;margin-bottom:20px">
        ⚠️ <strong>Tokens expirant bientôt</strong> — Mettez à jour les tokens des comptes signalés.
      </div>

      <div class="accounts-grid" id="accountsGrid">
        <div class="skeleton-card">Chargement…</div>
      </div>
    </div>
  </div>

  <!-- Modal ajout / édition -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event,'modalOverlay')">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Nouveau compte</div>
        <button class="btn-icon" onclick="hideModal('modalOverlay')">✕</button>
      </div>

      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Nom affiché *</label>
          <input type="text" id="fName" placeholder="Ex : Mos Pub Officiel">
        </div>
        <div class="form-group">
          <label class="form-label">@Username</label>
          <input type="text" id="fUsername" placeholder="mospub_lyon">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Type de compte</label>
        <select id="fType">
          <option value="business">Business</option>
          <option value="creator">Creator</option>
        </select>
      </div>

      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">IG User ID</label>
          <input type="text" id="fIgUserId" placeholder="17841400000000000">
          <span class="form-hint">Paramètres Meta for Developers → App → Instagram → User ID</span>
        </div>
        <div class="form-group">
          <label class="form-label">Page ID (facultatif)</label>
          <input type="text" id="fPageId" placeholder="ID page Facebook liée">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Access Token</label>
        <input type="password" id="fToken" placeholder="EAAxxxxxxxx…" autocomplete="off">
        <span class="form-hint">Token long durée (60 jours). Ne partagez jamais cet écran.</span>
      </div>

      <div class="form-group">
        <label class="form-label">Expiration du token</label>
        <input type="date" id="fTokenExpires">
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary" id="btnTestConn" style="margin-right:auto">Tester la connexion</button>
        <button class="btn btn-secondary" onclick="hideModal('modalOverlay')">Annuler</button>
        <button class="btn btn-primary" id="btnSave">Enregistrer</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let editId = null;
    let accounts = [];

    document.addEventListener('DOMContentLoaded', async () => {
      await buildNav('instagram');
      await loadAccounts();
    });

    async function loadAccounts() {
      accounts = await api.get('/api/instagram/accounts') || [];
      renderAccounts();
    }

    function tokenStatus(acc) {
      if (!acc.access_token) return 'missing';
      if (!acc.token_expires_at) return 'ok';
      const days = Math.ceil((new Date(acc.token_expires_at) - new Date()) / 86400000);
      if (days <= 0) return 'missing';
      if (days <= 7) return 'expiring';
      return 'ok';
    }

    function tokenLabel(acc) {
      if (!acc.access_token) return 'Token manquant';
      if (!acc.token_expires_at) return 'Token configuré';
      const days = Math.ceil((new Date(acc.token_expires_at) - new Date()) / 86400000);
      if (days <= 0) return 'Token expiré';
      if (days <= 7) return `Expire dans ${days}j`;
      return `Valide jusqu'au ${new Date(acc.token_expires_at).toLocaleDateString('fr-FR')}`;
    }

    function renderAccounts() {
      const grid = document.getElementById('accountsGrid');
      const hasExpiring = accounts.some(a => ['missing', 'expiring'].includes(tokenStatus(a)));
      document.getElementById('tokenWarning').style.display = hasExpiring ? '' : 'none';

      if (!accounts.length) {
        grid.innerHTML = `<div class="card" style="grid-column:1/-1;text-align:center;padding:32px;color:var(--text-muted)">
          Aucun compte configuré. Cliquez sur "+ Nouveau compte" pour commencer.
        </div>`;
        return;
      }

      grid.innerHTML = accounts.map(acc => {
        const ts = tokenStatus(acc);
        return `
          <div class="account-card">
            <div class="account-card-header">
              <div class="account-avatar">
                ${acc.avatar_url ? `<img src="${acc.avatar_url}" alt="">` : '📸'}
              </div>
              <div class="account-info">
                <div class="account-name">${escHtml(acc.name)}</div>
                <div class="account-username">${acc.username ? '@' + escHtml(acc.username) : 'Aucun username'}</div>
              </div>
            </div>
            <div class="account-badges">
              <span class="badge-type">${acc.account_type}</span>
              <span class="badge-token ${ts}">${tokenLabel(acc)}</span>
            </div>
            <div class="account-actions">
              <button class="btn btn-secondary btn-sm" onclick="openEdit(${acc.id})">✏️ Modifier</button>
              <button class="btn btn-secondary btn-sm" onclick="testConn(${acc.id})">⚡ Tester</button>
              <button class="btn btn-danger btn-sm" onclick="deleteAccount(${acc.id})">🗑️</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('btnAdd').onclick = () => {
      editId = null;
      document.getElementById('modalTitle').textContent = 'Nouveau compte';
      document.getElementById('fName').value = '';
      document.getElementById('fUsername').value = '';
      document.getElementById('fType').value = 'business';
      document.getElementById('fIgUserId').value = '';
      document.getElementById('fPageId').value = '';
      document.getElementById('fToken').value = '';
      document.getElementById('fTokenExpires').value = '';
      showModal('modalOverlay');
    };

    function openEdit(id) {
      const acc = accounts.find(a => a.id === id);
      if (!acc) return;
      editId = id;
      document.getElementById('modalTitle').textContent = 'Modifier le compte';
      document.getElementById('fName').value = acc.name || '';
      document.getElementById('fUsername').value = acc.username || '';
      document.getElementById('fType').value = acc.account_type || 'business';
      document.getElementById('fIgUserId').value = acc.ig_user_id || '';
      document.getElementById('fPageId').value = acc.ig_page_id || '';
      document.getElementById('fToken').value = acc.access_token || '';
      document.getElementById('fTokenExpires').value = acc.token_expires_at ? acc.token_expires_at.split('T')[0] : '';
      showModal('modalOverlay');
    }

    document.getElementById('btnSave').onclick = async () => {
      const name = document.getElementById('fName').value.trim();
      if (!name) { showToast('Le nom est requis', 'error'); return; }
      const payload = {
        name,
        username: document.getElementById('fUsername').value.trim() || null,
        account_type: document.getElementById('fType').value,
        ig_user_id: document.getElementById('fIgUserId').value.trim() || null,
        ig_page_id: document.getElementById('fPageId').value.trim() || null,
        access_token: document.getElementById('fToken').value.trim() || null,
        token_expires_at: document.getElementById('fTokenExpires').value || null,
      };
      let r;
      if (editId) {
        r = await api.put(`/api/instagram/accounts/${editId}`, payload);
      } else {
        r = await api.post('/api/instagram/accounts', payload);
      }
      if (r?.error) { showToast(r.error, 'error'); return; }
      showToast(editId ? 'Compte mis à jour' : 'Compte créé', 'success');
      hideModal('modalOverlay');
      await loadAccounts();
    };

    document.getElementById('btnTestConn').onclick = async () => {
      const id = editId;
      if (!id) { showToast('Enregistrez d\'abord le compte', 'warning'); return; }
      showToast('Test en cours…', 'info');
      const r = await api.get(`/api/instagram/accounts/${id}/check`);
      if (r?.ok) showToast(`✅ Connecté : ${r.name} (@${r.username || '?'})`, 'success');
      else showToast(`❌ Erreur : ${r?.error || 'Inconnue'}`, 'error');
    };

    async function testConn(id) {
      showToast('Test en cours…', 'info');
      const r = await api.get(`/api/instagram/accounts/${id}/check`);
      if (r?.ok) showToast(`✅ Connecté : ${r.name} (@${r.username || '?'})`, 'success');
      else showToast(`❌ Erreur : ${r?.error || 'Inconnue'}`, 'error');
    }

    async function deleteAccount(id) {
      const acc = accounts.find(a => a.id === id);
      if (!confirm(`Supprimer le compte "${acc?.name}" ?`)) return;
      await api.delete(`/api/instagram/accounts/${id}`);
      showToast('Compte supprimé', 'success');
      await loadAccounts();
    }
  </script>
</body>
</html>
