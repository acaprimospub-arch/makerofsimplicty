<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tâches Cuisine — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#0b2d3e">
  <style>
    .task-item.my-done { border-left-color: var(--gold); background: rgba(212,175,55,0.06); }
    .task-item.my-done .task-desc { text-decoration: line-through; color: var(--text-muted); }
    .task-item.my-done .task-checkbox { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 900; }

    .task-item.others-done { border-left-color: #5b8dee; background: rgba(91,141,238,0.04); }
    .task-item.others-done .task-desc { text-decoration: line-through; color: var(--text-muted); }
    .task-item.others-done .task-checkbox { background: rgba(91,141,238,0.18); color: #5b8dee; border-color: #5b8dee; }

    .task-completers { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .completer-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; letter-spacing: 0.2px; }
    .completer-badge.me { background: rgba(212,175,55,0.22); color: var(--gold); border: 1px solid var(--gold); }
    .completer-badge.other { background: rgba(91,141,238,0.15); color: #5b8dee; border: 1px solid rgba(91,141,238,0.45); }

    .team-stats-bar { display: flex; align-items: center; gap: 6px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .team-stat-item { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; white-space: nowrap; }
    .team-stat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .team-stat-dot.mine { background: var(--gold); }
    .team-stat-dot.team { background: #5b8dee; }
    .team-stat-dot.left { background: var(--border); border: 1px solid #555; }
    .team-stat-label { color: var(--text-muted); }
    .team-stat-value { font-weight: 700; color: var(--text); }
    .team-stat-sep { color: var(--border); margin: 0 4px; }

    .subsection-count { font-size: 0.72rem; color: var(--text-muted); font-weight: 400; margin-left: 8px; }
    .subsection-count .done-count { color: var(--gold); font-weight: 600; }

    /* ── Qui fait quoi ── */
    .team-overview { margin-top: 28px; }
    .team-overview-title { font-size: .82rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
    .team-member-row { display: flex; align-items: center; gap: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 8px; }
    .tm-name { font-weight: 700; font-size: .95rem; flex: 1; }
    .tm-count { font-size: .82rem; color: var(--text-muted); }
    .tm-count b { color: var(--text); }
    .tm-bar { flex: 2; height: 6px; background: var(--bg-surface); border-radius: 3px; overflow: hidden; }
    .tm-bar-fill { height: 100%; border-radius: 3px; background: var(--primary); transition: width .4s; }

    /* ── Gestion tâches (chef) ── */
    .drawer-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; opacity:0; pointer-events:none; transition:opacity .25s; }
    .drawer-backdrop.open { opacity:1; pointer-events:auto; }
    .drawer { position:fixed; bottom:0; left:0; right:0; z-index:201; background:var(--bg-card); border-radius:20px 20px 0 0; box-shadow:0 -8px 40px rgba(0,0,0,.5); transform:translateY(102%); transition:transform .3s cubic-bezier(.32,.72,0,1); max-height:92dvh; display:flex; flex-direction:column; }
    .drawer.open { transform:translateY(0); }
    @media (min-width:641px) {
      .drawer { bottom:auto; top:50%; left:50%; right:auto; transform:translate(-50%,-40%); opacity:0; pointer-events:none; border-radius:var(--radius); width:100%; max-width:480px; transition:transform .25s ease,opacity .25s ease; }
      .drawer.open { transform:translate(-50%,-50%); opacity:1; pointer-events:auto; }
    }
    .drawer-handle { width:40px; height:4px; background:rgba(255,255,255,.15); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
    @media (min-width:641px) { .drawer-handle { display:none; } }
    .drawer-head { display:flex; align-items:center; justify-content:space-between; padding:14px 20px 12px; flex-shrink:0; border-bottom:1px solid var(--border); }
    .drawer-title { font-size:1rem; font-weight:700; }
    .drawer-close { width:30px; height:30px; border-radius:50%; background:var(--bg-surface); color:var(--text-muted); display:flex; align-items:center; justify-content:center; font-size:.9rem; cursor:pointer; border:none; }
    .drawer-body { overflow-y:auto; padding:16px 20px; flex:1; }
    .drawer-footer { display:flex; gap:8px; padding:10px 20px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--border); flex-shrink:0; }
    .drawer-footer .btn { flex:1; justify-content:center; min-height:46px; }
    .frow { display:flex; flex-direction:column; gap:14px; }
    .fgroup { display:flex; flex-direction:column; gap:6px; }
    .fgroup label { font-size:.82rem; font-weight:600; color:var(--text-muted); }
    .task-manage-list { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
    .task-manage-item { display:flex; align-items:center; gap:10px; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 14px; }
    .task-manage-desc { flex:1; font-size:.88rem; }
    .task-manage-cat { font-size:.7rem; color:var(--text-muted); margin-top:2px; }
    .task-manage-actions { display:flex; gap:6px; flex-shrink:0; }
    .btn-icon { width:32px; height:32px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg-card); color:var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.85rem; }
    .btn-icon:hover { border-color:var(--primary); color:var(--primary); }
    .btn-icon.danger:hover { border-color:var(--danger); color:var(--danger); }

    /* ── Signalement retard / heures supp ── */
    .signal-section { margin-top: 24px; }
    .signal-title { font-size:.82rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
    .signal-btns { display:flex; gap:10px; }
    .btn-signal { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 10px; cursor:pointer; font-size:.85rem; font-weight:600; transition:border-color .15s,background .12s; }
    .btn-signal:active { background:var(--bg-surface); }
    .btn-signal.retard { border-color:rgba(240,180,41,.35); }
    .btn-signal.retard:hover { border-color:var(--warning); background:rgba(240,180,41,.07); }
    .btn-signal.supp   { border-color:rgba(76,175,106,.35); }
    .btn-signal.supp:hover   { border-color:var(--success); background:rgba(76,175,106,.07); }
    .btn-signal-icon { font-size:1.4rem; }
    .time-events-list { display:flex; flex-direction:column; gap:6px; margin-top:10px; }
    .time-event-item { display:flex; align-items:center; gap:10px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 14px; }
    .te-badge { font-size:.72rem; font-weight:700; padding:3px 9px; border-radius:20px; white-space:nowrap; }
    .te-retard { background:rgba(240,180,41,.15); color:var(--warning); border:1px solid rgba(240,180,41,.3); }
    .te-supp   { background:rgba(76,175,106,.12); color:var(--success); border:1px solid rgba(76,175,106,.3); }
    .te-info { flex:1; font-size:.85rem; }
    .te-note { font-size:.75rem; color:var(--text-muted); margin-top:2px; }
    .te-del { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:.85rem; padding:4px; }
    .te-del:hover { color:var(--danger); }
  </style>
</head>
<body>
  <nav class="nav" id="nav"></nav>

  <div class="page">
    <div class="container-sm">
      <div class="page-header">
        <div>
          <div class="page-title" id="pageTitle">🍳 Tâches Cuisine</div>
          <div class="page-subtitle" id="dateLabel"></div>
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:12px;">
        <div class="tabs" id="tabBar"></div>
        <div style="display:flex;align-items:center;gap:10px;min-width:220px;">
          <div class="progress-bar" style="flex:1;">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
          <span class="text-sm text-muted" id="progressLabel">0/0</span>
        </div>
      </div>

      <div class="team-stats-bar" id="teamStatsBar">
        <div class="team-stat-item">
          <div class="team-stat-dot mine"></div>
          <span class="team-stat-label">Moi :</span>
          <span class="team-stat-value" id="statMe">0</span>
        </div>
        <span class="team-stat-sep">·</span>
        <div class="team-stat-item">
          <div class="team-stat-dot team"></div>
          <span class="team-stat-label">Collègues :</span>
          <span class="team-stat-value" id="statTeam">0</span>
        </div>
        <span class="team-stat-sep">·</span>
        <div class="team-stat-item">
          <div class="team-stat-dot left"></div>
          <span class="team-stat-label">Restantes :</span>
          <span class="team-stat-value" id="statLeft">0</span>
        </div>
      </div>

      <div id="tasksList"></div>

      <!-- Qui fait quoi (chef only) -->
      <div class="team-overview hidden" id="teamOverview">
        <div class="team-overview-title">👥 Qui fait quoi aujourd'hui</div>
        <div id="teamOverviewList"></div>
      </div>

      <!-- Gestion tâches (chef only) -->
      <div class="hidden" id="chefControls" style="margin-top:20px;">
        <button class="btn btn-secondary" style="width:100%" onclick="openTaskManager()">⚙️ Gérer les tâches</button>
      </div>

      <!-- Signalement retard / heures supp -->
      <div class="signal-section">
        <div class="signal-title">⏱ Signalement</div>
        <div class="signal-btns">
          <button class="btn-signal retard" onclick="openSignal('retard')">
            <span class="btn-signal-icon">⏰</span>
            <span>Retard</span>
          </button>
          <button class="btn-signal supp" onclick="openSignal('supp')">
            <span class="btn-signal-icon">➕</span>
            <span>Heures supp</span>
          </button>
        </div>
        <div class="time-events-list" id="timeEventsList"></div>
      </div>
    </div>
  </div>

  <!-- Backdrop -->
  <div class="drawer-backdrop" id="drawerBackdrop" onclick="closeDrawer()"></div>

  <!-- Drawer: gestion tâches -->
  <div class="drawer" id="taskManagerDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <div class="drawer-title">⚙️ Gestion des tâches</div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body">
      <button class="btn btn-primary" style="width:100%;margin-bottom:14px" onclick="openTaskForm()">+ Nouvelle tâche</button>
      <div class="task-manage-list" id="taskManageList"></div>
    </div>
  </div>

  <!-- Drawer: formulaire tâche -->
  <div class="drawer" id="taskFormDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <div class="drawer-title" id="taskFormTitle">Nouvelle tâche</div>
      <button class="drawer-close" onclick="closeTaskForm()">✕</button>
    </div>
    <div class="drawer-body">
      <form id="taskForm" onsubmit="saveTask(event)">
        <input type="hidden" id="taskId">
        <div class="frow">
          <div class="fgroup">
            <label>Description *</label>
            <input type="text" id="taskDesc" placeholder="Ex : Nettoyer le grill" required autocomplete="off">
          </div>
          <div class="fgroup">
            <label>Catégorie</label>
            <select id="taskCat">
              <option value="fermeture">🔒 Fermeture</option>
              <option value="nettoyage">🧽 Nettoyage</option>
            </select>
          </div>
          <div class="fgroup">
            <label>Section</label>
            <input type="text" id="taskSection" placeholder="Ex : Cuisine" value="Cuisine">
          </div>
          <div class="fgroup">
            <label>Sous-section</label>
            <input type="text" id="taskSubsection" placeholder="Ex : Matériel de cuisson">
          </div>
        </div>
      </form>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-secondary" onclick="closeTaskForm()">Annuler</button>
      <button type="submit" form="taskForm" class="btn btn-primary">Enregistrer</button>
    </div>
  </div>

  <!-- Drawer: signalement -->
  <div class="drawer" id="signalDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <div class="drawer-title" id="signalDrawerTitle">Signaler un retard</div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body">
      <form id="signalForm" onsubmit="submitSignal(event)">
        <input type="hidden" id="signalType">
        <div class="frow">
          <div class="fgroup">
            <label id="signalMinLabel">Minutes de retard</label>
            <div style="display:flex;align-items:center;gap:10px">
              <input type="number" id="signalMinutes" min="1" max="480" placeholder="Ex : 15" style="flex:1" required>
              <span style="color:var(--text-muted);font-size:.85rem">min</span>
            </div>
          </div>
          <div class="fgroup">
            <label>Note <span style="font-weight:400;color:var(--text-muted)">(optionnel)</span></label>
            <input type="text" id="signalNote" placeholder="Ex : Transport, problème..." autocomplete="off">
          </div>
        </div>
      </form>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-secondary" onclick="closeDrawer()">Annuler</button>
      <button type="submit" form="signalForm" class="btn btn-primary">Envoyer</button>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script>
    buildNav('cuisine-taches');
    document.getElementById('dateLabel').textContent = formatDate(today());

    const socket = io();
    let allTasks = [];
    let currentTab = 'fermeture';
    let currentUser = null;

    const TABS = [
      { key: 'fermeture', label: '🔒 FERMETURE' },
      { key: 'nettoyage', label: '🧽 NETTOYAGE' },
    ];

    const SECTION_ICONS = {
      'Cuisine': '🍳',
      'Plan de Nettoyage': '🧽',
    };

    async function init() {
      currentUser = await api.get('/api/auth/me');
      if (!currentUser) return;

      isChef = currentUser.role === 'admin' || (currentUser.role === 'manager' && currentUser.shift === 'cuisine');

      document.getElementById('tabBar').innerHTML = TABS.map(t => `
        <button class="tab ${t.key === currentTab ? 'active' : ''}"
                id="tab-${t.key}"
                onclick="switchTab('${t.key}')">${t.label}</button>
      `).join('');

      await loadTasks();
      await loadTimeEvents();

      if (isChef) {
        document.getElementById('teamOverview').classList.remove('hidden');
        document.getElementById('chefControls').classList.remove('hidden');
        await loadTeamOverview();
      }
    }

    async function loadTasks() {
      const data = await api.get('/api/tasks');
      if (!data) return;
      allTasks = data;
      renderTab();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(btn => {
        btn.classList.toggle('active', btn.id === `tab-${tab}`);
      });
      renderTab();
    }

    function renderTab() {
      const tasks = allTasks.filter(t => t.category === currentTab);

      const totalDone = tasks.filter(t => t.completion_count > 0).length;
      const myDone    = tasks.filter(t => t.my_completed).length;
      const onlyTeam  = tasks.filter(t => t.completion_count > 0 && !t.my_completed).length;
      const remaining = tasks.filter(t => t.completion_count === 0).length;

      const pct = tasks.length ? Math.round(totalDone / tasks.length * 100) : 0;
      const fill = document.getElementById('progressFill');
      fill.style.width = pct + '%';
      fill.className = 'progress-fill' + (pct === 100 ? ' success' : '');
      document.getElementById('progressLabel').textContent = `${totalDone}/${tasks.length}`;

      document.getElementById('statMe').textContent   = myDone;
      document.getElementById('statTeam').textContent = onlyTeam;
      document.getElementById('statLeft').textContent = remaining;

      const sections = {};
      tasks.forEach(t => {
        if (!sections[t.section]) sections[t.section] = {};
        if (!sections[t.section][t.subsection]) sections[t.section][t.subsection] = [];
        sections[t.section][t.subsection].push(t);
      });

      const container = document.getElementById('tasksList');

      if (!tasks.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">✅</div><div class="empty-state-text">Aucune tâche pour cette catégorie</div></div>`;
        return;
      }

      container.innerHTML = Object.entries(sections).map(([section, subsections]) => `
        <div class="task-section">
          <div class="task-section-header">
            <span class="task-section-icon">${SECTION_ICONS[section] || '📌'}</span>
            <span class="task-section-title">${section}</span>
          </div>
          ${Object.entries(subsections).map(([sub, items]) => {
            const subDone = items.filter(t => t.completion_count > 0).length;
            const countLabel = subDone > 0
              ? `<span class="subsection-count">(<span class="done-count">${subDone}</span>/${items.length} faite${subDone > 1 ? 's' : ''})</span>`
              : `<span class="subsection-count">(${items.length})</span>`;
            return `
              <div class="task-subsection">
                <div class="task-subsection-header">${sub} ${countLabel}</div>
                ${items.map(t => renderTask(t)).join('')}
              </div>`;
          }).join('')}
        </div>
      `).join('');
    }

    function renderTask(t) {
      const isMine  = !!t.my_completed;
      const anyDone = t.completion_count > 0;

      let cssClass = 'task-item';
      if (isMine)       cssClass += ' my-done';
      else if (anyDone) cssClass += ' others-done';

      let badgesHtml = '';
      if (anyDone && t.completers) {
        const names = t.completers.split(', ');
        badgesHtml = `<div class="task-completers">
          ${names.map(name => {
            const isMe = currentUser && name === currentUser.name;
            return `<span class="completer-badge ${isMe ? 'me' : 'other'}">✓ ${name}</span>`;
          }).join('')}
        </div>`;
      }

      return `
        <div class="${cssClass}" id="task-${t.id}" onclick="toggleTask(${t.id})">
          <div class="task-checkbox">${isMine ? '✓' : (anyDone ? '✓' : '')}</div>
          <div class="task-content">
            <div class="task-desc">${t.description}</div>
            ${badgesHtml}
          </div>
        </div>
      `;
    }

    async function toggleTask(id) {
      const task = allTasks.find(t => t.id === id);
      if (!task) return;

      if (task.my_completed) {
        await api.delete(`/api/tasks/${id}/complete`);
        task.my_completed = 0;
        task.my_completion_id = null;
        task.completion_count = Math.max(0, (task.completion_count || 1) - 1);
        if (task.completers && currentUser) {
          const names = task.completers.split(', ').filter(n => n !== currentUser.name);
          task.completers = names.join(', ') || null;
        }
      } else {
        await api.post(`/api/tasks/${id}/complete`, {});
        task.my_completed = 1;
        task.my_completion_id = 1;
        task.completion_count = (task.completion_count || 0) + 1;
        if (currentUser) {
          const names = task.completers ? task.completers.split(', ') : [];
          if (!names.includes(currentUser.name)) names.push(currentUser.name);
          task.completers = names.join(', ');
        }
      }
      renderTab();
    }

    socket.on('task:updated', ({ taskId, userId, userName, completed }) => {
      if (userId === currentUser?.id) return;
      const task = allTasks.find(t => t.id === taskId);
      if (!task) return;

      const names = task.completers ? task.completers.split(', ') : [];
      if (completed) {
        if (!names.includes(userName)) names.push(userName);
        task.completion_count = (task.completion_count || 0) + 1;
      } else {
        const idx = names.indexOf(userName);
        if (idx > -1) names.splice(idx, 1);
        task.completion_count = Math.max(0, (task.completion_count || 1) - 1);
      }
      task.completers = names.join(', ') || null;
      renderTab();
      if (isChef) loadTeamOverview();
    });

    // ── Gestion tâches (chef) ──────────────────────────────────────────────────
    let managedTasks = [];
    let editingTaskId = null;
    let isChef = false;

    function openDrawer(id) {
      document.getElementById('drawerBackdrop').classList.add('open');
      document.getElementById(id).classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
      document.getElementById('drawerBackdrop').classList.remove('open');
      document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
      document.body.style.overflow = '';
    }
    function closeTaskForm() {
      closeDrawer();
      setTimeout(() => openTaskManager(), 50);
    }

    async function openTaskManager() {
      closeDrawer();
      const data = await api.get('/api/cuisine/tasks');
      if (!data) return;
      managedTasks = data;
      renderTaskManageList();
      openDrawer('taskManagerDrawer');
    }

    function renderTaskManageList() {
      const catLabel = { fermeture: '🔒 Fermeture', nettoyage: '🧽 Nettoyage' };
      const el = document.getElementById('taskManageList');
      if (!managedTasks.length) {
        el.innerHTML = '<div style="color:var(--text-muted);font-size:.85rem;text-align:center;padding:20px">Aucune tâche</div>';
        return;
      }
      el.innerHTML = managedTasks.map(t => `
        <div class="task-manage-item">
          <div style="flex:1;min-width:0">
            <div class="task-manage-desc">${t.description}</div>
            <div class="task-manage-cat">${catLabel[t.category] || t.category} · ${t.section || ''} · ${t.subsection || ''}</div>
          </div>
          <div class="task-manage-actions">
            <button class="btn-icon" onclick="openTaskForm(${t.id})" title="Modifier">✏️</button>
            <button class="btn-icon danger" onclick="deleteTask(${t.id})" title="Supprimer">🗑</button>
          </div>
        </div>
      `).join('');
    }

    function openTaskForm(id = null) {
      closeDrawer();
      editingTaskId = id;
      document.getElementById('taskFormTitle').textContent = id ? 'Modifier la tâche' : 'Nouvelle tâche';
      if (id) {
        const t = managedTasks.find(x => x.id === id);
        if (t) {
          document.getElementById('taskId').value = t.id;
          document.getElementById('taskDesc').value = t.description;
          document.getElementById('taskCat').value = t.category;
          document.getElementById('taskSection').value = t.section || '';
          document.getElementById('taskSubsection').value = t.subsection || '';
        }
      } else {
        document.getElementById('taskId').value = '';
        document.getElementById('taskDesc').value = '';
        document.getElementById('taskCat').value = 'fermeture';
        document.getElementById('taskSection').value = 'Cuisine';
        document.getElementById('taskSubsection').value = '';
      }
      openDrawer('taskFormDrawer');
      setTimeout(() => document.getElementById('taskDesc').focus(), 350);
    }

    async function saveTask(e) {
      e.preventDefault();
      const id = document.getElementById('taskId').value;
      const body = {
        description: document.getElementById('taskDesc').value.trim(),
        category:    document.getElementById('taskCat').value,
        section:     document.getElementById('taskSection').value.trim() || 'Cuisine',
        subsection:  document.getElementById('taskSubsection').value.trim() || null,
        domain:      'cuisine',
      };
      if (id) {
        await api.put(`/api/cuisine/tasks/${id}`, body);
        showToast('Tâche modifiée ✓', 'success');
      } else {
        await api.post('/api/cuisine/tasks', body);
        showToast('Tâche créée ✓', 'success');
      }
      closeDrawer();
      await loadTasks();
    }

    async function deleteTask(id) {
      if (!confirm('Supprimer cette tâche ?')) return;
      await api.delete(`/api/cuisine/tasks/${id}`);
      showToast('Tâche supprimée', 'info');
      closeDrawer();
      await loadTasks();
    }

    // ── Qui fait quoi ─────────────────────────────────────────────────────────
    async function loadTeamOverview() {
      const data = await api.get(`/api/cuisine/completions?date=${today()}`);
      if (!data) return;
      const el = document.getElementById('teamOverviewList');
      el.innerHTML = data.map(m => {
        const pct = m.total > 0 ? Math.round(m.done / m.total * 100) : 0;
        return `
          <div class="team-member-row">
            <div class="tm-name">${m.name}</div>
            <div class="tm-bar"><div class="tm-bar-fill" style="width:${pct}%"></div></div>
            <div class="tm-count"><b>${m.done}</b>/${m.total}</div>
          </div>`;
      }).join('');
    }

    // ── Signalement ───────────────────────────────────────────────────────────
    let timeEvents = [];

    async function loadTimeEvents() {
      const data = await api.get(`/api/cuisine/time-events?date=${today()}`);
      if (!data) return;
      timeEvents = data;
      renderTimeEvents();
    }

    function renderTimeEvents() {
      const el = document.getElementById('timeEventsList');
      if (!timeEvents.length) { el.innerHTML = ''; return; }
      const myEvents = isChef ? timeEvents : timeEvents.filter(e => e.user_id === currentUser?.id);
      if (!myEvents.length) { el.innerHTML = ''; return; }
      el.innerHTML = myEvents.map(e => {
        const label = e.type === 'retard' ? 'Retard' : 'Heure supp';
        const cls   = e.type === 'retard' ? 'te-retard' : 'te-supp';
        const who   = isChef ? `<b>${e.user_name}</b> · ` : '';
        return `
          <div class="time-event-item">
            <span class="te-badge ${cls}">${label}</span>
            <div class="te-info">
              <div>${who}${e.minutes} min</div>
              ${e.note ? `<div class="te-note">${e.note}</div>` : ''}
            </div>
            <button class="te-del" onclick="deleteTimeEvent(${e.id})" title="Supprimer">✕</button>
          </div>`;
      }).join('');
    }

    function openSignal(type) {
      document.getElementById('signalType').value = type;
      document.getElementById('signalDrawerTitle').textContent = type === 'retard' ? '⏰ Signaler un retard' : '➕ Heures supplémentaires';
      document.getElementById('signalMinLabel').textContent = type === 'retard' ? 'Minutes de retard' : 'Minutes supplémentaires';
      document.getElementById('signalMinutes').value = '';
      document.getElementById('signalNote').value = '';
      openDrawer('signalDrawer');
      setTimeout(() => document.getElementById('signalMinutes').focus(), 350);
    }

    async function submitSignal(e) {
      e.preventDefault();
      const type    = document.getElementById('signalType').value;
      const minutes = parseInt(document.getElementById('signalMinutes').value) || 0;
      const note    = document.getElementById('signalNote').value.trim() || null;
      if (!minutes) return;
      await api.post('/api/cuisine/time-events', { type, minutes, note });
      closeDrawer();
      showToast(type === 'retard' ? 'Retard signalé ✓' : 'Heures supp signalées ✓', 'success');
      await loadTimeEvents();
    }

    async function deleteTimeEvent(id) {
      await api.delete(`/api/cuisine/time-events/${id}`);
      await loadTimeEvents();
    }

    socket.on('cuisine:time-events:updated', ({ date: d, events }) => {
      if (d === today()) {
        timeEvents = events;
        renderTimeEvents();
      }
    });

    init();
  </script>
</body>
</html>
