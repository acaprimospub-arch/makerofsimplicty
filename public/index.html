<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Connexion — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#08141c">
</head>
<body>
  <main class="login-page" id="main-content">
    <div class="login-box">

      <div class="login-logo" aria-hidden="true">
        <img src="/images/logo.png" alt="" class="login-logo-img"
             onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'">
        <div id="logo-fallback" style="display:none;">
          <div class="login-logo-text">MOS</div>
          <div style="font-size:0.75rem;color:var(--text-subtle);letter-spacing:2px;margin-top:4px;text-transform:uppercase;">Maker of Stories</div>
        </div>
        <p style="margin-top:10px;color:var(--text-subtle);font-size:0.8rem;letter-spacing:1px;">Mos Pub Mercière</p>
      </div>

      <section class="login-card" aria-label="Connexion par code PIN">
        <h1 class="login-title">Entrez votre code PIN</h1>

        <!-- Affichage du PIN (annoncé aux lecteurs d'écran) -->
        <output
          id="pin-display"
          aria-live="polite"
          aria-atomic="true"
          aria-label="Code saisi : 0 chiffre"
          class="pin-display"
        >
          <span class="pin-dot" aria-hidden="true"></span>
          <span class="pin-dot" aria-hidden="true"></span>
          <span class="pin-dot" aria-hidden="true"></span>
          <span class="pin-dot" aria-hidden="true"></span>
        </output>

        <!-- Pavé numérique -->
        <div class="pin-pad" role="group" aria-label="Pavé numérique">
          <button class="pin-key" type="button" aria-label="Chiffre 1">1</button>
          <button class="pin-key" type="button" aria-label="Chiffre 2">2</button>
          <button class="pin-key" type="button" aria-label="Chiffre 3">3</button>
          <button class="pin-key" type="button" aria-label="Chiffre 4">4</button>
          <button class="pin-key" type="button" aria-label="Chiffre 5">5</button>
          <button class="pin-key" type="button" aria-label="Chiffre 6">6</button>
          <button class="pin-key" type="button" aria-label="Chiffre 7">7</button>
          <button class="pin-key" type="button" aria-label="Chiffre 8">8</button>
          <button class="pin-key" type="button" aria-label="Chiffre 9">9</button>
          <button class="pin-key del" type="button" id="btn-del" aria-label="Effacer le dernier chiffre">
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" width="20" height="20">
              <path fill-rule="evenodd" d="M7.293 5.293a1 1 0 011.414 0L10 6.586l1.293-1.293a1 1 0 111.414 1.414L11.414 8l1.293 1.293a1 1 0 01-1.414 1.414L10 9.414l-1.293 1.293a1 1 0 01-1.414-1.414L8.586 8 7.293 6.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
              <path fill-rule="evenodd" d="M2 10a1 1 0 01.293-.707l6-6A1 1 0 019 3h8a1 1 0 011 1v12a1 1 0 01-1 1H9a1 1 0 01-.707-.293l-6-6A1 1 0 012 10zm2 0l5.586-5.586L17 4.414v11.172l-7.414-.001L4 10z" clip-rule="evenodd"/>
            </svg>
          </button>
          <button class="pin-key" type="button" aria-label="Chiffre 0">0</button>
          <button class="pin-key enter" type="button" id="btn-ok" aria-label="Valider le code PIN">OK</button>
        </div>

        <!-- Message d'erreur — annoncé immédiatement (role="alert") -->
        <p class="pin-error" id="pin-error" role="alert" aria-live="assertive" aria-atomic="true"></p>
      </section>

    </div>
  </main>

  <script>
    'use strict';
    const MAX = 4;
    let pin = '';

    const display = document.getElementById('pin-display');
    const errorEl = document.getElementById('pin-error');
    const dots = display.querySelectorAll('.pin-dot');

    function updateDisplay() {
      dots.forEach((dot, i) => dot.classList.toggle('filled', i < pin.length));
      display.setAttribute('aria-label', `Code saisi\u00a0: ${pin.length} chiffre${pin.length !== 1 ? 's' : ''}`);
    }

    function pressKey(k) {
      if (pin.length >= MAX) return;
      pin += k;
      errorEl.textContent = '';
      updateDisplay();
      if (pin.length === MAX) submitPin();
    }

    function deleteKey() {
      if (!pin) return;
      pin = pin.slice(0, -1);
      errorEl.textContent = '';
      updateDisplay();
    }

    async function submitPin() {
      if (!pin) return;
      const okBtn = document.getElementById('btn-ok');
      okBtn.disabled = true;
      okBtn.textContent = '…';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin })
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Code PIN incorrect';
          pin = '';
          updateDisplay();
          // Secousse (respecte prefers-reduced-motion via CSS)
          const card = document.querySelector('.login-card');
          card.classList.remove('shake');
          void card.offsetWidth;
          card.classList.add('shake');
          card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
          okBtn.disabled = false;
          okBtn.textContent = 'OK';
          return;
        }
        window.location.href = '/menu.html';
      } catch {
        errorEl.textContent = 'Erreur de connexion, réessayez.';
        pin = '';
        updateDisplay();
        okBtn.disabled = false;
        okBtn.textContent = 'OK';
      }
    }

    // ── Pavé numérique — event listeners ──
    document.querySelectorAll('.pin-key[aria-label^="Chiffre"]').forEach(btn => {
      const digit = btn.getAttribute('aria-label').replace('Chiffre ', '');
      btn.addEventListener('click', () => pressKey(digit));
    });
    document.getElementById('btn-del').addEventListener('click', deleteKey);
    document.getElementById('btn-ok').addEventListener('click', submitPin);

    // ── Support clavier physique ──
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') pressKey(e.key);
      else if (e.key === 'Backspace') { e.preventDefault(); deleteKey(); }
      else if (e.key === 'Enter') submitPin();
    });

    // ── Déjà connecté ? Redirection immédiate ──
    fetch('/api/auth/me')
      .then(r => r.json())
      .then(user => { if (user && user.id) window.location.href = '/menu.html'; })
      .catch(() => {});
  </script>
</body>
</html>
