<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Créateur de Devis — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#08141c">
  <style>
    /* ── Layout desktop ── */
    @media(min-width: 900px) {
      .devis-layout { display:grid; grid-template-columns:1fr 340px; gap:0; height:calc(100vh - 56px); overflow:hidden; }
      .devis-main  { overflow-y:auto; padding:20px 24px; }
      .devis-recap { overflow-y:auto; padding:20px; border-left:1px solid var(--border); background:var(--bg-card); }
      .container-sm { max-width:none !important; padding:0 !important; }
    }
    @media(max-width: 899px) {
      .devis-layout { display:flex; flex-direction:column; }
      .devis-main  { padding:16px; }
      .devis-recap { padding:16px; border-top:2px solid var(--border); }
    }

    /* ── Config client ── */
    .config-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .config-grid .full { grid-column:1/-1; }
    .form-group { margin-bottom:0; }
    .form-group label { display:block; font-size:11px; font-weight:600; color:var(--text-muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:.4px; }
    .form-group input, .form-group select { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 12px; font-size:14px; box-sizing:border-box; }
    .form-group input:focus-visible, .form-group select:focus-visible { box-shadow:var(--focus-ring); outline:none; }

    /* ── Budget bar ── */
    .budget-bar-wrap { margin-bottom:16px; padding:12px 14px; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; }
    .budget-bar-header { display:flex; justify-content:space-between; font-size:12px; margin-bottom:8px; }
    .budget-label { color:var(--text-muted); }
    .budget-value { font-weight:700; }
    .budget-value.over { color:var(--danger); }
    .budget-value.ok   { color:var(--success); }
    .budget-track { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
    .budget-fill  { height:100%; border-radius:4px; background:var(--success); transition:width .3s ease,background .3s ease; }
    .budget-fill.over { background:var(--danger); }
    .budget-fill.warn { background:var(--orange); }
    @media (prefers-reduced-motion: reduce) { .budget-fill { transition: none; } }

    /* ── Onglets menu ── */
    .menu-tabs { display:flex; gap:6px; margin-bottom:14px; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:4px; }
    .menu-tab { flex:1; padding:7px 4px; border-radius:7px; border:none; background:none; color:var(--text-muted); font-size:13px; font-weight:600; cursor:pointer; }
    .menu-tab[aria-selected="true"] { background:var(--primary); color:#000; }
    .menu-tab:focus-visible { box-shadow:var(--focus-ring); outline:none; }

    /* ── Items menu ── */
    .menu-section { display:none; }
    .menu-section.active { display:block; }
    .menu-item { display:flex; align-items:center; gap:12px; padding:10px 12px; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; transition:border-color .15s,background .15s; }
    .menu-item.selected { border-color:var(--primary); background:rgba(230,184,74,.07); }
    .menu-item-info { flex:1; min-width:0; }
    .menu-item-name { font-size:13px; font-weight:700; margin-bottom:2px; }
    .menu-item-desc { font-size:11px; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .menu-item-price { font-size:13px; font-weight:700; color:var(--primary); min-width:54px; text-align:right; }
    .qty-stepper { display:flex; align-items:center; gap:4px; flex-shrink:0; }
    .qty-btn { width:28px; height:28px; border-radius:50%; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
    .qty-btn:focus-visible { box-shadow:var(--focus-ring); outline:none; }
    .qty-val { width:28px; text-align:center; font-size:14px; font-weight:700; }
    .suggest-btn { font-size:10px; padding:2px 6px; border-radius:10px; border:1px solid rgba(230,184,74,.4); background:rgba(230,184,74,.08); color:var(--primary); cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .suggest-btn:focus-visible { box-shadow:var(--focus-ring); outline:none; }

    /* ── Récap ── */
    .recap-title { font-size:14px; font-weight:700; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); }
    .recap-item { display:flex; justify-content:space-between; align-items:baseline; font-size:13px; padding:5px 0; border-bottom:1px solid rgba(255,255,255,.04); }
    .recap-item-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-right:8px; }
    .recap-item-qty   { color:var(--text-muted); font-size:11px; margin-right:4px; }
    .recap-item-price { font-weight:600; color:var(--primary); flex-shrink:0; }
    .recap-empty { color:var(--text-muted); font-size:12px; text-align:center; padding:16px 0; }
    .recap-totals { margin-top:14px; padding-top:12px; border-top:1px solid var(--border); }
    .recap-line { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; color:var(--text-muted); }
    .recap-line.ttc { font-size:16px; font-weight:700; color:var(--text); padding-top:8px; margin-top:4px; border-top:1px solid var(--border); }
    .recap-line.perpers { font-size:11px; color:var(--text-muted); margin-top:4px; }
    .tva-note { font-size:10px; color:var(--text-muted); margin-top:6px; text-align:center; }
    .btn-suggest-all { width:100%; padding:8px; border-radius:8px; border:1px dashed rgba(230,184,74,.5); background:rgba(230,184,74,.06); color:var(--primary); font-size:12px; cursor:pointer; margin-bottom:14px; }
    .btn-suggest-all:focus-visible { box-shadow:var(--focus-ring); outline:none; }

    /* ── Actions ── */
    .devis-actions { display:flex; flex-direction:column; gap:8px; margin-top:16px; }

    /* ── Confirm ── */
    .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:400; display:flex; align-items:center; justify-content:center; padding:20px; }
    .confirm-overlay.hidden { display:none; }
    .confirm-box { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; max-width:340px; width:100%; }
    .confirm-box p { font-size:.92rem; margin-bottom:20px; line-height:1.5; }
    .confirm-actions { display:flex; gap:10px; justify-content:flex-end; }

    /* ── Print ── */
    @media print {
      nav, .devis-main .menu-tabs, .devis-main .menu-section, .budget-bar-wrap, .config-grid, .devis-actions, .btn-suggest-all { display:none !important; }
      .devis-layout { display:block !important; }
      .devis-recap { border:none !important; padding:0 !important; width:100% !important; }
      .recap-title::before { content:"Devis — Mos Pub Mercière\A"; white-space:pre; font-size:20px; }
      body { background:white !important; color:black !important; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Aller au contenu principal</a>
  <nav class="nav" id="nav" role="navigation" aria-label="Navigation principale"></nav>

  <div class="page" style="padding:0">
    <div class="devis-layout">

      <!-- ── Colonne gauche : config + menu ── -->
      <main class="devis-main" id="main-content" tabindex="-1">
        <div class="container-sm">

          <!-- En-tête -->
          <div class="card-header" style="margin-bottom:14px">
            <h1 class="card-title">Créateur de devis</h1>
            <button class="btn" style="font-size:12px;padding:7px 12px" id="btnBack">
              <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              Retour
            </button>
          </div>

          <!-- Config client -->
          <section class="card" style="margin-bottom:14px" aria-labelledby="infoHeading">
            <div class="card-header" style="margin-bottom:12px">
              <h2 class="card-title" id="infoHeading" style="font-size:13px">Informations</h2>
            </div>
            <div class="config-grid">
              <div class="form-group full">
                <label for="cfgClient">Client</label>
                <input type="text" id="cfgClient" placeholder="Nom du client" autocomplete="off">
              </div>
              <div class="form-group">
                <label for="cfgDate">Date</label>
                <input type="date" id="cfgDate">
              </div>
              <div class="form-group">
                <label for="cfgPax">Nb. de personnes</label>
                <input type="number" id="cfgPax" value="10" min="1">
              </div>
              <div class="form-group">
                <label for="cfgBudget">Budget / personne (€ TTC)</label>
                <input type="number" id="cfgBudget" value="25" min="0" step="0.5">
              </div>
              <div class="form-group">
                <label for="cfgTva">TVA applicable</label>
                <select id="cfgTva">
                  <option value="10" selected>10 % — Restauration</option>
                  <option value="5.5">5,5 % — Vente à emporter</option>
                  <option value="20">20 % — Boissons alcoolisées</option>
                </select>
              </div>
            </div>
          </section>

          <!-- Barre budget -->
          <div class="budget-bar-wrap" id="budgetBar">
            <div class="budget-bar-header">
              <span class="budget-label">Budget total : <strong id="budgetTotal">—</strong></span>
              <span class="budget-value" id="budgetStatus" aria-live="polite">0,00 € utilisés</span>
            </div>
            <div class="budget-track" role="progressbar" id="budgetTrack" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Budget utilisé">
              <div class="budget-fill" id="budgetFill" style="width:0%"></div>
            </div>
          </div>

          <!-- Bouton suggestion auto -->
          <button class="btn-suggest-all" id="btnSuggestAll">
            <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            Suggérer les quantités automatiquement
          </button>

          <!-- Onglets menu -->
          <div class="menu-tabs" role="tablist" aria-label="Catégories du menu">
            <button class="menu-tab" id="tabTapas" role="tab" aria-selected="true" aria-controls="sec-tapas">Tapas</button>
            <button class="menu-tab" id="tabBurgers" role="tab" aria-selected="false" aria-controls="sec-burgers">Burgers &amp; Cie</button>
          </div>

          <!-- Section Tapas -->
          <div class="menu-section active" id="sec-tapas" role="tabpanel" aria-labelledby="tabTapas"></div>

          <!-- Section Burgers -->
          <div class="menu-section" id="sec-burgers" role="tabpanel" aria-labelledby="tabBurgers" hidden></div>

        </div>
      </main>

      <!-- ── Colonne droite : récapitulatif ── -->
      <aside class="devis-recap" aria-label="Récapitulatif du devis">
        <h2 class="recap-title">Récapitulatif</h2>
        <div id="recapItems" aria-live="polite"><p class="recap-empty">Aucun article sélectionné</p></div>

        <div class="recap-totals" id="recapTotals" hidden>
          <div class="recap-line"><span>Sous-total HT</span><span id="totalHT">—</span></div>
          <div class="recap-line"><span id="tvaLabel">TVA 10 %</span><span id="totalTVA">—</span></div>
          <div class="recap-line ttc"><span>Total TTC</span><span id="totalTTC">—</span></div>
          <div class="recap-line perpers"><span>Par personne</span><span id="totalPerPers">—</span></div>
          <p class="tva-note">Prix nets, service compris. TVA calculée sur la base des prix TTC.</p>
        </div>

        <div class="devis-actions">
          <button class="btn btn-primary" id="btnPrint">
            <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Imprimer / PDF
          </button>
          <button class="btn" id="saveDevisBtn" hidden>
            <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Sauvegarder sur la réservation
          </button>
          <button class="btn" id="btnReset" style="color:var(--danger);border-color:var(--danger)">
            <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
            Réinitialiser
          </button>
        </div>
      </aside>

    </div>
  </div>

  <!-- Confirm modal -->
  <div class="confirm-overlay hidden" id="confirmOverlay" role="dialog" aria-modal="true" aria-labelledby="confirmMsg">
    <div class="confirm-box">
      <p id="confirmMsg"></p>
      <div class="confirm-actions">
        <button class="btn btn-secondary btn-sm" id="confirmCancel">Annuler</button>
        <button class="btn btn-danger btn-sm" id="confirmOk">Réinitialiser</button>
      </div>
    </div>
  </div>

  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <script src="/js/api.js"></script>
  <script>
    buildNav('resa-devis');

    let _confirmCb = null;

    // ── Confirm modal ─────────────────────────────────────────────
    function showConfirm(msg, cb) {
      _confirmCb = cb;
      document.getElementById('confirmMsg').textContent = msg;
      document.getElementById('confirmOverlay').classList.remove('hidden');
      document.getElementById('confirmOk').focus();
    }
    document.getElementById('confirmOk').addEventListener('click', () => {
      document.getElementById('confirmOverlay').classList.add('hidden');
      if (_confirmCb) { _confirmCb(); _confirmCb = null; }
    });
    document.getElementById('confirmCancel').addEventListener('click', () => {
      document.getElementById('confirmOverlay').classList.add('hidden');
      _confirmCb = null;
    });

    // ── Menu data (prix TTC, service compris) ──
    const MENU = {
      tapas: [
        { id:'t1', name:'Planche Mixte',          desc:'Mix de charcuteries et de fromages',                              price:22.50, suggestDiv:4 },
        { id:'t2', name:'Tranche de Pâté Croûte', desc:'Jeunes pousses, pickles d\'oignons',                             price:10.00, suggestDiv:2 },
        { id:'t3', name:'Terrine de Porc',         desc:'Jeunes pousses, pickles',                                        price: 6.50, suggestDiv:3 },
        { id:'t4', name:'Pain à l\'Ail',           desc:'Pain ciabatta, beurre à l\'ail maison',                          price: 7.00, suggestDiv:3 },
        { id:'t5', name:'Aiguillettes de Poulet',  desc:'Sauce creamy bbq',                                               price:10.00, suggestDiv:2 },
        { id:'t6', name:'Burrata & Pain Grillé',   desc:'Burrata crémeuse, vierge d\'herbes, pain grillé',                price:10.00, suggestDiv:3 },
        { id:'t7', name:'Potatoes',                desc:'Pommes de terre grenaille maison',                               price: 6.50, suggestDiv:3 },
        { id:'t8', name:'Potatoes Sauce Gruyère',  desc:'Pommes de terre grenaille, sauce gruyère maison',               price: 8.50, suggestDiv:3 },
        { id:'t9', name:'Saucisson Sec',           desc:'',                                                               price: 8.00, suggestDiv:4 },
      ],
      burgers: [
        { id:'b1', name:'Beef Burger',          desc:'Steak bœuf frais, bacon, cheddar, oignons frits, pickles, sauce MOS', price:17.00, suggestDiv:1 },
        { id:'b2', name:'Chicken Burger',       desc:'Aiguillettes de poulet, cheddar, chou, carottes, mayo cajun',          price:15.50, suggestDiv:1 },
        { id:'b3', name:'Fish Burger',          desc:'Filet de poisson en tempura, concombre, cheddar, sauce tartare',       price:16.00, suggestDiv:1 },
        { id:'b4', name:'Grilled Triple Cheese',desc:'Pain Banneton, cheddar, emmental, brie, oignons déglassés',            price:14.00, suggestDiv:1 },
        { id:'b5', name:'Berlinois',            desc:'Veau et poulet grillés façon kebab, salade, chou, sauce blanche',     price:15.50, suggestDiv:1 },
        { id:'b6', name:'Croque Truffé',        desc:'Saint-Nectaire, jambon blanc, béchamel truffée',                     price:15.00, suggestDiv:1 },
        { id:'b7', name:'Fish and Chips',       desc:'Cabillaud en tempura, citron, sauce tartare maison',                  price:16.50, suggestDiv:1 },
      ]
    };

    const qtys = {};
    [...MENU.tapas, ...MENU.burgers].forEach(i => qtys[i.id] = 0);

    // ── URL params ─────────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    const resaId   = params.get('resaId');
    const resaName = params.get('name');
    const resaPax  = parseInt(params.get('pax') || '0');
    const resaDate = params.get('date');

    if (resaName) document.getElementById('cfgClient').value = resaName;
    if (resaPax)  document.getElementById('cfgPax').value = resaPax;
    if (resaDate) document.getElementById('cfgDate').value = resaDate;
    if (resaId)   document.getElementById('saveDevisBtn').hidden = false;
    document.getElementById('cfgDate').value = document.getElementById('cfgDate').value || today();

    // ── Back button ───────────────────────────────────────────────
    document.getElementById('btnBack').addEventListener('click', () => {
      if (history.length > 1) history.back();
      else window.location.href = '/resa/gestion.html';
    });

    // ── Menu tabs ─────────────────────────────────────────────────
    document.getElementById('tabTapas').addEventListener('click', () => switchMenu('tapas'));
    document.getElementById('tabBurgers').addEventListener('click', () => switchMenu('burgers'));

    function switchMenu(key) {
      const tabs = { tapas:'tabTapas', burgers:'tabBurgers' };
      const secs = { tapas:'sec-tapas', burgers:'sec-burgers' };
      Object.keys(tabs).forEach(k => {
        document.getElementById(tabs[k]).setAttribute('aria-selected', String(k === key));
        const sec = document.getElementById(secs[k]);
        sec.classList.toggle('active', k === key);
        sec.hidden = k !== key;
      });
    }

    // ── Render menu sections ──────────────────────────────────────
    function renderMenuSection(items, sectionId) {
      const sec = document.getElementById(sectionId);
      sec.innerHTML = '';
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = `menu-item ${qtys[item.id] > 0 ? 'selected' : ''}`;
        div.id = `mi-${item.id}`;
        div.innerHTML = `
          <div class="menu-item-info">
            <div class="menu-item-name">${escapeHtml(item.name)}</div>
            ${item.desc ? `<div class="menu-item-desc">${escapeHtml(item.desc)}</div>` : ''}
          </div>
          <span class="menu-item-price" aria-label="${item.price.toFixed(2).replace('.',',')} euros">${item.price.toFixed(2).replace('.',',')} €</span>
          <button class="suggest-btn" data-suggest="${item.id}" aria-label="Suggérer la quantité pour ${escapeHtml(item.name)}">Auto</button>
          <div class="qty-stepper" role="group" aria-label="Quantité pour ${escapeHtml(item.name)}">
            <button class="qty-btn" data-minus="${item.id}" aria-label="Diminuer la quantité de ${escapeHtml(item.name)}">−</button>
            <span class="qty-val" id="qv-${item.id}" aria-live="polite" aria-atomic="true">${qtys[item.id]}</span>
            <button class="qty-btn" data-plus="${item.id}" aria-label="Augmenter la quantité de ${escapeHtml(item.name)}">+</button>
          </div>
        `;
        div.querySelector('[data-suggest]').addEventListener('click', () => suggestOne(item.id));
        div.querySelector('[data-minus]').addEventListener('click', () => adjustQty(item.id, -1));
        div.querySelector('[data-plus]').addEventListener('click',  () => adjustQty(item.id,  1));
        sec.appendChild(div);
      });
    }

    function renderAll() {
      renderMenuSection(MENU.tapas,   'sec-tapas');
      renderMenuSection(MENU.burgers, 'sec-burgers');
    }

    // ── Quantités ─────────────────────────────────────────────────
    function adjustQty(id, delta) {
      qtys[id] = Math.max(0, (qtys[id] || 0) + delta);
      const valEl  = document.getElementById('qv-' + id);
      const cardEl = document.getElementById('mi-' + id);
      if (valEl)  valEl.textContent = qtys[id];
      if (cardEl) cardEl.classList.toggle('selected', qtys[id] > 0);
      updateAll();
    }

    function suggestOne(id) {
      const allItems = [...MENU.tapas, ...MENU.burgers];
      const item = allItems.find(i => i.id === id);
      if (!item) return;
      const pax = parseInt(document.getElementById('cfgPax').value) || 1;
      qtys[id] = Math.ceil(pax / item.suggestDiv);
      const valEl  = document.getElementById('qv-' + id);
      const cardEl = document.getElementById('mi-' + id);
      if (valEl)  valEl.textContent = qtys[id];
      if (cardEl) cardEl.classList.toggle('selected', qtys[id] > 0);
      updateAll();
    }

    document.getElementById('btnSuggestAll').addEventListener('click', suggestAll);
    function suggestAll() {
      const pax    = parseInt(document.getElementById('cfgPax').value) || 1;
      const budget = parseFloat(document.getElementById('cfgBudget').value) || 0;
      const totalBudget = pax * budget;
      Object.keys(qtys).forEach(k => qtys[k] = 0);
      const allItems = [...MENU.tapas, ...MENU.burgers];
      let running = 0;
      allItems.forEach(item => {
        const suggested = Math.ceil(pax / item.suggestDiv);
        const cost = suggested * item.price;
        if (totalBudget === 0 || running + cost <= totalBudget) {
          qtys[item.id] = suggested;
          running += cost;
        }
      });
      renderAll();
      updateAll();
    }

    // ── Budget + recap ────────────────────────────────────────────
    document.getElementById('cfgClient').addEventListener('input', updateRecap);
    document.getElementById('cfgDate').addEventListener('input', updateRecap);
    document.getElementById('cfgPax').addEventListener('input', updateAll);
    document.getElementById('cfgBudget').addEventListener('input', updateAll);
    document.getElementById('cfgTva').addEventListener('change', updateAll);

    function updateAll() { updateBudget(); updateRecap(); }

    function updateBudget() {
      const pax    = parseInt(document.getElementById('cfgPax').value) || 0;
      const budget = parseFloat(document.getElementById('cfgBudget').value) || 0;
      const total  = pax * budget;
      const used   = calcTotalTTC();
      const pct    = total > 0 ? Math.min((used / total) * 100, 100) : 0;
      const remaining = total - used;

      document.getElementById('budgetTotal').textContent = total > 0 ? fmt(total) + ' €' : '—';
      const statusEl = document.getElementById('budgetStatus');
      const fillEl   = document.getElementById('budgetFill');
      const trackEl  = document.getElementById('budgetTrack');

      statusEl.textContent = fmt(used) + ' € utilisés' + (total > 0 ? (remaining >= 0 ? ` · ${fmt(remaining)} € restants` : ` · ${fmt(-remaining)} € dépassés`) : '');
      statusEl.className = 'budget-value ' + (total > 0 && used > total ? 'over' : 'ok');
      fillEl.style.width  = pct + '%';
      fillEl.className    = 'budget-fill' + (pct >= 100 ? ' over' : pct >= 85 ? ' warn' : '');
      trackEl.setAttribute('aria-valuenow', Math.round(pct));
      trackEl.setAttribute('aria-label', `Budget utilisé : ${Math.round(pct)}%`);
    }

    function calcTotalTTC() {
      const allItems = [...MENU.tapas, ...MENU.burgers];
      return allItems.reduce((s, i) => s + (qtys[i.id] || 0) * i.price, 0);
    }

    function updateRecap() {
      const tvaRate = parseFloat(document.getElementById('cfgTva').value) / 100;
      const pax     = parseInt(document.getElementById('cfgPax').value) || 1;
      const allItems = [...MENU.tapas, ...MENU.burgers];
      const selected = allItems.filter(i => (qtys[i.id] || 0) > 0);

      const recapEl  = document.getElementById('recapItems');
      const totalsEl = document.getElementById('recapTotals');

      if (!selected.length) {
        recapEl.innerHTML = '<p class="recap-empty">Aucun article sélectionné</p>';
        totalsEl.hidden = true;
        return;
      }

      recapEl.innerHTML = selected.map(i => {
        const subtotal = qtys[i.id] * i.price;
        return `
          <div class="recap-item">
            <span class="recap-item-name">${escapeHtml(i.name)}</span>
            <span class="recap-item-qty">×${qtys[i.id]}</span>
            <span class="recap-item-price">${fmt(subtotal)} €</span>
          </div>
        `;
      }).join('');

      const ttc = calcTotalTTC();
      const ht  = ttc / (1 + tvaRate);
      const tva = ttc - ht;

      document.getElementById('totalHT').textContent  = fmt(ht)  + ' €';
      document.getElementById('totalTVA').textContent = fmt(tva) + ' €';
      document.getElementById('totalTTC').textContent = fmt(ttc) + ' €';
      document.getElementById('totalPerPers').textContent = fmt(ttc / pax) + ' € / pers.';
      document.getElementById('tvaLabel').textContent = `TVA ${document.getElementById('cfgTva').value} %`;
      totalsEl.hidden = false;
    }

    function fmt(n) { return n.toFixed(2).replace('.', ','); }

    // ── Actions ───────────────────────────────────────────────────
    document.getElementById('btnPrint').addEventListener('click', () => window.print());

    document.getElementById('btnReset').addEventListener('click', () => {
      showConfirm('Réinitialiser toutes les quantités ?', () => {
        Object.keys(qtys).forEach(k => qtys[k] = 0);
        renderAll();
        updateAll();
      });
    });

    document.getElementById('saveDevisBtn').addEventListener('click', saveDevis);

    async function saveDevis() {
      if (!resaId) return;
      const pax     = parseInt(document.getElementById('cfgPax').value) || 1;
      const tvaRate = parseFloat(document.getElementById('cfgTva').value) / 100;
      const allItems = [...MENU.tapas, ...MENU.burgers];
      const selected = allItems.filter(i => (qtys[i.id] || 0) > 0);
      if (!selected.length) { showToast('Aucun article sélectionné', 'warning'); return; }
      const ttc = calcTotalTTC();
      const ht  = ttc / (1 + tvaRate);
      const lines = selected.map(i => `• ${i.name} ×${qtys[i.id]} = ${fmt(qtys[i.id] * i.price)} €`).join('\n');
      const note = `Devis (${new Date().toLocaleDateString('fr-FR')})\n${lines}\nHT: ${fmt(ht)} € | TVA: ${fmt(ttc - ht)} € | TTC: ${fmt(ttc)} €\n(${fmt(ttc/pax)} € / pers.)`;
      await api.put(`/api/reservations/${resaId}`, { admin_notes: note });
      showToast('Devis sauvegardé sur la réservation', 'success');
    }

    // ── Init ──────────────────────────────────────────────────────
    renderAll();
    updateAll();
  </script>
</body>
</html>
