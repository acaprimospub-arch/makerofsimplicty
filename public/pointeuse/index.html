<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Pointeuse — Mos Pub Mercière</title>
  <style>
    :root {
      --bg: #08141c;
      --bg-card: #0f2332;
      --bg-surface: #112840;
      --bg-hover: #183754;
      --primary: #e6b84a;
      --primary-light: #f0ca6e;
      --text: #f0f4f8;
      --text-muted: rgba(240,244,248,0.72);
      --border: rgba(255,255,255,0.10);
      --success: #4caf6a;
      --warning: #f0b429;
      --danger: #e85454;
      --radius: 14px;
      --radius-sm: 8px;
      --focus-ring: 0 0 0 3px rgba(230,184,74,0.6);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      overscroll-behavior: none;
      user-select: none;
    }

    .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 16px;
    }

    .screen { display: none; width: 100%; max-width: 440px; flex-direction: column; align-items: center; gap: 20px; }
    [data-state="pin"]        .screen-pin        { display: flex; }
    [data-state="checking"]   .screen-checking   { display: flex; }
    [data-state="camera"]     .screen-camera     { display: flex; }
    [data-state="submitting"] .screen-submitting { display: flex; }
    [data-state="result"]     .screen-result     { display: flex; }

    .brand { text-align: center; margin-bottom: 4px; }
    .brand-logo { width: 56px; height: 56px; margin: 0 auto 8px; }
    .brand-logo img { width: 100%; height: 100%; object-fit: contain; }
    .brand-title { font-size: 1.1rem; font-weight: 700; color: var(--primary); letter-spacing: 0.05em; text-transform: uppercase; }
    .brand-sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

    .clock { font-size: 3rem; font-weight: 300; letter-spacing: 0.04em; color: var(--text); text-align: center; line-height: 1; }
    .clock-date { font-size: 0.9rem; color: var(--text-muted); text-align: center; margin-top: 4px; text-transform: capitalize; }

    .pin-dots { display: flex; gap: 12px; justify-content: center; margin: 4px 0; }
    .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); background: transparent; transition: background 0.15s, border-color 0.15s, transform 0.1s; }
    .pin-dot.filled { background: var(--primary); border-color: var(--primary); transform: scale(1.15); }
    @media (prefers-reduced-motion: reduce) { .pin-dot { transition: none; } }

    .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
    .pin-key {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 1.6rem; font-weight: 400; height: 72px; cursor: pointer;
      transition: background 0.12s, transform 0.08s; display: flex; align-items: center; justify-content: center;
      min-width: 44px;
    }
    .pin-key:active { background: var(--bg-hover); transform: scale(0.95); }
    .pin-key:focus-visible { box-shadow: var(--focus-ring); outline: none; }
    .pin-key.del { font-size: 1.3rem; color: var(--text-muted); }
    .pin-key.ok { background: var(--primary); color: var(--bg); font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; border-color: var(--primary); }
    .pin-key.ok:active { background: var(--primary-light); }
    @media (prefers-reduced-motion: reduce) { .pin-key { transition: none; } .pin-key:active { transform: none; } }

    .pin-error { min-height: 20px; font-size: 0.85rem; color: var(--danger); text-align: center; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
    .pin-error.shaking { animation: shake 0.3s ease-out; }
    @media (prefers-reduced-motion: reduce) { .pin-error.shaking { animation: none; } }

    .camera-label { font-size: 1.1rem; font-weight: 600; text-align: center; color: var(--primary); }
    .camera-sub { font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-top: -12px; }
    .camera-wrapper { position: relative; width: 100%; border-radius: var(--radius); overflow: hidden; background: #000; aspect-ratio: 4/3; }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; transform: scaleX(-1); }
    .countdown-overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.35); font-size: 5rem; font-weight: 700; color: var(--primary);
      text-shadow: 0 0 20px rgba(230,184,74,0.6); pointer-events: none; opacity: 0; transition: opacity 0.2s;
    }
    .countdown-overlay.visible { opacity: 1; }
    @media (prefers-reduced-motion: reduce) { .countdown-overlay { transition: none; } }

    .btn-cancel {
      background: transparent; border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text-muted); font-size: 0.9rem; padding: 12px 24px; cursor: pointer;
      transition: background 0.12s; width: 100%; min-height: 44px;
    }
    .btn-cancel:active { background: var(--bg-surface); }
    .btn-cancel:focus-visible { box-shadow: var(--focus-ring); outline: none; }

    .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spinner { animation: none; border-color: var(--primary); } }
    .spinner-label { color: var(--text-muted); font-size: 0.9rem; }

    .result-card { width: 100%; background: var(--bg-card); border-radius: var(--radius); padding: 32px 24px; text-align: center; border: 1px solid var(--border); }
    .result-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .result-name { font-size: 1.4rem; font-weight: 700; color: var(--primary); }
    .result-type { font-size: 1rem; color: var(--text-muted); margin-top: 4px; }
    .result-time { font-size: 2rem; font-weight: 300; margin-top: 8px; }
    .result-late { display: inline-block; margin-top: 10px; background: rgba(232,84,84,0.15); color: var(--danger); border-radius: 20px; padding: 4px 14px; font-size: 0.85rem; }
    .result-bar { height: 4px; background: var(--bg-surface); border-radius: 2px; margin-top: 20px; overflow: hidden; }
    .result-bar-fill { height: 100%; background: var(--primary); border-radius: 2px; width: 100%; transform-origin: left; animation: shrink 4s linear forwards; }
    @keyframes shrink { from { transform: scaleX(1); } to { transform: scaleX(0); } }
    @media (prefers-reduced-motion: reduce) { .result-bar-fill { animation: none; } }
  </style>
</head>
<body>
<div id="app" data-state="pin">

  <!-- ═══ ÉTAT : PIN ══════════════════════════════════════════════════════════ -->
  <section class="screen screen-pin" aria-label="Saisie du code PIN">
    <div class="brand" aria-hidden="true">
      <div class="brand-logo">
        <img src="/images/logo.png" alt="MOS" onerror="this.style.display='none'">
      </div>
      <div class="brand-title">Mos Pub Mercière</div>
      <div class="brand-sub">Pointeuse</div>
    </div>

    <time class="clock" id="clockDisplay" aria-live="off">--:--</time>
    <p class="clock-date" id="dateDisplay" aria-live="off"></p>

    <!-- Affichage PIN : output annoncé aux lecteurs d'écran -->
    <output id="pinOutput" aria-live="polite" aria-label="Code saisi : 0 chiffres sur 6" class="sr-only"></output>
    <div class="pin-dots" id="pinDots" aria-hidden="true">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
      <div class="pin-dot" id="d4"></div>
      <div class="pin-dot" id="d5"></div>
    </div>

    <div class="pin-pad" role="group" aria-label="Clavier PIN">
      <button type="button" class="pin-key" data-key="1" aria-label="Chiffre 1">1</button>
      <button type="button" class="pin-key" data-key="2" aria-label="Chiffre 2">2</button>
      <button type="button" class="pin-key" data-key="3" aria-label="Chiffre 3">3</button>
      <button type="button" class="pin-key" data-key="4" aria-label="Chiffre 4">4</button>
      <button type="button" class="pin-key" data-key="5" aria-label="Chiffre 5">5</button>
      <button type="button" class="pin-key" data-key="6" aria-label="Chiffre 6">6</button>
      <button type="button" class="pin-key" data-key="7" aria-label="Chiffre 7">7</button>
      <button type="button" class="pin-key" data-key="8" aria-label="Chiffre 8">8</button>
      <button type="button" class="pin-key" data-key="9" aria-label="Chiffre 9">9</button>
      <button type="button" class="pin-key del" id="btnDel" aria-label="Effacer le dernier chiffre">
        <svg width="20" height="16" viewBox="0 0 20 16" fill="none" aria-hidden="true"><path d="M7 1H19a1 1 0 011 1v12a1 1 0 01-1 1H7L1 8l6-7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M12 5l4 6M16 5l-4 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button type="button" class="pin-key" data-key="0" aria-label="Chiffre 0">0</button>
      <button type="button" class="pin-key ok" id="btnOk" aria-label="Valider le code PIN">OK</button>
    </div>

    <div class="pin-error" id="pinError" role="alert" aria-live="assertive" aria-atomic="true"></div>
  </section>

  <!-- ═══ ÉTAT : VÉRIFICATION ════════════════════════════════════════════════ -->
  <section class="screen screen-checking" aria-label="Vérification en cours" aria-live="polite">
    <div class="spinner" role="presentation"></div>
    <p class="spinner-label">Vérification...</p>
  </section>

  <!-- ═══ ÉTAT : CAMÉRA ══════════════════════════════════════════════════════ -->
  <section class="screen screen-camera" aria-label="Photo de pointage">
    <p class="camera-label" id="cameraLabel">Pointage arrivée</p>
    <p class="camera-sub" id="cameraName"></p>

    <div class="camera-wrapper">
      <video id="video" autoplay playsinline muted aria-label="Caméra frontale pour photo de pointage"></video>
      <div class="countdown-overlay" id="countdownOverlay" aria-hidden="true">
        <span id="countdownNum"></span>
      </div>
    </div>

    <!-- Annonce du compte à rebours pour lecteurs d'écran -->
    <p id="countdownAnnounce" class="sr-only" aria-live="assertive" aria-atomic="true"></p>

    <button type="button" class="btn-cancel" id="btnCancel">Annuler</button>
  </section>

  <!-- ═══ ÉTAT : ENVOI ════════════════════════════════════════════════════════ -->
  <section class="screen screen-submitting" aria-label="Enregistrement en cours" aria-live="polite">
    <div class="spinner" role="presentation"></div>
    <p class="spinner-label">Enregistrement...</p>
  </section>

  <!-- ═══ ÉTAT : RÉSULTAT ════════════════════════════════════════════════════ -->
  <section class="screen screen-result" aria-label="Résultat du pointage">
    <div class="result-card" id="resultCard" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="result-icon" id="resultIcon" aria-hidden="true"></div>
      <p class="result-name" id="resultName"></p>
      <p class="result-type" id="resultType"></p>
      <p class="result-time" id="resultTime"></p>
      <div id="resultLate"></div>
      <div class="result-bar" aria-hidden="true"><div class="result-bar-fill" id="resultBar"></div></div>
    </div>
  </section>

</div>

<canvas id="canvas" style="display:none" aria-hidden="true"></canvas>

<script>
  'use strict';
  const app = document.getElementById('app');
  let currentPin = '';
  let pendingName = '';
  let pendingType = '';
  let stream = null;
  let countdownTimer = null;
  let resetTimer = null;
  let isSubmitting = false;

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ── Horloge ──────────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('clockDisplay').textContent =
      now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('dateDisplay').textContent =
      now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Gestion état ─────────────────────────────────────────────────────────
  function setState(state) {
    app.setAttribute('data-state', state);
  }

  // ── Saisie PIN ────────────────────────────────────────────────────────────
  function pressKey(k) {
    if (currentPin.length >= 6) return;
    currentPin += k;
    updatePinDisplay();
    if (currentPin.length === 6) submitPin();
  }

  function deleteKey() {
    currentPin = currentPin.slice(0, -1);
    updatePinDisplay();
    clearPinError();
  }

  function updatePinDisplay() {
    for (let i = 0; i < 6; i++) {
      document.getElementById('d' + i).classList.toggle('filled', i < currentPin.length);
    }
    const output = document.getElementById('pinOutput');
    output.textContent = `Code saisi : ${currentPin.length} chiffre${currentPin.length !== 1 ? 's' : ''} sur 6`;
    output.setAttribute('aria-label', output.textContent);
  }

  function clearPinError() {
    document.getElementById('pinError').textContent = '';
  }

  function showPinError(msg) {
    const el = document.getElementById('pinError');
    el.textContent = msg;
    if (!prefersReducedMotion) {
      el.classList.remove('shaking');
      void el.offsetHeight;
      el.classList.add('shaking');
      el.addEventListener('animationend', () => el.classList.remove('shaking'), { once: true });
    }
  }

  // ── Bind PIN pad ──────────────────────────────────────────────────────────
  document.querySelectorAll('[data-key]').forEach(btn => {
    btn.addEventListener('click', () => pressKey(btn.dataset.key));
  });
  document.getElementById('btnDel').addEventListener('click', deleteKey);
  document.getElementById('btnOk').addEventListener('click', submitPin);
  document.getElementById('btnCancel').addEventListener('click', resetToPin);

  // ── Clavier physique ──────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (app.getAttribute('data-state') !== 'pin') return;
    if (e.key >= '0' && e.key <= '9') pressKey(e.key);
    else if (e.key === 'Backspace') deleteKey();
    else if (e.key === 'Enter') submitPin();
  });

  async function submitPin() {
    if (currentPin.length < 4) { showPinError('Code PIN trop court'); return; }
    if (isSubmitting) return;
    isSubmitting = true;
    setState('checking');
    try {
      const res = await fetch(`/api/pointage/check/${encodeURIComponent(currentPin)}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'PIN inconnu');
      pendingName = data.name;
      pendingType = data.next_type;
      await startCamera();
    } catch (e) {
      isSubmitting = false;
      setState('pin');
      showPinError(e.message || 'Erreur réseau');
      currentPin = '';
      updatePinDisplay();
    }
  }

  // ── Caméra ────────────────────────────────────────────────────────────────
  const cameraAvailable = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

  async function startCamera() {
    document.getElementById('cameraLabel').textContent =
      pendingType === 'arrivee' ? 'Pointage arrivée' : 'Pointage départ';
    document.getElementById('cameraName').textContent = pendingName;

    if (!cameraAvailable) {
      setState('camera');
      document.getElementById('countdownOverlay').classList.add('visible');
      document.getElementById('countdownNum').textContent = '📷';
      document.getElementById('cameraName').textContent = pendingName + ' — Sans photo (caméra indisponible)';
      document.getElementById('countdownAnnounce').textContent = 'Photo indisponible, pointage en cours…';
      setTimeout(() => captureAndSubmit(null), 1500);
      return;
    }

    setState('camera');
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
      });
      const video = document.getElementById('video');
      video.srcObject = stream;
      await video.play();
      startCountdown();
    } catch (err) {
      stopCamera();
      if (err.name === 'NotAllowedError' || err.name === 'SecurityError') {
        isSubmitting = false;
        setState('pin');
        showPinError('Accès caméra refusé — autorisez la caméra dans les réglages');
        currentPin = '';
        updatePinDisplay();
      } else {
        captureAndSubmit(null);
      }
    }
  }

  function startCountdown() {
    let count = 3;
    const overlay = document.getElementById('countdownOverlay');
    const num = document.getElementById('countdownNum');
    const announce = document.getElementById('countdownAnnounce');
    overlay.classList.add('visible');
    num.textContent = count;
    announce.textContent = `Photo dans ${count}`;

    countdownTimer = setInterval(() => {
      count--;
      if (count <= 0) {
        clearInterval(countdownTimer); countdownTimer = null;
        overlay.classList.remove('visible');
        announce.textContent = 'Photo prise';
        captureAndSubmit(capturePhoto());
      } else {
        num.textContent = count;
        announce.textContent = `Photo dans ${count}`;
      }
    }, 1000);
  }

  function capturePhoto() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const w = video.videoWidth  || 640;
    const h = video.videoHeight || 480;
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.translate(w, 0); ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, w, h);
    return canvas.toDataURL('image/jpeg', 0.85);
  }

  async function captureAndSubmit(photo_base64) {
    stopCamera();
    setState('submitting');
    try {
      const res = await fetch('/api/pointage/clock', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin: currentPin, photo_base64 })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erreur serveur');
      showResult(data);
    } catch (e) {
      isSubmitting = false;
      setState('pin');
      showPinError(e.message || 'Erreur réseau');
      currentPin = '';
      updatePinDisplay();
    }
  }

  function stopCamera() {
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    const video = document.getElementById('video');
    video.srcObject = null;
    document.getElementById('countdownOverlay').classList.remove('visible');
    document.getElementById('countdownAnnounce').textContent = '';
  }

  // ── Résultat ──────────────────────────────────────────────────────────────
  function showResult(data) {
    setState('result');
    const isArrivee = data.type === 'arrivee';
    document.getElementById('resultIcon').textContent = isArrivee ? '✅' : '👋';
    document.getElementById('resultName').textContent = data.name;
    document.getElementById('resultType').textContent = isArrivee ? 'Arrivée enregistrée' : 'Départ enregistré';
    document.getElementById('resultTime').textContent = data.timestamp.slice(11, 16);

    const lateEl = document.getElementById('resultLate');
    lateEl.innerHTML = data.late_min > 0
      ? `<div class="result-late">Retard : ${data.late_min} min</div>` : '';

    const bar = document.getElementById('resultBar');
    bar.style.animation = 'none';
    bar.offsetHeight;
    bar.style.animation = '';

    if (resetTimer) clearTimeout(resetTimer);
    resetTimer = setTimeout(resetToPin, 4000);
  }

  // ── Reset ─────────────────────────────────────────────────────────────────
  function resetToPin() {
    if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
    stopCamera();
    currentPin = ''; pendingName = ''; pendingType = '';
    isSubmitting = false;
    updatePinDisplay();
    clearPinError();
    setState('pin');
  }
</script>
</body>
</html>
