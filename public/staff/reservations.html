<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Réservations — Mos Pub Mercière</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MOS">
  <meta name="theme-color" content="#060e15">
  <style>
    :root {
      --orange: #f59e0b;
      --orange-bg: rgba(245,158,11,.1);
    }

    /* ── Date navigation ── */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }
    .date-nav-group {
      display: flex;
      align-items: center;
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .date-arrow {
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      cursor: pointer; border: none; background: none;
      font-size: .95rem;
      transition: color .12s, background .12s;
      flex-shrink: 0;
    }
    .date-arrow:hover { color: var(--text); background: rgba(255,255,255,.06); }
    .date-arrow:focus-visible { box-shadow: inset var(--focus-ring); outline: none; }
    .date-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .date-label-btn {
      padding: 0 8px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      letter-spacing: -.01em;
      text-align: center;
      width: 100%;
    }
    .date-label-btn:focus-visible { box-shadow: inset var(--focus-ring); outline: none; }
    #viewDate {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      border: none;
      background: none;
      font-size: .9rem;
    }
    .btn-today-pill {
      height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      font-family: inherit;
    }
    .btn-today-pill:hover { border-color: var(--primary); color: var(--primary); }
    .btn-today-pill.not-today { border-color: rgba(212,162,74,.5); color: var(--primary); background: var(--primary-dim); }
    .btn-today-pill:focus-visible { box-shadow: var(--focus-ring); outline: none; }

    /* ── Stats strip ── */
    .stats-strip {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 18px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }
    .stats-strip::-webkit-scrollbar { display: none; }
    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: .8rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .stat-pill .sp-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stat-pill .sp-count { font-size: .9rem; font-weight: 800; }
    .stat-pill.sp-total  { border-color: rgba(212,162,74,.3); background: rgba(212,162,74,.06); }
    .stat-pill.sp-total .sp-count { color: var(--primary); }
    .stat-pill.sp-unplaced  { border-color: rgba(245,158,11,.3); background: rgba(245,158,11,.06); }
    .stat-pill.sp-unplaced  .sp-count { color: var(--orange); }
    .stat-pill.sp-placed    { border-color: rgba(96,165,250,.3); background: rgba(96,165,250,.06); }
    .stat-pill.sp-placed    .sp-count { color: var(--info); }
    .stat-pill.sp-arrived   { border-color: rgba(52,215,123,.3); background: rgba(52,215,123,.06); }
    .stat-pill.sp-arrived   .sp-count { color: var(--success); }
    .stat-pill.sp-late      { border-color: rgba(239,79,79,.4); background: rgba(239,79,79,.08); }
    .stat-pill.sp-late      .sp-count { color: var(--danger); }
    .stat-pill.sp-cancelled { opacity: .55; }

    /* ── Joy sync bar ── */
    .joy-sync-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding: 8px 12px 8px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .78rem;
      color: var(--text-muted);
    }
    .joy-icon { width: 8px; height: 8px; border-radius: 50%; background: #9b72f0; flex-shrink: 0; }
    .joy-sync-row span { flex: 1; }
    .joy-sync-btn {
      background: rgba(155,114,240,.1);
      border: 1px solid rgba(155,114,240,.25);
      color: #a78bfa;
      border-radius: 999px;
      padding: 4px 12px;
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      font-family: inherit;
      transition: background .15s;
    }
    .joy-sync-btn:hover { background: rgba(155,114,240,.2); }
    .joy-sync-btn:disabled { opacity: .5; cursor: default; }

    /* ── Reservation cards ── */
    .res-list { display: flex; flex-direction: column; gap: 0; }
    .res-timeline-sep {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0 8px;
    }
    .res-timeline-sep:first-child { padding-top: 0; }
    .res-timeline-sep-label {
      font-size: .68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--text-subtle);
      white-space: nowrap;
    }
    .res-timeline-sep-line { flex: 1; height: 1px; background: var(--border); }

    .res-card {
      display: flex;
      align-items: stretch;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
      text-align: left;
      font-family: inherit;
      position: relative;
    }
    .res-card:hover { border-color: rgba(255,255,255,.18); box-shadow: 0 4px 20px rgba(0,0,0,.3); }
    .res-card:focus-visible { outline: none; box-shadow: var(--focus-ring); }
    .res-card:active { opacity: .92; }

    /* Status color accent bar */
    .res-card-accent {
      width: 3px;
      flex-shrink: 0;
      background: var(--border);
      transition: background .15s;
    }
    .res-card.vs-unplaced  .res-card-accent { background: var(--orange); }
    .res-card.vs-placed    .res-card-accent { background: var(--info); }
    .res-card.vs-arrived   .res-card-accent { background: var(--success); }
    .res-card.vs-late      .res-card-accent { background: var(--danger); }
    .res-card.vs-no_show   .res-card-accent { background: var(--danger); }
    .res-card.vs-cancelled .res-card-accent { background: rgba(255,255,255,.15); }

    /* Subtle background tint */
    .res-card.vs-unplaced  { border-color: rgba(245,158,11,.2); }
    .res-card.vs-arrived   { border-color: rgba(52,215,123,.2); background: rgba(52,215,123,.03); }
    .res-card.vs-late      { border-color: rgba(239,79,79,.3); animation: pulse-danger 2s ease-in-out infinite; }
    .res-card.vs-no_show   { opacity: .6; }
    .res-card.vs-cancelled { opacity: .45; }
    .res-card.vs-cancelled .rc-time,
    .res-card.vs-cancelled .rc-name { text-decoration: line-through; color: var(--text-subtle); }
    @keyframes pulse-danger {
      0%, 100% { border-color: rgba(239,79,79,.3); }
      50%       { border-color: rgba(239,79,79,.7); }
    }
    @media (prefers-reduced-motion: reduce) { .res-card.vs-late { animation: none; } }

    .rc-time-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 16px;
      min-width: 70px;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }
    .rc-time {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1;
      color: var(--text);
    }
    .res-card.vs-cancelled .rc-time-col { opacity: .5; }
    .res-card.vs-late      .rc-time     { color: var(--danger); }

    .rc-body {
      flex: 1;
      min-width: 0;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      justify-content: center;
    }
    .rc-top {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }
    .rc-name {
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: -.01em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .joy-tag {
      font-size: .62rem;
      font-weight: 700;
      color: #a78bfa;
      background: rgba(167,139,250,.1);
      border: 1px solid rgba(167,139,250,.25);
      border-radius: 999px;
      padding: 1px 6px;
      flex-shrink: 0;
    }
    .rc-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }
    .rc-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: .72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .rc-tag-pax     { background: rgba(255,255,255,.06); color: var(--text-muted); border: 1px solid var(--border); }
    .rc-tag-phone   { background: transparent; color: var(--text-muted); text-decoration: none; }
    .rc-tag-phone:hover { color: var(--text); }
    .rc-tag-table   { background: var(--success-bg); color: var(--success); border: 1px solid rgba(52,215,123,.2); }
    .rc-tag-notable { background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(245,158,11,.25); }
    .rc-tag-space   { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(240,180,41,.25); }
    .rc-notes {
      font-size: .73rem;
      color: var(--text-subtle);
      font-style: italic;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .rc-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 12px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
    }
    .btn-arrived-quick {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--success);
      background: var(--success-bg);
      color: var(--success);
      font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .12s, transform .1s;
      touch-action: manipulation;
    }
    .btn-arrived-quick:active { background: rgba(52,215,123,.25); transform: scale(.88); }
    .btn-arrived-quick:hover { background: rgba(52,215,123,.2); }

    .status-pill {
      font-size: .68rem;
      font-weight: 700;
      border-radius: 999px;
      padding: 3px 9px;
      border: 1.5px solid;
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      appearance: none;
      -webkit-appearance: none;
      color: inherit;
      font-family: inherit;
      text-align: center;
    }
    .vs-unplaced  .status-pill { border-color: rgba(245,158,11,.5);  color: var(--orange);  }
    .vs-placed    .status-pill { border-color: rgba(96,165,250,.5);   color: var(--info);    }
    .vs-arrived   .status-pill { border-color: rgba(52,215,123,.5);   color: var(--success); }
    .vs-late      .status-pill { border-color: rgba(239,79,79,.5);    color: var(--danger);  }
    .vs-no_show   .status-pill { border-color: rgba(239,79,79,.5);    color: var(--danger);  }
    .vs-cancelled .status-pill { border-color: rgba(255,255,255,.15); color: var(--text-subtle); }

    /* ── Drawer ── */
    .drawer-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(4px);
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 201;
      background: var(--bg-card);
      background-image: linear-gradient(180deg, rgba(255,255,255,.025) 0%, transparent 40%);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border-strong);
      box-shadow: 0 -16px 60px rgba(0,0,0,.6);
      transform: translateY(102%);
      transition: transform .3s cubic-bezier(.32,.72,0,1);
      max-height: 92dvh;
      display: flex;
      flex-direction: column;
    }
    .drawer.open { transform: translateY(0); }
    @media (min-width: 641px) {
      .drawer {
        bottom: auto; top: 50%; left: 50%; right: auto;
        transform: translate(-50%, -42%);
        opacity: 0; pointer-events: none;
        border-radius: var(--radius);
        border: 1px solid var(--border-strong);
        width: 100%; max-width: 520px; max-height: 90vh;
        transition: transform .25s var(--ease-out), opacity .25s;
      }
      .drawer.open { transform: translate(-50%, -50%); opacity: 1; pointer-events: auto; }
    }
    @media (prefers-reduced-motion: reduce) { .drawer { transition: none; } }
    .drawer-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,.12);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    @media (min-width: 641px) { .drawer-handle { display: none; } }
    .drawer-head {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 20px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .drawer-title { font-size: .98rem; font-weight: 700; letter-spacing: -.01em; }
    .drawer-close {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,.07);
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; flex-shrink: 0;
      transition: background .12s, color .12s;
    }
    .drawer-close:hover { background: rgba(255,255,255,.12); color: var(--text); }
    .drawer-body { overflow-y: auto; padding: 18px 20px; flex: 1; -webkit-overflow-scrolling: touch; }
    .drawer-footer {
      display: flex; gap: 8px;
      padding: 10px 20px calc(14px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-footer .btn { flex: 1; justify-content: center; min-height: 46px; }

    /* ── Detail view ── */
    .detail-view { display: flex; flex-direction: column; gap: 0; }
    .detail-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-icon {
      font-size: 1rem;
      width: 26px;
      text-align: center;
      flex-shrink: 0;
      padding-top: 2px;
      opacity: .8;
    }
    .detail-label { font-size: .72rem; color: var(--text-muted); margin-bottom: 3px; letter-spacing: .01em; }
    .detail-value { font-size: .92rem; font-weight: 600; }
    .detail-value a { color: var(--text); }
    .detail-table-badge {
      display: inline-flex; align-items: center;
      gap: 5px;
      font-size: .8rem; font-weight: 600;
      padding: 3px 11px;
      border-radius: 999px;
    }
    .dtb-ok  { color: var(--success); background: var(--success-bg); border: 1px solid rgba(52,215,123,.25); }
    .dtb-nok { color: var(--orange);  background: var(--orange-bg);  border: 1px solid rgba(245,158,11,.25); }
    .detail-status-select {
      font-size: .82rem; font-weight: 600;
      border-radius: 999px;
      padding: 5px 14px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      appearance: none; -webkit-appearance: none;
      color: var(--text);
      font-family: inherit;
    }

    .vs-badge {
      display: inline-flex; align-items: center;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: .78rem; font-weight: 700;
      border: 1.5px solid;
    }
    .vsb-unplaced  { color: var(--orange);  border-color: rgba(245,158,11,.5);  background: var(--orange-bg); }
    .vsb-placed    { color: var(--info);    border-color: rgba(96,165,250,.5);   background: var(--info-bg); }
    .vsb-arrived   { color: var(--success); border-color: rgba(52,215,123,.5);   background: var(--success-bg); }
    .vsb-late      { color: var(--danger);  border-color: rgba(239,79,79,.5);    background: var(--danger-bg); }
    .vsb-no_show   { color: var(--danger);  border-color: rgba(239,79,79,.35);   background: rgba(239,79,79,.06); }
    .vsb-cancelled { color: var(--text-subtle); border-color: rgba(255,255,255,.15); background: rgba(255,255,255,.04); }

    .btn-assign {
      width: 100%;
      margin-top: 16px;
      padding: 13px 16px;
      background: rgba(212,162,74,.08);
      border: 1.5px solid rgba(212,162,74,.3);
      color: var(--primary);
      border-radius: var(--radius-sm);
      font-size: .88rem; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .15s;
      font-family: inherit;
    }
    .btn-assign:hover { background: rgba(212,162,74,.14); }

    .admin-section {
      margin-top: 14px;
      padding: 14px;
      background: rgba(212,162,74,.05);
      border: 1px solid rgba(212,162,74,.18);
      border-radius: var(--radius-sm);
    }
    .admin-section-title {
      font-size: .7rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--primary);
      margin-bottom: 10px;
    }
    .admin-notes-ro { font-size: .87rem; color: var(--text); white-space: pre-wrap; line-height: 1.55; }

    .attach-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
    .attach-title {
      font-size: .7rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--text-muted); margin-bottom: 10px;
    }
    .attach-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .attach-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
    }
    .attach-info { flex: 1; min-width: 0; }
    .attach-name { font-size: .81rem; font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .attach-meta { font-size: .71rem; color: var(--text-muted); }
    .attach-btn-open {
      background: rgba(212,162,74,.1);
      border: 1px solid rgba(212,162,74,.25);
      color: var(--primary);
      border-radius: var(--radius-xs);
      padding: 4px 10px;
      font-size: .75rem; font-weight: 600;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      font-family: inherit;
    }
    .attach-btn-del {
      background: rgba(239,79,79,.08);
      border: 1px solid rgba(239,79,79,.25);
      color: var(--danger);
      border-radius: var(--radius-xs);
      padding: 4px 8px;
      font-size: .75rem; cursor: pointer; flex-shrink: 0;
      font-family: inherit;
    }
    .attach-upload-lbl {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 11px;
      background: var(--bg-surface);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-xs);
      color: var(--text-muted);
      font-size: .82rem; font-weight: 600;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .attach-upload-lbl:hover { border-color: var(--primary); color: var(--primary); }

    .frow { display: flex; flex-direction: column; gap: 14px; }
    .fgroup { display: flex; flex-direction: column; gap: 6px; }
    .fgroup label { font-size: .81rem; font-weight: 600; color: var(--text-muted); }
    .f2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stepper {
      display: flex; align-items: stretch;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden; height: 46px;
      transition: border-color .2s;
    }
    .stepper:focus-within { border-color: var(--primary); }
    .stepper-btn {
      width: 48px;
      background: var(--bg-surface);
      color: var(--text);
      font-size: 1.4rem; font-weight: 300;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; touch-action: manipulation;
      font-family: inherit;
    }
    .stepper-btn:active { background: var(--bg-hover); }
    .stepper-val {
      flex: 1; text-align: center;
      background: var(--bg-card);
      border: none;
      border-left: 1.5px solid var(--border);
      border-right: 1.5px solid var(--border);
      color: var(--text);
      font-size: 1.2rem; font-weight: 700;
      font-family: inherit; padding: 0;
      -moz-appearance: textfield;
    }
    .stepper-val::-webkit-inner-spin-button,
    .stepper-val::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* ── Empty state ── */
    .res-empty {
      text-align: center;
      padding: 64px 24px;
    }
    .res-empty-icon {
      font-size: 2.5rem;
      margin-bottom: 14px;
      opacity: .4;
    }
    .res-empty-title { font-size: .95rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .res-empty-sub { font-size: .84rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <nav class="nav" id="nav" role="navigation" aria-label="Navigation principale"></nav>

  <main class="page" id="main-content" tabindex="-1">
    <div class="container-sm">

      <header class="page-header">
        <div>
          <h1 class="page-title">Réservations</h1>
          <p class="page-subtitle" id="dateLabel"></p>
        </div>
        <button class="btn btn-primary" id="btnCreate" type="button">
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" width="16" height="16"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
          Nouvelle
        </button>
      </header>

      <!-- Date navigation -->
      <div role="group" aria-label="Navigation par date" class="date-nav">
        <div class="date-nav-group">
          <button class="date-arrow" id="btnPrevDay" aria-label="Jour précédent" type="button">←</button>
          <div class="date-center">
            <button class="date-label-btn" id="dateLabelBtn" aria-label="Sélectionner une date" type="button">…</button>
            <input type="date" id="viewDate" aria-label="Date des réservations" tabindex="-1">
          </div>
          <button class="date-arrow" id="btnNextDay" aria-label="Jour suivant" type="button">→</button>
        </div>
        <button class="btn-today-pill" id="btnToday" type="button">Aujourd'hui</button>
      </div>

      <!-- Stats -->
      <div class="stats-strip" id="statsStrip" aria-live="polite" aria-atomic="true"></div>

      <!-- Joy sync -->
      <div id="joySyncBar" class="joy-sync-row" style="display:none" aria-label="Synchronisation Joy.io">
        <div class="joy-icon" aria-hidden="true"></div>
        <span id="joySyncLabel" aria-live="polite">Joy.io</span>
        <button class="joy-sync-btn" id="joySyncBtn" type="button">Sync</button>
      </div>

      <!-- List -->
      <div id="resList" class="res-list" aria-live="polite" aria-atomic="true"></div>

    </div>
  </main>

  <!-- Backdrop -->
  <div class="drawer-backdrop" id="backdrop" aria-hidden="true"></div>

  <!-- Drawer DÉTAIL -->
  <div class="drawer" id="detailDrawer" role="dialog" aria-modal="true" aria-labelledby="detailTitle" aria-hidden="true">
    <div class="drawer-handle" aria-hidden="true"></div>
    <div class="drawer-head">
      <h2 class="drawer-title" id="detailTitle">Réservation</h2>
      <button class="drawer-close" id="detailClose" aria-label="Fermer le détail" type="button">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="drawer-body" id="detailBody"></div>
    <div class="drawer-footer">
      <button class="btn btn-secondary" id="detailBtnClose" type="button">Fermer</button>
      <button class="btn btn-danger" id="detailBtnDel" style="flex:0 0 auto;padding:0 16px" aria-label="Supprimer la réservation" type="button">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M2 4h10M5 4V2h4v2M3 4l1 8h6l1-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="btn btn-primary" id="detailBtnEdit" type="button">Modifier</button>
    </div>
  </div>

  <!-- Drawer ÉDITION -->
  <div class="drawer" id="editDrawer" role="dialog" aria-modal="true" aria-labelledby="editTitle" aria-hidden="true">
    <div class="drawer-handle" aria-hidden="true"></div>
    <div class="drawer-head">
      <h2 class="drawer-title" id="editTitle">Modifier</h2>
      <button class="drawer-close" id="editClose" aria-label="Fermer le formulaire" type="button">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="drawer-body">
      <form id="resForm" novalidate>
        <input type="hidden" id="resId">
        <div class="frow">
          <div class="fgroup">
            <label for="resName">Nom du client <span aria-hidden="true">*</span></label>
            <input type="text" id="resName" placeholder="Ex : Dupont" required aria-required="true" autocomplete="off">
          </div>
          <div class="fgroup">
            <label for="resPhone">Téléphone</label>
            <input type="tel" id="resPhone" placeholder="06 xx xx xx xx">
          </div>
          <div class="f2">
            <div class="fgroup">
              <label for="resDate">Date <span aria-hidden="true">*</span></label>
              <input type="date" id="resDate" required aria-required="true">
            </div>
            <div class="fgroup">
              <label for="resTime">Heure <span aria-hidden="true">*</span></label>
              <input type="time" id="resTime" required aria-required="true">
            </div>
          </div>
          <div class="fgroup">
            <label for="resParty">Nombre de personnes</label>
            <div class="stepper">
              <button type="button" class="stepper-btn" id="btnPartyDec" aria-label="Diminuer">−</button>
              <input type="number" id="resParty" class="stepper-val" min="1" max="99" value="2" aria-label="Nombre de personnes" readonly>
              <button type="button" class="stepper-btn" id="btnPartyInc" aria-label="Augmenter">+</button>
            </div>
          </div>
          <div class="fgroup">
            <label for="resNotes">Notes client <span style="font-weight:400;color:var(--text-muted)">(allergies, occasion…)</span></label>
            <textarea id="resNotes" rows="3" placeholder="Ex : Allergie aux noix · Anniversaire…"></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-secondary" id="editCancelBtn" type="button">Annuler</button>
      <button type="submit" form="resForm" class="btn btn-primary">Enregistrer</button>
    </div>
  </div>

  <!-- Modal suppression -->
  <div class="modal-overlay hidden" id="deleteModal" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title" id="delete-modal-title">Supprimer la réservation ?</h2>
      </div>
      <p style="font-size:.87rem;color:var(--text-muted);">Cette action est irréversible.</p>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="deleteModalCancel" type="button">Annuler</button>
        <button class="btn btn-danger"    id="deleteModalConfirm" type="button">Supprimer</button>
      </div>
    </div>
  </div>

  <!-- Modal suppression PJ -->
  <div class="modal-overlay hidden" id="deleteAttModal" role="dialog" aria-modal="true" aria-labelledby="delete-att-title">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title" id="delete-att-title">Supprimer cette pièce jointe ?</h2>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="deleteAttCancel" type="button">Annuler</button>
        <button class="btn btn-danger"    id="deleteAttConfirm" type="button">Supprimer</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script>
    'use strict';

    buildNav('reservations');
    const socket = io();

    let reservations  = [];
    let currentResId  = null;
    let _drawerTrigger = null;
    let _pendingAttId  = null;

    function _canManage() {
      const u = window.__mosUser;
      return u && (u.role === 'admin' || u.role === 'manager');
    }

    // ─── Date input ───────────────────────────────────────────────────────────
    const viewDate = document.getElementById('viewDate');
    viewDate.value = today();
    updateLabel();

    viewDate.addEventListener('change', load);
    document.getElementById('btnPrevDay').addEventListener('click', () => shiftDate(-1));
    document.getElementById('btnNextDay').addEventListener('click', () => shiftDate(1));
    document.getElementById('btnToday').addEventListener('click', () => { viewDate.value = today(); load(); });
    document.getElementById('dateLabelBtn').addEventListener('click', () => viewDate.showPicker?.());

    function updateLabel() {
      const label = formatDate(viewDate.value);
      document.getElementById('dateLabel').textContent = label;
      document.getElementById('dateLabelBtn').textContent = label;
      document.getElementById('btnToday').classList.toggle('not-today', viewDate.value !== today());
    }
    function shiftDate(d) {
      const dt = new Date(viewDate.value);
      dt.setDate(dt.getDate() + d);
      viewDate.value = dt.toISOString().split('T')[0];
      load();
    }

    // ─── Status visuel ────────────────────────────────────────────────────────
    function computeVS(r) {
      if (r.status === 'cancelled') return 'cancelled';
      if (r.status === 'no_show')   return 'no_show';
      if (r.status === 'arrived')   return 'arrived';
      const todayStr = new Date().toISOString().split('T')[0];
      if (r.date === todayStr && r.time) {
        const resMs = new Date(r.date + 'T' + r.time + ':00').getTime();
        if (!isNaN(resMs) && Date.now() - resMs > 15 * 60 * 1000) return 'late';
      }
      const ids = Array.isArray(r.table_ids) ? r.table_ids : [];
      return ids.length > 0 ? 'placed' : 'unplaced';
    }

    const VS_LABELS = {
      unplaced:  'À placer',
      placed:    'Confirmée',
      arrived:   'Arrivé',
      late:      'En retard',
      no_show:   'No show',
      cancelled: 'Annulé',
    };

    // ─── Chargement ───────────────────────────────────────────────────────────
    async function load() {
      updateLabel();
      const data = await api.get(`/api/reservations?date=${viewDate.value}`);
      if (!data) return;
      reservations = data.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
      render();
    }

    function render() { renderStats(); renderList(); }

    function renderStats() {
      const counts = { unplaced:0, placed:0, arrived:0, late:0, no_show:0, cancelled:0 };
      reservations.forEach(r => { const vs = computeVS(r); if (counts[vs] !== undefined) counts[vs]++; });
      const pax   = reservations.filter(r => r.status !== 'cancelled').reduce((s, r) => s + (r.party_size || 0), 0);
      const active = reservations.filter(r => r.status !== 'cancelled').length;

      let html = `<span class="stat-pill sp-total">
        <span class="sp-count">${active}</span>
        résa${active>1?'s':''} · <strong>${pax}</strong> pers.
      </span>`;
      if (counts.unplaced)  html += `<span class="stat-pill sp-unplaced"><div class="sp-dot" style="background:var(--orange)" aria-hidden="true"></div><span class="sp-count">${counts.unplaced}</span>à placer</span>`;
      if (counts.placed)    html += `<span class="stat-pill sp-placed"><div class="sp-dot" style="background:var(--info)" aria-hidden="true"></div><span class="sp-count">${counts.placed}</span>confirmée${counts.placed>1?'s':''}</span>`;
      if (counts.arrived)   html += `<span class="stat-pill sp-arrived"><div class="sp-dot" style="background:var(--success)" aria-hidden="true"></div><span class="sp-count">${counts.arrived}</span>arrivée${counts.arrived>1?'s':''}</span>`;
      if (counts.late)      html += `<span class="stat-pill sp-late"><div class="sp-dot" style="background:var(--danger)" aria-hidden="true"></div><span class="sp-count">${counts.late}</span>en retard</span>`;
      if (counts.no_show)   html += `<span class="stat-pill"><span class="sp-count" style="color:var(--danger)">${counts.no_show}</span>no show</span>`;
      if (counts.cancelled) html += `<span class="stat-pill sp-cancelled"><span class="sp-count">${counts.cancelled}</span>annulée${counts.cancelled>1?'s':''}</span>`;
      document.getElementById('statsStrip').innerHTML = html;
    }

    function renderList() {
      const el = document.getElementById('resList');
      if (!reservations.length) {
        el.innerHTML = `<div class="res-empty">
          <div class="res-empty-icon">📅</div>
          <div class="res-empty-title">Aucune réservation</div>
          <div class="res-empty-sub">Ce jour est libre — profitez-en !</div>
        </div>`;
        return;
      }

      const statusOptions = [
        { v:'confirmed', l:'Confirmée' }, { v:'arrived', l:'Arrivée' },
        { v:'no_show',   l:'No show'  }, { v:'cancelled', l:'Annulée' }
      ];

      const items = reservations.map(r => {
        const isJoy = !!r.joy_event_id;
        const vs    = computeVS(r);
        const tableNames = Array.isArray(r.table_names) && r.table_names.length
          ? r.table_names
          : (r.table_name ? [r.table_name] : []);
        const vsLabel = VS_LABELS[vs] || vs;

        const tableTags = tableNames.length
          ? tableNames.map(n => `<span class="rc-tag rc-tag-table">${escapeHtml(n)}</span>`).join('')
          : `<span class="rc-tag rc-tag-notable">Sans table</span>`;

        const arrivedBtn = (vs !== 'arrived' && vs !== 'cancelled' && vs !== 'no_show')
          ? `<button class="btn-arrived-quick" type="button" data-arrived="${r.id}"
               aria-label="Marquer arrivé — ${escapeHtml(r.customer_name)}">
               <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                 <path d="M3 8l4 4 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
               </svg>
             </button>`
          : '';

        return `<li>
          <button class="res-card vs-${vs}" id="rc-${r.id}" data-res-id="${r.id}" type="button"
                  aria-label="${escapeHtml(r.customer_name)}, ${escapeHtml(r.time||'—')}, ${r.party_size} pers., ${vsLabel}">
            <div class="res-card-accent" aria-hidden="true"></div>
            <div class="rc-time-col">
              <time class="rc-time" datetime="${escapeHtml(r.date)}T${escapeHtml(r.time||'')}">${escapeHtml(r.time||'—')}</time>
            </div>
            <div class="rc-body">
              <div class="rc-top">
                <span class="rc-name">${escapeHtml(r.customer_name)}</span>
                ${isJoy ? `<span class="joy-tag" aria-label="Source Joy.io">Joy.io</span>` : ''}
              </div>
              <div class="rc-tags">
                <span class="rc-tag rc-tag-pax">
                  <svg viewBox="0 0 20 20" fill="currentColor" width="10" height="10" aria-hidden="true"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
                  ${r.party_size}
                </span>
                ${r.phone ? `<a href="tel:${escapeHtml(r.phone)}" class="rc-tag rc-tag-phone" onclick="event.stopPropagation()" aria-label="Appeler ${escapeHtml(r.phone)}">${escapeHtml(r.phone)}</a>` : ''}
                ${tableTags}
                ${r.space ? `<span class="rc-tag rc-tag-space">${escapeHtml(r.space)}</span>` : ''}
              </div>
              ${r.notes ? `<div class="rc-notes">${escapeHtml(r.notes)}</div>` : ''}
            </div>
            <div class="rc-actions" onclick="event.stopPropagation()">
              ${arrivedBtn}
              <label class="sr-only" for="status-${r.id}">Statut de ${escapeHtml(r.customer_name)}</label>
              <select class="status-pill" id="status-${r.id}" data-status-id="${r.id}" aria-label="Statut : ${vsLabel}">
                ${statusOptions.map(o => `<option value="${o.v}"${r.status===o.v?' selected':''}>${escapeHtml(o.l)}</option>`).join('')}
              </select>
            </div>
          </button>
        </li>`;
      });

      el.innerHTML = `<ul role="list" style="list-style:none;margin:0;padding:0;">` + items.join('') + `</ul>`;

      el.querySelectorAll('[data-res-id]').forEach(btn => {
        btn.addEventListener('click', () => openDetail(parseInt(btn.dataset.resId, 10), btn));
      });
      el.querySelectorAll('[data-arrived]').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          await changeStatus(parseInt(btn.dataset.arrived, 10), 'arrived');
        });
      });
      el.querySelectorAll('[data-status-id]').forEach(sel => {
        sel.addEventListener('change', async e => {
          e.stopPropagation();
          await changeStatus(parseInt(sel.dataset.statusId, 10), sel.value);
        });
      });
    }

    async function changeStatus(id, status) {
      await api.put(`/api/reservations/${id}`, { status });
      const r = reservations.find(x => x.id === id);
      if (r) r.status = status;
      render();
      showToast('Statut mis à jour', 'success');
    }

    // ─── Drawer helpers ───────────────────────────────────────────────────────
    function openDrawer(id, triggerEl) {
      if (triggerEl) _drawerTrigger = triggerEl;
      document.getElementById('backdrop').classList.add('open');
      document.getElementById('backdrop').removeAttribute('aria-hidden');
      const drawer = document.getElementById(id);
      drawer.classList.add('open');
      drawer.removeAttribute('aria-hidden');
      document.body.classList.add('modal-open');
      setTimeout(() => {
        const focusable = drawer.querySelectorAll('button:not([disabled]),a,[tabindex]:not([tabindex="-1"]),input,select,textarea');
        if (focusable.length) focusable[0].focus();
      }, 300);
    }

    function closeAllDrawers(resetTrigger = true) {
      ['detailDrawer', 'editDrawer'].forEach(id => {
        const d = document.getElementById(id);
        d.classList.remove('open');
        d.setAttribute('aria-hidden', 'true');
      });
      const bd = document.getElementById('backdrop');
      bd.classList.remove('open');
      bd.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('modal-open');
      if (resetTrigger && _drawerTrigger) { _drawerTrigger.focus(); _drawerTrigger = null; }
      if (resetTrigger) currentResId = null;
    }

    document.getElementById('backdrop').addEventListener('click', () => closeAllDrawers());

    ['detailDrawer', 'editDrawer'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeAllDrawers(); return; }
        if (e.key === 'Tab') {
          const drawer = document.getElementById(id);
          const focusable = Array.from(drawer.querySelectorAll('button:not([disabled]),a,[tabindex]:not([tabindex="-1"]),input,select,textarea'));
          if (!focusable.length) return;
          const first = focusable[0], last = focusable[focusable.length - 1];
          if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
          else            { if (document.activeElement === last)  { e.preventDefault(); first.focus(); } }
        }
      });
    });

    // ─── Drawer DÉTAIL ────────────────────────────────────────────────────────
    function openDetail(id, triggerEl) {
      const r = reservations.find(x => x.id === id);
      if (!r) return;
      currentResId = id;
      _drawerTrigger = triggerEl || null;

      const isJoy     = !!r.joy_event_id;
      const vs        = computeVS(r);
      const canManage = _canManage();

      document.getElementById('detailTitle').textContent = r.customer_name + (isJoy ? ' · Joy.io' : '');

      const tableNames = Array.isArray(r.table_names) && r.table_names.length
        ? r.table_names : (r.table_name ? [r.table_name] : []);
      const tableBadge = tableNames.length
        ? tableNames.map(n => `<span class="detail-table-badge dtb-ok">${escapeHtml(n)}</span>`).join(' ')
        : `<span class="detail-table-badge dtb-nok">Pas de table assignée</span>`;

      const statusOptions = [
        { v:'confirmed', l:'Confirmée' }, { v:'arrived', l:'Arrivée' },
        { v:'no_show',   l:'No show'  }, { v:'cancelled', l:'Annulée' }
      ];

      let adminNotesHtml = '';
      if (canManage) {
        adminNotesHtml = `
          <div class="admin-section">
            <div class="admin-section-title">Notes internes (équipe)</div>
            <label for="adminNotesTA" class="sr-only">Notes internes</label>
            <textarea id="adminNotesTA" rows="3" placeholder="Notes pour l'équipe — non visibles par le client…" style="resize:vertical;width:100%;box-sizing:border-box">${escapeHtml(r.admin_notes||'')}</textarea>
            <button class="btn btn-secondary btn-sm" id="saveAdminNotesBtn" style="margin-top:8px;width:100%" type="button">Enregistrer les notes</button>
          </div>`;
      } else if (r.admin_notes) {
        adminNotesHtml = `
          <div class="admin-section">
            <div class="admin-section-title">Notes internes</div>
            <div class="admin-notes-ro">${escapeHtml(r.admin_notes)}</div>
          </div>`;
      }

      const attachHtml = `
        <div class="attach-section">
          <div class="attach-title">Pièces jointes</div>
          <div id="attachList" class="attach-list"><div style="font-size:.78rem;color:var(--text-muted);font-style:italic;">Chargement…</div></div>
          ${canManage ? `<label class="attach-upload-lbl">
            <input type="file" id="attachInput" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" class="sr-only" aria-label="Ajouter un fichier">
            + Ajouter un fichier (devis, contrat…)
          </label>` : ''}
        </div>`;

      document.getElementById('detailBody').innerHTML = `
        <dl class="detail-view">
          <div class="detail-row">
            <div class="detail-icon" aria-hidden="true">🕐</div>
            <div>
              <dt class="detail-label">Heure · Date</dt>
              <dd class="detail-value">
                <time datetime="${escapeHtml(r.date)}T${escapeHtml(r.time||'')}">${escapeHtml(r.time||'—')}</time>
                · ${escapeHtml(formatDate(r.date))}
              </dd>
            </div>
          </div>
          <div class="detail-row">
            <div class="detail-icon" aria-hidden="true">👥</div>
            <div>
              <dt class="detail-label">Personnes</dt>
              <dd class="detail-value">${r.party_size} personne${r.party_size>1?'s':''}</dd>
            </div>
          </div>
          ${r.phone ? `<div class="detail-row">
            <div class="detail-icon" aria-hidden="true">📞</div>
            <div><dt class="detail-label">Téléphone</dt>
            <dd class="detail-value"><a href="tel:${escapeHtml(r.phone)}">${escapeHtml(r.phone)}</a></dd></div>
          </div>` : ''}
          ${r.space ? `<div class="detail-row">
            <div class="detail-icon" aria-hidden="true">📍</div>
            <div><dt class="detail-label">Espace réservé</dt>
            <dd class="detail-value">${escapeHtml(r.space)}</dd></div>
          </div>` : ''}
          <div class="detail-row">
            <div class="detail-icon" aria-hidden="true">🪑</div>
            <div style="flex:1">
              <dt class="detail-label">Table(s)</dt>
              <dd class="detail-value" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${tableBadge}</dd>
            </div>
          </div>
          ${r.notes ? `<div class="detail-row">
            <div class="detail-icon" aria-hidden="true">📝</div>
            <div><dt class="detail-label">Notes client</dt>
            <dd class="detail-value" style="font-size:.87rem;font-weight:400;white-space:pre-wrap;line-height:1.55">${escapeHtml(r.notes)}</dd></div>
          </div>` : ''}
          <div class="detail-row">
            <div class="detail-icon" aria-hidden="true">📌</div>
            <div style="width:100%">
              <dt class="detail-label">Statut</dt>
              <dd style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:6px">
                <span class="vs-badge vsb-${vs}" role="status">${escapeHtml(VS_LABELS[vs] || vs)}</span>
                <label for="detail-status-sel" class="sr-only">Changer le statut</label>
                <select class="detail-status-select" id="detail-status-sel" data-detail-status="${r.id}" aria-label="Modifier le statut">
                  ${statusOptions.map(o => `<option value="${o.v}"${r.status===o.v?' selected':''}>${escapeHtml(o.l)}</option>`).join('')}
                </select>
              </dd>
            </div>
          </div>
        </dl>

        <button class="btn-assign" id="btnAssignTable" type="button"
                data-res-id="${r.id}" data-res-date="${escapeHtml(r.date)}" data-res-name="${escapeHtml(r.customer_name)}">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16" aria-hidden="true">
            <path d="M3 3a1 1 0 000 2h1v11a1 1 0 102 0V5h8v11a1 1 0 102 0V5h1a1 1 0 100-2H3zm4 5a1 1 0 011-1h4a1 1 0 110 2H8a1 1 0 01-1-1z"/>
          </svg>
          Assigner une table sur le plan de salle
        </button>

        ${adminNotesHtml}
        ${attachHtml}
      `;

      document.getElementById('detailBtnDel').style.display = isJoy ? 'none' : 'flex';

      const statusSel = document.getElementById('detail-status-sel');
      if (statusSel) {
        statusSel.addEventListener('change', async () => {
          await changeStatus(parseInt(statusSel.dataset.detailStatus, 10), statusSel.value);
          openDetail(parseInt(statusSel.dataset.detailStatus, 10));
        });
      }
      const assignBtn = document.getElementById('btnAssignTable');
      if (assignBtn) {
        assignBtn.addEventListener('click', () => {
          const { resId, resDate, resName } = assignBtn.dataset;
          window.location.href = `/staff/tables.html?assignTo=${resId}&date=${resDate}&name=${encodeURIComponent(resName)}`;
        });
      }
      const saveNotesBtn = document.getElementById('saveAdminNotesBtn');
      if (saveNotesBtn) saveNotesBtn.addEventListener('click', () => saveAdminNotes(id));
      const attachInput = document.getElementById('attachInput');
      if (attachInput) attachInput.addEventListener('change', () => uploadAttachment(attachInput));

      openDrawer('detailDrawer');
      loadAttachments(id);
    }

    async function saveAdminNotes(id) {
      const ta = document.getElementById('adminNotesTA');
      if (!ta) return;
      const notes = ta.value.trim() || null;
      const res   = await api.put(`/api/reservations/${id}`, { admin_notes: notes });
      if (res?.error) { showToast(res.error, 'error'); return; }
      const r = reservations.find(x => x.id === id);
      if (r) r.admin_notes = notes;
      showToast('Notes enregistrées', 'success');
    }

    // ─── Pièces jointes ───────────────────────────────────────────────────────
    function _fmtSize(b) {
      if (b < 1024) return b + ' o';
      if (b < 1048576) return Math.round(b / 1024) + ' Ko';
      return (b / 1048576).toFixed(1) + ' Mo';
    }

    async function loadAttachments(resId) {
      const list = document.getElementById('attachList');
      if (!list) return;
      const atts = await api.get(`/api/reservations/${resId}/attachments`);
      if (!atts) { list.innerHTML = ''; return; }
      if (!atts.length) {
        list.innerHTML = `<p style="font-size:.78rem;color:var(--text-muted);font-style:italic;">Aucune pièce jointe</p>`;
        return;
      }
      const cm = _canManage();
      list.innerHTML = atts.map(a => `
        <div class="attach-item">
          <div class="attach-info">
            <div class="attach-name" title="${escapeHtml(a.original_name)}">${escapeHtml(a.original_name)}</div>
            <div class="attach-meta">${_fmtSize(a.size)}${a.uploader_name ? ' · ' + escapeHtml(a.uploader_name) : ''}</div>
          </div>
          <button class="attach-btn-open" type="button" data-att-open="${a.id}" aria-label="Voir ${escapeHtml(a.original_name)}">Voir</button>
          ${cm ? `<button class="attach-btn-del" type="button" data-att-del="${a.id}" aria-label="Supprimer ${escapeHtml(a.original_name)}">✕</button>` : ''}
        </div>`).join('');

      list.querySelectorAll('[data-att-open]').forEach(btn => {
        btn.addEventListener('click', () => window.open(`/api/attachments/${btn.dataset.attOpen}/file`, '_blank'));
      });
      list.querySelectorAll('[data-att-del]').forEach(btn => {
        btn.addEventListener('click', () => {
          _pendingAttId = { attId: parseInt(btn.dataset.attDel, 10), resId };
          showModal('deleteAttModal', btn);
          setTimeout(() => document.getElementById('deleteAttCancel').focus(), 50);
        });
      });
    }

    async function uploadAttachment(input) {
      if (!input.files.length || !currentResId) return;
      const fd = new FormData();
      fd.append('file', input.files[0]);
      input.value = '';
      const res = await fetch(`/api/reservations/${currentResId}/attachments`, { method:'POST', body:fd });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showToast(err.error || 'Erreur upload', 'error'); return;
      }
      showToast('Fichier ajouté', 'success');
      loadAttachments(currentResId);
    }

    document.getElementById('deleteAttCancel').addEventListener('click', () => { hideModal('deleteAttModal'); _pendingAttId = null; });
    document.getElementById('deleteAttConfirm').addEventListener('click', async () => {
      if (!_pendingAttId) return;
      const { attId, resId } = _pendingAttId;
      const res = await api.delete(`/api/attachments/${attId}`);
      hideModal('deleteAttModal');
      _pendingAttId = null;
      if (res?.ok) { showToast('Supprimé', 'info'); loadAttachments(resId); }
    });

    // ─── Drawer controls ──────────────────────────────────────────────────────
    document.getElementById('detailClose').addEventListener('click', () => closeAllDrawers());
    document.getElementById('detailBtnClose').addEventListener('click', () => closeAllDrawers());
    document.getElementById('detailBtnEdit').addEventListener('click', switchToEdit);
    document.getElementById('detailBtnDel').addEventListener('click', () => {
      showModal('deleteModal', document.getElementById('detailBtnDel'));
      setTimeout(() => document.getElementById('deleteModalCancel').focus(), 50);
    });
    document.getElementById('deleteModalCancel').addEventListener('click', () => hideModal('deleteModal'));
    document.getElementById('deleteModalConfirm').addEventListener('click', async () => {
      if (!currentResId) return;
      await api.delete(`/api/reservations/${currentResId}`);
      hideModal('deleteModal');
      closeAllDrawers();
      showToast('Réservation supprimée', 'info');
      load();
    });

    document.getElementById('editClose').addEventListener('click', closeEditDrawer);
    document.getElementById('editCancelBtn').addEventListener('click', closeEditDrawer);

    function closeEditDrawer() {
      closeAllDrawers(false);
      if (currentResId) openDetail(currentResId);
      else { _drawerTrigger?.focus(); _drawerTrigger = null; }
    }

    // ─── Créer / Modifier ─────────────────────────────────────────────────────
    document.getElementById('btnCreate').addEventListener('click', function() { openCreate(this); });

    function openCreate(triggerEl) {
      currentResId = null;
      document.getElementById('editTitle').textContent = 'Nouvelle réservation';
      document.getElementById('resId').value    = '';
      document.getElementById('resName').value  = '';
      document.getElementById('resPhone').value = '';
      document.getElementById('resDate').value  = viewDate.value;
      document.getElementById('resTime').value  = '';
      document.getElementById('resParty').value = 2;
      document.getElementById('resNotes').value = '';
      openDrawer('editDrawer', triggerEl);
      setTimeout(() => document.getElementById('resName').focus(), 350);
    }

    function switchToEdit() {
      const r = reservations.find(x => x.id === currentResId);
      if (!r) return;
      document.getElementById('editTitle').textContent = 'Modifier la réservation';
      document.getElementById('resId').value    = r.id;
      document.getElementById('resName').value  = r.customer_name;
      document.getElementById('resPhone').value = r.phone || '';
      document.getElementById('resDate').value  = r.date;
      document.getElementById('resTime').value  = r.time;
      document.getElementById('resParty').value = r.party_size;
      document.getElementById('resNotes').value = r.notes || '';
      closeAllDrawers(false);
      openDrawer('editDrawer');
    }

    document.getElementById('resForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const id   = document.getElementById('resId').value;
      const body = {
        customer_name: document.getElementById('resName').value.trim(),
        phone:         document.getElementById('resPhone').value.trim() || null,
        date:          document.getElementById('resDate').value,
        time:          document.getElementById('resTime').value,
        party_size:    parseInt(document.getElementById('resParty').value) || 2,
        notes:         document.getElementById('resNotes').value.trim() || null,
      };
      const res = id ? await api.put(`/api/reservations/${id}`, body) : await api.post('/api/reservations', body);
      if (res?.error) { showToast(res.error, 'error'); return; }
      closeAllDrawers();
      showToast(id ? 'Réservation modifiée' : 'Réservation créée', 'success');
      if (body.date === viewDate.value) load();
    });

    document.getElementById('btnPartyDec').addEventListener('click', () => stepParty(-1));
    document.getElementById('btnPartyInc').addEventListener('click', () => stepParty(1));
    function stepParty(d) {
      const i = document.getElementById('resParty');
      i.value = Math.max(1, Math.min(99, (parseInt(i.value) || 2) + d));
    }

    // ─── Joy.io sync ──────────────────────────────────────────────────────────
    async function initSyncBar() {
      const user = await api.get('/api/auth/me');
      if (!user || (user.role !== 'admin' && user.role !== 'manager')) return;
      document.getElementById('joySyncBar').style.display = 'flex';
      refreshSyncLabel();
    }
    async function refreshSyncLabel() {
      const cfg = await api.get('/api/joy/config');
      if (!cfg) return;
      const d = cfg.lastSync ? new Date(cfg.lastSync) : null;
      document.getElementById('joySyncLabel').textContent = d
        ? `Joy.io · sync ${d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' })}`
        : 'Joy.io · jamais synchronisé';
    }
    document.getElementById('joySyncBtn').addEventListener('click', async function() {
      this.textContent = '…'; this.disabled = true;
      const r = await api.post('/api/joy/sync', {});
      this.textContent = 'Sync'; this.disabled = false;
      if (r?.error) { showToast('Erreur : ' + escapeHtml(r.error), 'error'); return; }
      showToast(`Joy.io — ${r.synced} résa${r.synced>1?'s':''} sync.`, 'success');
      refreshSyncLabel(); load();
    });
    initSyncBar();

    // ─── Auto-refresh (détection retard) ─────────────────────────────────────
    setInterval(() => {
      if (viewDate.value === new Date().toISOString().split('T')[0]) render();
    }, 60000);

    // ─── Socket.io ────────────────────────────────────────────────────────────
    socket.on('reservation:updated', raw => {
      if (raw.date !== viewDate.value) return;
      if (typeof raw.table_ids === 'string') {
        try { raw.table_ids = JSON.parse(raw.table_ids); } catch(e) { raw.table_ids = []; }
      }
      const i = reservations.findIndex(x => x.id === raw.id);
      if (i >= 0) reservations[i] = raw; else reservations.push(raw);
      reservations.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
      render();
    });
    socket.on('reservation:deleted', ({ id }) => {
      reservations = reservations.filter(r => r.id !== id);
      render();
    });
    socket.on('joy:synced', () => { load(); refreshSyncLabel(); });

    const params = new URLSearchParams(location.search);
    if (params.get('assigned')) {
      showToast('Table assignée', 'success');
      history.replaceState({}, '', location.pathname);
    }

    load();
  </script>
</body>
</html>
